<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ICT 트레이딩 대시보드</title>
<script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
<style>
  :root {
    --bg:       #0B0E11;
    --panel:    #1E2026;
    --card:     #252930;
    --border:   #2B2F36;
    --primary:  #FCD535;
    --bull:     #0ECB81;
    --bear:     #F6465D;
    --neutral:  #F0B90B;
    --text:     #EAECEF;
    --muted:    #848E9C;
    --fvg:      rgba(34,211,238,0.15);
    --fvg-bdr:  #22D3EE;
    --ob:       rgba(167,139,250,0.15);
    --ob-bdr:   #A78BFA;
    --bb:       rgba(251,146,60,0.2);
    --bb-bdr:   #FB923C;
    --sweep:    #FCD535;
    --font:     'Inter', -apple-system, sans-serif;
    --mono:     'JetBrains Mono', 'Fira Code', monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--font); font-size: 13px; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

  /* ── 헤더 ── */
  #header { display: flex; align-items: center; gap: 12px; padding: 10px 16px; background: var(--panel); border-bottom: 1px solid var(--border); flex-shrink: 0; }
  #header .logo { font-size: 15px; font-weight: 700; color: var(--primary); letter-spacing: 0.5px; white-space: nowrap; }
  .pair-tabs { display: flex; gap: 4px; }
  .pair-tab { padding: 5px 12px; border-radius: 4px; border: 1px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; font-size: 12px; font-weight: 600; transition: all .15s; }
  .pair-tab.active { background: var(--primary); color: #000; border-color: var(--primary); }
  .tf-pills { display: flex; gap: 4px; }
  .tf-pill { padding: 4px 9px; border-radius: 4px; border: 1px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; font-size: 11px; font-weight: 600; transition: all .15s; }
  .tf-pill.active { background: rgba(252,213,53,.15); color: var(--primary); border-color: var(--primary); }
  .header-spacer { flex: 1; }
  .kz-badge { padding: 4px 10px; border-radius: 4px; font-size: 11px; font-weight: 600; background: rgba(14,203,129,.12); color: var(--bull); border: 1px solid rgba(14,203,129,.3); }
  .kz-badge.inactive { background: rgba(132,142,156,.08); color: var(--muted); border-color: var(--border); }
  .mode-badge { padding: 4px 10px; border-radius: 4px; font-size: 11px; font-weight: 700; background: rgba(252,213,53,.12); color: var(--primary); border: 1px solid rgba(252,213,53,.3); }
  #analyze-all-badge { display: none; align-items: center; gap: 5px; padding: 4px 10px; border-radius: 4px; font-size: 11px; font-weight: 600; background: rgba(252,213,53,.08); color: var(--primary); border: 1px solid rgba(252,213,53,.25); }
  #analyze-all-badge.visible { display: flex; }
  #analyze-all-badge .spin { width: 10px; height: 10px; border: 2px solid rgba(252,213,53,.25); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.7s linear infinite; flex-shrink: 0; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--bull); box-shadow: 0 0 6px var(--bull); }

  /* ── 메인 레이아웃 ── */
  #main { display: grid; grid-template-columns: 1fr 300px; grid-template-rows: 1fr; flex: 1; min-height: 0; gap: 0; }

  /* ── 차트 영역 ── */
  #chart-section { display: flex; flex-direction: column; min-height: 0; border-right: 1px solid var(--border); }
  #chart-toolbar { display: flex; align-items: center; gap: 8px; padding: 8px 12px; background: var(--panel); border-bottom: 1px solid var(--border); flex-shrink: 0; flex-wrap: wrap; }
  #chart-toolbar .price-display { font-family: var(--mono); font-size: 16px; font-weight: 700; color: var(--text); }
  #chart-toolbar .price-change { font-size: 12px; font-weight: 600; }
  #chart-toolbar .price-change.up { color: var(--bull); }
  #chart-toolbar .price-change.dn { color: var(--bear); }
  .toolbar-sep { width: 1px; height: 18px; background: var(--border); }
  .overlay-btn { padding: 3px 8px; border-radius: 3px; border: 1px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; font-size: 11px; transition: all .15s; }
  .overlay-btn.on { border-color: currentColor; }
  .overlay-btn.fvg.on  { color: var(--fvg-bdr); background: var(--fvg); }
  .overlay-btn.ob.on   { color: var(--ob-bdr);  background: var(--ob);  }
  .overlay-btn.bb.on   { color: var(--bb-bdr);  background: var(--bb);  }
  .overlay-btn.sweep.on { color: var(--sweep); background: rgba(252,213,53,.1); }
  #analyze-btn { margin-left: auto; padding: 7px 16px; border-radius: 6px; border: none; background: var(--primary); color: #000; font-weight: 700; font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: opacity .15s; white-space: nowrap; }
  #analyze-btn:hover { opacity: .85; }
  #analyze-btn:disabled { opacity: .4; cursor: not-allowed; }
  #analyze-btn .spinner { display: none; width: 14px; height: 14px; border: 2px solid rgba(0,0,0,.2); border-top-color: #000; border-radius: 50%; animation: spin 0.7s linear infinite; }
  #analyze-btn.loading .spinner { display: block; }
  #diary-btn { padding: 7px 12px; border-radius: 6px; border: 1px solid var(--border); background: transparent; color: var(--text); font-size: 13px; cursor: pointer; white-space: nowrap; transition: background .15s; }
  #diary-btn:hover { background: var(--panel); }
  #diary-btn:disabled { opacity: .4; cursor: not-allowed; }
  .diary-body { font-size: 12px; line-height: 1.55; max-height: 380px; overflow-y: auto; }
  .diary-rendered { font-size: 12px; line-height: 1.55; color: var(--text); word-break: break-word; }
  .diary-rendered h1 { font-size: 13px; font-weight: 700; color: var(--primary); border-bottom: 1px solid var(--border); padding-bottom: 5px; margin: 14px 0 8px; }
  .diary-rendered h2 { font-size: 12px; font-weight: 700; color: var(--text); margin: 12px 0 5px; }
  .diary-rendered h3 { font-size: 12px; font-weight: 600; color: var(--muted); margin: 10px 0 4px; }
  .diary-rendered strong { color: var(--primary); font-weight: 600; }
  .diary-rendered p { margin: 4px 0 6px; }
  .diary-rendered ul, .diary-rendered ol { margin: 4px 0 6px 16px; }
  .diary-rendered li { margin: 2px 0; }
  .diary-rendered hr { border: none; border-top: 1px solid var(--border); margin: 12px 0; }
  .diary-rendered table { border-collapse: collapse; width: 100%; font-size: 11px; margin: 6px 0; }
  .diary-rendered th { background: var(--card); color: var(--muted); padding: 4px 8px; border: 1px solid var(--border); text-align: left; font-weight: 600; }
  .diary-rendered td { padding: 4px 8px; border: 1px solid var(--border); color: var(--text); }
  .diary-rendered code { background: var(--card); padding: 1px 5px; border-radius: 3px; font-family: var(--mono); font-size: 11px; color: var(--fvg-bdr); }
  #analyze-btn.loading .btn-icon { display: none; }
  @keyframes spin { to { transform: rotate(360deg); } }
  #chart-container { flex: 1; min-height: 0; position: relative; }
  #chart { width: 100%; height: 100%; }
  #overlay-canvas { position: absolute; inset: 0; pointer-events: none; }
  #log-panel { position: absolute; bottom: 0; left: 0; right: 0; max-height: 140px; background: rgba(11,14,17,.92); border-top: 1px solid var(--border); overflow-y: auto; font-family: var(--mono); font-size: 11px; color: var(--muted); padding: 6px 10px; display: none; }
  #log-panel.visible { display: block; }
  #log-panel .log-line { line-height: 1.5; }
  #log-panel .log-line.INFO  { color: var(--text); }
  #log-panel .log-line.DEBUG { color: var(--muted); }
  #log-panel .log-line.WARN  { color: var(--neutral); }
  #log-panel .log-line.ERROR { color: var(--bear); }

  /* ── 사이드 패널 ── */
  #side-panel { display: flex; flex-direction: column; min-height: 0; overflow-y: auto; background: var(--panel); }
  .side-section { padding: 12px 14px; border-bottom: 1px solid var(--border); }
  .side-section-title { font-size: 10px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 10px; }

  /* 스코어카드 */
  .scorecard-items { display: flex; flex-direction: column; gap: 2px; }
  .sc-item-wrap { margin-bottom: 4px; }
  .sc-item { display: flex; align-items: center; gap: 8px; }
  .sc-label { color: var(--muted); font-size: 12px; flex: 1; }
  .sc-score { font-family: var(--mono); font-size: 12px; font-weight: 700; width: 28px; text-align: right; }
  .sc-bar { flex: 1; height: 4px; border-radius: 2px; background: var(--border); overflow: hidden; }
  .sc-bar-fill { height: 100%; border-radius: 2px; transition: width .4s; }
  .sc-reason { font-size: 10px; color: var(--muted); margin-top: 3px; padding-left: 2px; line-height: 1.3; }
  .sc-reason.pass { color: #0ECB81; }
  .sc-reason.fail { color: #F6465D; }
  .sc-reason.warn { color: #F0B90B; }
  .scorecard-total { display: flex; align-items: center; justify-content: space-between; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); }
  .sc-total-label { font-size: 12px; color: var(--muted); }
  .sc-total-val { font-family: var(--mono); font-size: 18px; font-weight: 700; }
  .sc-grade-badge { padding: 3px 10px; border-radius: 4px; font-size: 13px; font-weight: 800; font-family: var(--mono); }
  .grade-S { background: rgba(252,213,53,.15); color: var(--primary); border: 1px solid rgba(252,213,53,.4); }
  .grade-A { background: rgba(14,203,129,.12); color: var(--bull); border: 1px solid rgba(14,203,129,.3); }
  .grade-B { background: rgba(240,185,11,.12); color: var(--neutral); border: 1px solid rgba(240,185,11,.3); }
  .grade-C { background: rgba(132,142,156,.1); color: var(--muted); border: 1px solid var(--border); }
  .grade-X { background: rgba(246,70,93,.12); color: var(--bear); border: 1px solid rgba(246,70,93,.3); }
  .sc-placeholder { color: var(--muted); font-size: 12px; text-align: center; padding: 16px 0; }
  .sc-size-badge { display: inline-block; padding: 2px 7px; border-radius: 3px; font-size: 10px; font-weight: 700; font-family: var(--mono); background: rgba(252,213,53,.1); color: var(--primary); border: 1px solid rgba(252,213,53,.3); }


  /* AMD 상태 */
  .amd-row { display: flex; gap: 4px; }
  .amd-stage { flex: 1; text-align: center; padding: 5px 4px; border-radius: 4px; border: 1px solid var(--border); font-size: 10px; font-weight: 700; color: var(--muted); letter-spacing: 0.3px; }
  .amd-stage.active { border-color: var(--primary); background: rgba(252,213,53,.1); color: var(--primary); }

  /* ── 트레이딩 이력 ── */
  #history-section { flex-shrink: 0; border-top: 1px solid var(--border); background: var(--panel); }
  #history-header { display: flex; align-items: center; gap: 10px; padding: 8px 14px; border-bottom: 1px solid var(--border); }
  #history-header h3 { font-size: 12px; font-weight: 700; color: var(--text); text-transform: uppercase; letter-spacing: 0.6px; }
  #history-header .live-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--bull); animation: pulse 2s ease infinite; }
  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:.4; } }
  #history-header .trade-count { font-size: 11px; color: var(--muted); margin-left: auto; }
  #history-table-wrap { overflow-x: auto; max-height: 180px; overflow-y: auto; }
  #history-table { width: 100%; border-collapse: collapse; font-size: 11px; }
  #history-table th { padding: 5px 10px; text-align: left; color: var(--muted); font-weight: 600; position: sticky; top: 0; background: var(--panel); border-bottom: 1px solid var(--border); white-space: nowrap; }
  #history-table td { padding: 6px 10px; border-bottom: 1px solid rgba(43,47,54,.5); white-space: nowrap; font-family: var(--mono); }
  #history-table tr:hover td { background: rgba(255,255,255,.02); }
  .td-long  { color: var(--bull); font-weight: 700; }
  .td-short { color: var(--bear); font-weight: 700; }
  .td-mode  { padding: 2px 6px; border-radius: 3px; font-size: 10px; font-weight: 700; background: rgba(252,213,53,.1); color: var(--primary); }
  .td-status-open    { color: var(--neutral); }
  .td-status-closed  { color: var(--muted); }
  .td-pnl.pos { color: var(--bull); }
  .td-pnl.neg { color: var(--bear); }
  .td-grade { font-weight: 800; }
  #history-empty { text-align: center; padding: 24px; color: var(--muted); font-size: 12px; }

  /* ── 전체 레이아웃 ── */
  #layout { display: flex; flex-direction: column; flex: 1; min-height: 0; }
  #top-layout { display: grid; grid-template-columns: 1fr 300px; flex: 1; min-height: 0; }
  #chart-col { display: flex; flex-direction: column; min-height: 0; border-right: 1px solid var(--border); }
  #side-col { display: flex; flex-direction: column; min-height: 0; overflow-y: auto; background: var(--panel); }

  /* ── 알림 토스트 ── */
  #toast { position: fixed; top: 16px; left: 50%; transform: translateX(-50%); padding: 10px 16px; border-radius: 8px; font-size: 13px; font-weight: 600; opacity: 0; pointer-events: none; transition: opacity .3s; z-index: 100; white-space: nowrap; }
  #toast.show { opacity: 1; }
  #toast.success { background: rgba(14,203,129,.15); color: var(--bull); border: 1px solid rgba(14,203,129,.4); }
  #toast.error   { background: rgba(246,70,93,.15); color: var(--bear); border: 1px solid rgba(246,70,93,.4); }
  #toast.info    { background: rgba(252,213,53,.1); color: var(--primary); border: 1px solid rgba(252,213,53,.3); }

  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<!-- 헤더 -->
<div id="header">
  <div class="logo">⚡ ICT Engine</div>
  <div class="pair-tabs" id="pairTabs"></div>
  <div class="toolbar-sep"></div>
  <div class="tf-pills" id="tfPills">
    <button class="tf-pill active" data-tf="15m">15M</button>
    <button class="tf-pill" data-tf="4h">4H</button>
  </div>
  <div class="header-spacer"></div>
  <div id="analyze-all-badge"><span class="spin"></span><span id="analyze-all-text">전체 분석 중...</span></div>
  <div class="kz-badge inactive" id="kzBadge">킬존 대기</div>
  <div class="mode-badge">DRY-RUN</div>
  <div class="status-dot" id="statusDot"></div>
  <button id="api-settings-btn" title="서버 URL 설정" style="padding:4px 8px;border-radius:4px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-size:12px;">⚙</button>
</div>

<!-- API 설정 모달 -->
<div id="api-modal" style="display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,0.7);align-items:center;justify-content:center;">
  <div style="background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:20px;width:360px;max-width:90vw;">
    <div style="font-size:13px;font-weight:700;color:var(--text);margin-bottom:12px;">⚙ 서버 URL 설정</div>
    <div style="font-size:11px;color:var(--muted);margin-bottom:8px;">ICT 분석 서버 주소를 입력하세요.<br>예: <code style="color:var(--fvg-bdr)">http://192.168.0.10:3210</code></div>
    <input id="api-url-input" type="text" style="width:100%;background:var(--card);border:1px solid var(--border);border-radius:4px;padding:8px 10px;color:var(--text);font-size:13px;font-family:var(--mono);outline:none;" placeholder="http://localhost:3210" />
    <div style="display:flex;gap:8px;margin-top:12px;justify-content:flex-end;">
      <button id="api-cancel-btn" style="padding:7px 14px;border-radius:5px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-size:12px;">취소</button>
      <button id="api-save-btn" style="padding:7px 14px;border-radius:5px;border:none;background:var(--primary);color:#000;font-weight:700;cursor:pointer;font-size:12px;">저장 및 새로고침</button>
    </div>
  </div>
</div>

<!-- 레이아웃 -->
<div id="layout">
  <div id="top-layout">
    <!-- 차트 컬럼 -->
    <div id="chart-col">
      <div id="chart-toolbar">
        <span class="price-display" id="priceDisplay">—</span>
        <span class="price-change" id="priceChange"></span>
        <div class="toolbar-sep"></div>
        <button class="overlay-btn fvg on" id="btnFVG">FVG</button>
        <button class="overlay-btn ob on"  id="btnOB">OB</button>
        <button class="overlay-btn bb on"  id="btnBB">BB</button>
        <button class="overlay-btn sweep on" id="btnSweep">Sweep</button>
        <button id="diary-btn" title="구조 다이어리 작성">📓 구조 확인</button>
        <button id="analyze-btn">
          <span class="btn-icon">🔍</span>
          <div class="spinner"></div>
          ICT 분석 실행
        </button>
      </div>
      <div id="chart-container">
        <div id="chart"></div>
        <div id="log-panel"></div>
      </div>
    </div>

    <!-- 사이드 패널 -->
    <div id="side-col">

      <!-- 스코어카드 -->
      <div class="side-section">
        <div class="side-section-title">📊 진입 스코어카드</div>
        <div id="scorecard-body">
          <div class="sc-placeholder">분석 대기 중</div>
        </div>
      </div>

      <!-- AMD 상태 -->
      <div class="side-section">
        <div class="side-section-title">🔄 AMD 사이클</div>
        <div class="amd-row" id="amdRow">
          <div class="amd-stage" data-stage="ACCUMULATION">축적</div>
          <div class="amd-stage" data-stage="MANIPULATION">조작</div>
          <div class="amd-stage" data-stage="DISTRIBUTION">분배</div>
          <div class="amd-stage" data-stage="RESET">리셋</div>
        </div>
      </div>

      <!-- 구조 일지 -->
      <div class="side-section" style="flex:1;">
        <div class="side-section-title">📓 구조 일지</div>
        <div id="diary-body" class="diary-body">
          <div class="sc-placeholder">구조 확인 대기 중</div>
        </div>
      </div>
    </div>
  </div>

  <!-- 트레이딩 이력 -->
  <div id="history-section">
    <div id="history-header">
      <div class="live-dot"></div>
      <h3>트레이딩 이력</h3>
      <span class="trade-count" id="tradeCount">0 건</span>
    </div>
    <div id="history-table-wrap">
      <div id="history-empty">아직 체결된 거래가 없습니다. ICT 분석 후 진입 버튼을 누르면 DRY-RUN 거래가 기록됩니다.</div>
      <table id="history-table" style="display:none;">
        <thead>
          <tr>
            <th>시각</th>
            <th>페어</th>
            <th>방향</th>
            <th>진입가</th>
            <th>SL</th>
            <th>TP1</th>
            <th>R:R</th>
            <th>등급</th>
            <th>상태</th>
            <th>P&amp;L</th>
            <th>모드</th>
          </tr>
        </thead>
        <tbody id="history-tbody"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- 알림 토스트 -->
<div id="toast"></div>

<script>
'use strict';

// ── 상수 ───────────────────────────────────────────────────────────────────
const API = (() => {
  const p = new URLSearchParams(location.search).get('api');
  if (p) { localStorage.setItem('ict_api', p); return p.replace(/\/$/, ''); }
  const s = localStorage.getItem('ict_api');
  return s ? s.replace(/\/$/, '') : (location.hostname === 'localhost' ? 'http://localhost:3210' : '');
})();

// Binance (BTC/ETH/SOL)
const BINANCE_WS   = 'wss://stream.binance.com:9443/ws';
const BINANCE_REST = 'https://api.binance.com/api/v3';

// Bybit (HYPE — Binance 미상장)
const BYBIT_REST = 'https://api.bybit.com/v5/market/kline';
const BYBIT_WS   = 'wss://stream.bybit.com/v5/public/linear';

// 페어별 차트 소스는 /api/pairs 응답의 chartSource 필드로 결정된다
const findPairCfg = (symbol) => state.pairs.find(p => p.symbol === symbol);
const getChartSource = (symbol) => findPairCfg(symbol)?.chartSource || 'binance';

// Bybit interval 코드 매핑 (Binance tf → Bybit interval)
const BYBIT_TF = { '15m': '15', '4h': '240' };

const TF_MAP       = { '15m': '15m', '4h': '4h' };
const TF_LABEL     = { '15m': '15M', '4h': '4H' };
const TF_LIMIT     = { '15m': 1000, '4h': 500 };
const TF_BAR_SPACING = { '15m': 6, '4h': 8 };

// ── 페어 설정 로드 ────────────────────────────────────────────────────────────
const FALLBACK_PAIRS = [

// ── Inline detection helpers (browser-compatible, no require/module.exports) ──
function _bodySize(c) { return Math.abs(c.close - c.open); }
function _totalRange(c) { return c.high - c.low; }
function _rollingAvgBody(candles, win, endIdx) {
  const start = Math.max(0, endIdx - win);
  const slice = candles.slice(start, endIdx);
  if (!slice.length) return 0;
  return slice.reduce((s, c) => s + _bodySize(c), 0) / slice.length;
}
function _isDisplacement(candle, candles, endIdx, cfg) {
  const { rollingWindow, bodyMultiplier, maxWickRatio, closeAtExtremeRatio } = cfg;
  const avgBody = _rollingAvgBody(candles, rollingWindow, endIdx);
  if (avgBody === 0) return false;
  const body = _bodySize(candle);
  if (body < avgBody * bodyMultiplier) return false;
  const range = _totalRange(candle);
  if (range === 0) return false;
  const isBull = candle.close > candle.open;
  const oppositeWick = isBull ? candle.open - candle.low : candle.high - candle.open;
  if (oppositeWick / range > maxWickRatio) return false;
  const closePos = isBull ? (candle.close - candle.low) / range : (candle.high - candle.close) / range;
  return closePos >= closeAtExtremeRatio;
}
function _detectFVG(candles, { minGapPct }) {
  const fvgs = [];
  for (let i = 2; i < candles.length; i++) {
    const c1 = candles[i - 2], c2 = candles[i - 1], c3 = candles[i];
    if (c3.low > c1.high) {
      const gap = c3.low - c1.high;
      if (gap / c1.high >= minGapPct) fvgs.push({ index: i - 1, time: c2.time, high: c3.low, low: c1.high, direction: 'bull', status: 'active' });
    }
    if (c1.low > c3.high) {
      const gap = c1.low - c3.high;
      if (gap / c1.low >= minGapPct) fvgs.push({ index: i - 1, time: c2.time, high: c1.low, low: c3.high, direction: 'bear', status: 'active' });
    }
  }
  for (const fvg of fvgs) {
    for (let i = fvg.index + 2; i < candles.length; i++) {
      const { high, low, close } = candles[i];
      if (low > fvg.high || high < fvg.low) continue;
      if (fvg.direction === 'bull' && close < fvg.low) { fvg.status = 'mitigated'; break; }
      if (fvg.direction === 'bear' && close > fvg.high) { fvg.status = 'mitigated'; break; }
      fvg.status = 'tested';
    }
  }
  return fvgs;
}
function _detectOrderBlocks(candles, isDispFn) {
  const obs = [];
  for (let i = 0; i < candles.length - 1; i++) {
    const curr = candles[i], next = candles[i + 1];
    if (curr.close < curr.open && next.close > curr.high && isDispFn(next, candles, i + 1))
      obs.push({ index: i, time: curr.time, high: Math.max(curr.open, curr.close), low: Math.min(curr.open, curr.close), direction: 'bull', status: 'active' });
    if (curr.close > curr.open && next.close < curr.low && isDispFn(next, candles, i + 1))
      obs.push({ index: i, time: curr.time, high: Math.max(curr.open, curr.close), low: Math.min(curr.open, curr.close), direction: 'bear', status: 'active' });
  }
  for (const ob of obs) {
    for (let i = ob.index + 2; i < candles.length; i++) {
      const close = candles[i].close;
      if (ob.direction === 'bull' && close < ob.low) { ob.status = 'invalidated'; break; }
      if (ob.direction === 'bear' && close > ob.high) { ob.status = 'invalidated'; break; }
    }
  }
  return obs;
}
function _detectBreakerBlocks(candles, obs, cfg) {
  const { retestMinCandles, retestMaxCandles, immediateReverseCandles } = cfg;
  const bbs = [];
  for (const ob of obs) {
    if (ob.status !== 'invalidated') continue;
    let breakIdx = -1;
    for (let i = ob.index + 1; i < candles.length; i++) {
      if (ob.direction === 'bull' && candles[i].close < ob.low)  { breakIdx = i; break; }
      if (ob.direction === 'bear' && candles[i].close > ob.high) { breakIdx = i; break; }
    }
    if (breakIdx === -1) continue;
    let immediateReverse = false;
    const checkEnd = Math.min(breakIdx + immediateReverseCandles, candles.length);
    for (let i = breakIdx + 1; i < checkEnd; i++) {
      if (ob.direction === 'bull' && candles[i].close > ob.low)  { immediateReverse = true; break; }
      if (ob.direction === 'bear' && candles[i].close < ob.high) { immediateReverse = true; break; }
    }
    if (immediateReverse) continue;
    const retestStart = breakIdx + retestMinCandles;
    const retestEnd   = Math.min(breakIdx + retestMaxCandles, candles.length - 1);
    for (let i = retestStart; i <= retestEnd; i++) {
      const c = candles[i];
      if (c.low <= ob.high && c.high >= ob.low) {
        bbs.push({ index: ob.index, time: ob.time, high: ob.high, low: ob.low, direction: ob.direction === 'bull' ? 'bear' : 'bull', retestStatus: 'pending', retestIndex: i });
        break;
      }
    }
  }
  return bbs;
}

const ICT_CFG = {
  fvg:          { minGapPct: 0.001 },
  displacement: { rollingWindow: 10, bodyMultiplier: 1.5, maxWickRatio: 0.3, closeAtExtremeRatio: 0.6 },
  breakerBlock: { retestMinCandles: 5, retestMaxCandles: 20, immediateReverseCandles: 3 },
};

function loadAutoLevels(candles) {
  if (!candles || candles.length < 3) return;
  state.candles = candles;
  const isDispFn = (c, cs, idx) => _isDisplacement(c, cs, idx, ICT_CFG.displacement);
  const fvgs = _detectFVG(candles, ICT_CFG.fvg);
  const obs  = _detectOrderBlocks(candles, isDispFn);
  const bbs  = _detectBreakerBlocks(candles, obs, ICT_CFG.breakerBlock);
  const currentPrice = candles[candles.length - 1].close;
  zonePrimitive.setZones(normalizeZones({ fvgs, obs, bbs }, currentPrice, state.overlays));
}

function tsToUnix(t) {
  if (typeof t === 'number') return t;
  if (typeof t === 'string') { const n = Number(t); return isNaN(n) ? Math.floor(new Date(t).getTime() / 1000) : n; }
  return 0;
}

function mapBBStatus(s) {
  return s === 'pending' ? 'active' : s === 'tested' ? 'mitigated' : s === 'failed' ? 'invalidated' : 'active';
}

function normalizeZones(levels, entryPrice, overlays) {
  const out = [];
  if (overlays.fvg) {
    for (const f of (levels.fvgs ?? [])) {
      if ((f.status ?? 'active') !== 'active') continue;
      out.push({ kind: 'fvg', time: tsToUnix(f.time), high: f.high, low: f.low, direction: f.direction, status: 'active' });
    }
  }
  if (overlays.ob) {
    for (const ob of (levels.obs ?? [])) {
      if ((ob.status ?? 'active') !== 'active') continue;
      out.push({ kind: 'ob', time: tsToUnix(ob.time), high: ob.high, low: ob.low, direction: ob.direction, status: 'active' });
    }
  }
  if (overlays.bb) {
    for (const bb of (levels.bbs ?? [])) {
      const st = mapBBStatus(bb.retestStatus);
      if (st !== 'active') continue;
      out.push({ kind: 'bb', time: tsToUnix(bb.time), high: bb.high, low: bb.low, direction: bb.direction, status: 'active' });
    }
  }
  return sortByProximity(out, entryPrice, 13);
}

const ZONE_COLORS = { fvg: '#22D3EE', ob: '#A78BFA', bb: '#FB923C' };

const STATUS_ALPHA = {
  active:      { fill: 0.18, dash: [],     border: 0.90 },
  tested:      { fill: 0.10, dash: [6, 4], border: 0.55 },
  mitigated:   { fill: 0.05, dash: [2, 4], border: 0.28 },
  invalidated: { fill: 0.03, dash: [2, 6], border: 0.18 },
};

function hexAlpha(hex, alpha) {
  const r = parseInt(hex.slice(1, 3), 16);
  const g = parseInt(hex.slice(3, 5), 16);
  const b = parseInt(hex.slice(5, 7), 16);
  return `rgba(${r},${g},${b},${alpha.toFixed(2)})`;
}

class ZoneRenderer {
  constructor(source) { this._source = source; }

  draw(target) {
    target.useBitmapCoordinateSpace((scope) => {
      const ctx  = scope.context;
      const hpr  = scope.horizontalPixelRatio;
      const vpr  = scope.verticalPixelRatio;
      const W    = scope.bitmapSize.width;
      const ts   = this._source._chart.timeScale();
      const ser  = this._source._series;
      const showLabels = W / hpr >= 600;
      const usedLabelY = [];

      for (const z of this._source._zones) {
        const xL = ts.timeToCoordinate(z.time);
        if (xL == null) continue;
        const yT = ser.priceToCoordinate(z.high);
        const yB = ser.priceToCoordinate(z.low);
        if (yT == null || yB == null) continue;

        const x0   = Math.max(0, Math.round(xL * hpr));
        const x1   = W;
        const y0   = Math.round(Math.min(yT, yB) * vpr);
        const y1   = Math.round(Math.max(yT, yB) * vpr);
        const boxH = y1 - y0;
        if (boxH < 1 || x0 >= x1) continue;

        const baseColor = ZONE_COLORS[z.kind];
        const sa        = STATUS_ALPHA[z.status] ?? STATUS_ALPHA.active;
        const isBull    = z.direction === 'bull';

        ctx.fillStyle = hexAlpha(baseColor, sa.fill);
        ctx.fillRect(x0, y0, x1 - x0, boxH);

        ctx.setLineDash(sa.dash.map(v => v * hpr));

        const topW     = isBull ? 1 * vpr : 2 * vpr;
        const topAlpha = isBull ? sa.border * 0.4 : sa.border;
        ctx.lineWidth   = topW;
        ctx.strokeStyle = hexAlpha(baseColor, topAlpha);
        ctx.beginPath(); ctx.moveTo(x0, y0 + topW / 2); ctx.lineTo(x1, y0 + topW / 2); ctx.stroke();

        const botW     = isBull ? 2 * vpr : 1 * vpr;
        const botAlpha = isBull ? sa.border : sa.border * 0.4;
        ctx.lineWidth   = botW;
        ctx.strokeStyle = hexAlpha(baseColor, botAlpha);
        ctx.beginPath(); ctx.moveTo(x0, y1 - botW / 2); ctx.lineTo(x1, y1 - botW / 2); ctx.stroke();

        ctx.setLineDash([]);

        if (showLabels) {
          const abbr  = { active: '', tested: '', mitigated: '·m', invalidated: '·x' };
          const label = z.kind.toUpperCase() + (abbr[z.status] ?? '');
          const fs    = 11 * vpr;
          ctx.font    = `600 ${fs}px Inter, sans-serif`;
          const tw    = ctx.measureText(label).width;
          const lx    = x1 - tw - 4 * hpr;
          let   ly    = Math.round((y0 + y1) / 2);

          let shifted = 0;
          while (shifted < 3 && usedLabelY.some(uy => Math.abs(uy - ly) < 14 * vpr)) {
            ly += 8 * vpr * (shifted % 2 === 0 ? 1 : -1) * (shifted + 1);
            shifted++;
          }
          if (shifted < 3) {
            usedLabelY.push(ly);
            const lh = fs * 1.3;
            ctx.fillStyle = 'rgba(0,0,0,0.55)';
            ctx.fillRect(lx - 3 * hpr, ly - lh * 0.85, tw + 6 * hpr, lh);
            ctx.fillStyle = hexAlpha(baseColor, 0.95);
            ctx.fillText(label, lx, ly);
          }
        }
      }
    });
  }
}

class ZonePaneView {
  constructor(source) { this._source = source; this._renderer = new ZoneRenderer(source); }
  renderer() { return this._renderer; }
  zOrder()   { return 'normal'; }
}

class ZoneOverlayPrimitive {
  constructor(chart, series) { this._chart = chart; this._series = series; this._zones = []; }
  setZones(zones) {
    this._zones = zones;
    if (typeof this.requestUpdate === 'function') {
      this.requestUpdate();
    } else {
      const ts = this._chart.timeScale();
      ts.applyOptions({ rightOffset: ts.options().rightOffset });
    }
  }
  paneViews()      { return [new ZonePaneView(this)]; }
  updateAllViews() {}
}

// ── 캔들 데이터 로드 ───────────────────────────────────────────────────────
async function loadCandles() {
  const { pair, tf } = state;
  const limit  = TF_LIMIT[tf] || 200;
  const exch   = getChartSource(pair);

  try {
    let candles;

    if (exch === 'bybit') {
      // ── Bybit ──────────────────────────────────────────────────────────
      const interval = BYBIT_TF[tf] || '60';
      const url = `${BYBIT_REST}?category=linear&symbol=${pair}&interval=${interval}&limit=${limit}`;
      const resp = await fetch(url);
      const json = await resp.json();
      if (json.retCode !== 0) throw new Error(`Bybit: ${json.retMsg}`);
      // Bybit는 [시간(ms), open, high, low, close, volume, turnover] 역순(최신→과거)
      candles = json.result.list
        .map(k => ({
          time:  Math.floor(parseInt(k[0]) / 1000),
          open:  parseFloat(k[1]),
          high:  parseFloat(k[2]),
          low:   parseFloat(k[3]),
          close: parseFloat(k[4]),
        }))
        .reverse(); // 과거→최신 순으로 정렬

    } else {
      // ── Binance ────────────────────────────────────────────────────────
      const resp = await fetch(`${BINANCE_REST}/klines?symbol=${pair}&interval=${tf}&limit=${limit}`);
      const raw  = await resp.json();
      if (!Array.isArray(raw)) throw new Error('Binance: 잘못된 응답');
      candles = raw.map(k => ({
        time:  Math.floor(k[0] / 1000),
        open:  parseFloat(k[1]),
        high:  parseFloat(k[2]),
        low:   parseFloat(k[3]),
        close: parseFloat(k[4]),
      }));
    }

    chart.priceScale('right').applyOptions({ autoScale: true });
    candleSeries.setData(candles);
    if (candles.length) {
      state.candleRange = { from: candles[0].time, to: candles[candles.length - 1].time };
    }
    chart.timeScale().applyOptions({ barSpacing: TF_BAR_SPACING[tf] || 6 });
    chart.timeScale().scrollToRealTime();
    updatePriceDisplay(candles[candles.length - 1]);
    loadAutoLevels(candles);

  } catch (e) {
    showToast(`캔들 데이터 로드 실패 (${exch}): ${e.message}`, 'error');
  }
}

function updatePriceDisplay(candle) {
  if (!candle) return;
  const priceEl  = document.getElementById('priceDisplay');
  const changeEl = document.getElementById('priceChange');
  priceEl.textContent = formatPrice(candle.close);
  const pct = ((candle.close - candle.open) / candle.open * 100).toFixed(2);
  const up  = candle.close >= candle.open;
  changeEl.textContent = `${up ? '+' : ''}${pct}%`;
  changeEl.className = `price-change ${up ? 'up' : 'dn'}`;
}

// ── WebSocket: 실시간 틱 ───────────────────────────────────────────────────
let ws = null;
function connectWS() {
  if (ws) {
    ws.onclose = null;
    ws.onerror = null;
    ws.onmessage = null;
    try { ws.close(); } catch (_) {}
    ws = null;
  }

  const { pair, tf } = state;
  const exch = getChartSource(pair);

  if (exch === 'bybit') {
    // ── Bybit WebSocket ─────────────────────────────────────────────────
    const interval = BYBIT_TF[tf] || '60';
    ws = new WebSocket(BYBIT_WS);
    ws.onopen = () => {
      ws.send(JSON.stringify({ op: 'subscribe', args: [`kline.${interval}.${pair}`] }));
    };
    ws.onmessage = (e) => {
      try {
        const msg = JSON.parse(e.data);
        // 구독 확인 메시지 무시
        if (msg.op === 'subscribe' || !msg.data) return;
        const k = msg.data[0];
        if (!k) return;
        const candle = {
          time:  Math.floor(parseInt(k.start) / 1000),
          open:  parseFloat(k.open),
          high:  parseFloat(k.high),
          low:   parseFloat(k.low),
          close: parseFloat(k.close),
        };
        candleSeries.update(candle);
        updatePriceDisplay(candle);
        updateKillzoneBadge();
      } catch (_) {}
    };
    ws.onclose = () => { setTimeout(connectWS, 3000); };
    ws.onerror = () => { ws.close(); };

  } else {
    // ── Binance WebSocket ────────────────────────────────────────────────
    const stream = `${pair.toLowerCase()}@kline_${tf}`;
    ws = new WebSocket(`${BINANCE_WS}/${stream}`);
    ws.onmessage = (e) => {
      try {
        const msg = JSON.parse(e.data);
        const k   = msg.k;
        if (!k) return;
        const candle = {
          time:  Math.floor(k.t / 1000),
          open:  parseFloat(k.o),
          high:  parseFloat(k.h),
          low:   parseFloat(k.l),
          close: parseFloat(k.c),
        };
        candleSeries.update(candle);
        updatePriceDisplay(candle);
        updateKillzoneBadge();
      } catch (_) {}
    };
    ws.onclose = () => { setTimeout(connectWS, 3000); };
    ws.onerror = () => { ws.close(); };
  }
}

const KILLZONES = [
  { name: '아시아', start: 0, end: 2 },
  { name: '런던', start: 7, end: 9 },
  { name: '뉴욕', start: 12, end: 14 },
  { name: 'NY PM', start: 18, end: 20 },
];

function updateKillzoneBadge() {
  const h = new Date().getUTCHours();
  const kz = KILLZONES.find(k => h >= k.start && h < k.end);
  const el = document.getElementById('kzBadge');
  if (kz) {
    el.textContent = `🔔 킬존: ${kz.name}`;
    el.className = 'kz-badge';
  } else {
    el.textContent = '킬존 대기';
    el.className = 'kz-badge inactive';
  }
}

// ── 오버레이 렌더링 ────────────────────────────────────────────────────────
const overlayLines = [];

function clearAllPriceLines() {
  overlayLines.forEach(s => { try { chart.removeSeries(s); } catch (_) {} });
  overlayLines.length = 0;
}

function addPriceLine({ price, color, lineWidth = 1, lineStyle = 0, axisLabelVisible = false, title = '' }) {
  const seriesOpts = {
    color, lineWidth, lineStyle,
    lastValueVisible: axisLabelVisible,
    priceLineVisible: false,
    crosshairMarkerVisible: false,
  };
  if (axisLabelVisible && title) {
    seriesOpts.priceFormat = { type: 'custom', formatter: () => title };
  }
  const s = chart.addLineSeries(seriesOpts);
  const from = state.candleRange?.from || 1577836800;
  const to   = state.candleRange?.to   || Math.floor(Date.now() / 1000);
  s.setData([{ time: from, value: price }, { time: to, value: price }]);
  overlayLines.push(s);
  return s;
}

function clearOverlayLines() {
  ['entry', 'sl', 'tp1', 'tp2', 'bos'].forEach(k => {
    if (lineSeriesCache[k]) {
      try { chart.removeSeries(lineSeriesCache[k]); } catch (_) {}
      delete lineSeriesCache[k];
    }
  });
  clearAllPriceLines();
  candleSeries.setMarkers([]);
  zonePrimitive.setZones([]);
}

function renderSignalOverlays(signal) {
  if (!signal || signal.direction === 'NEUTRAL') return;

  const now = Math.floor(Date.now() / 1000);

  // 진입 라인 (황금색 실선)
  const entryPrice = signal.entry?.price ?? signal.entry;
  if (entryPrice) {
    addPriceLine({ price: entryPrice, color: '#FCD535', lineWidth: 1, lineStyle: 0, axisLabelVisible: true, title: `진입 ${formatPrice(entryPrice)}` });
  }
  // SL 라인 (빨간색 점선)
  if (signal.sl) {
    addPriceLine({ price: signal.sl, color: '#F6465D', lineWidth: 1, lineStyle: 1, axisLabelVisible: true, title: `SL ${formatPrice(signal.sl)}` });
  }
  // TP1 (녹색 점선)
  if (signal.tp && signal.tp[0]) {
    addPriceLine({ price: signal.tp[0], color: '#0ECB81', lineWidth: 1, lineStyle: 1, axisLabelVisible: true, title: `TP1 ${formatPrice(signal.tp[0])}` });
  }
  // TP2 (녹색 점선, 얇게)
  if (signal.tp && signal.tp[1]) {
    addPriceLine({ price: signal.tp[1], color: '#0ECB81', lineWidth: 1, lineStyle: 2, axisLabelVisible: true, title: `TP2 ${formatPrice(signal.tp[1])}` });
  }

  // Sweep 마커
  const markers = [];
  if (signal.sweep && state.overlays.sweep) {
    (signal.sweep.sweepEvents || []).forEach(s => markers.push({
      time: s.time,
      position: s.type === 'BSL' ? 'aboveBar' : 'belowBar',
      color: '#FCD535',
      shape: 'circle',
      text: s.type,
      size: 0.5,
    }));
  }
  // 동일 time 마커 겹침 방지: 두 번째 이상은 inBar로
  const seenTimes = new Map();
  markers.forEach(m => {
    const count = seenTimes.get(m.time) || 0;
    if (count > 0) m.position = 'inBar';
    seenTimes.set(m.time, count + 1);
  });
  if (markers.length) {
    markers.sort((a, b) => a.time - b.time);
    candleSeries.setMarkers(markers);
  }

  if (state.useBoxOverlays) {
    const ePrice = signal.entry?.price ?? signal.entry;
    zonePrimitive.setZones(normalizeZones(signal.levels ?? {}, ePrice, state.overlays));
  }
}

// Sort levels by proximity to entry price, keeping entry-containing level first
function sortByProximity(levels, entryPrice, limit) {
  if (!entryPrice || !levels || !levels.length) return levels.slice(0, limit);
  const dist = (l) => {
    if (l.low <= entryPrice && entryPrice <= l.high) return -1; // entry inside this level → highest priority
    return Math.min(Math.abs(l.high - entryPrice), Math.abs(l.low - entryPrice));
  };
  return [...levels].sort((a, b) => dist(a) - dist(b)).slice(0, limit);
}

function renderFVGBands(fvgs) {
  if (!state.overlays.fvg || !fvgs || !fvgs.length) return;
  const entryPrice = state.signal?.entry?.price ?? state.signal?.entry;
  const toRender = sortByProximity(fvgs, entryPrice, 5);
  toRender.forEach((fvg, i) => {
    addPriceLine({ price: fvg.high, color: 'rgba(34,211,238,0.4)', lineWidth: 1, lineStyle: 2, title: i === 0 ? 'FVG↑' : '' });
    addPriceLine({ price: fvg.low,  color: 'rgba(34,211,238,0.4)', lineWidth: 1, lineStyle: 2, title: i === 0 ? 'FVG↓' : '' });
  });
}

function renderOBLines(obs) {
  if (!state.overlays.ob || !obs || !obs.length) return;
  const entryPrice = state.signal?.entry?.price ?? state.signal?.entry;
  const toRender = sortByProximity(obs, entryPrice, 5);
  toRender.forEach((ob, i) => {
    // entry OB (index 0 when it contains entry price) gets full opacity highlight
    const isEntryOB = entryPrice && ob.low <= entryPrice && entryPrice <= ob.high;
    const color = isEntryOB ? 'rgba(167,139,250,0.9)' : 'rgba(167,139,250,0.5)';
    const lw    = isEntryOB ? 2 : 1;
    addPriceLine({ price: ob.high, color, lineWidth: lw, lineStyle: 2, title: isEntryOB ? 'OB(진입)↑' : (i === 0 ? 'OB↑' : '') });
    addPriceLine({ price: ob.low,  color, lineWidth: lw, lineStyle: 2, title: isEntryOB ? 'OB(진입)↓' : (i === 0 ? 'OB↓' : '') });
  });
}

function renderBBLines(bbs) {
  if (!state.overlays.bb || !bbs || !bbs.length) return;
  const entryPrice = state.signal?.entry?.price ?? state.signal?.entry;
  const toRender = sortByProximity(bbs, entryPrice, 3);
  toRender.forEach((bb, i) => {
    addPriceLine({ price: bb.high, color: 'rgba(251,146,60,0.5)', lineWidth: 1, lineStyle: 2, title: i === 0 ? 'BB↑' : '' });
    addPriceLine({ price: bb.low,  color: 'rgba(251,146,60,0.5)', lineWidth: 1, lineStyle: 2, title: i === 0 ? 'BB↓' : '' });
  });
}

// ── 스코어카드 렌더링 ──────────────────────────────────────────────────────
function renderScorecard(sc, signal) {
  const body = document.getElementById('scorecard-body');
  if (!sc) {
    if (signal) {
      const reason = signal.reason || (signal.tier ? `Tier ${signal.tier} — 정렬 불충분` : '진입 조건 미충족');
      body.innerHTML = `<div class="sc-placeholder">중립 — ${reason}</div>`;
    } else {
      body.innerHTML = '<div class="sc-placeholder">분석 대기 중</div>';
    }
    return;
  }

  const dir      = signal?.direction;
  const htfTrend = signal?.structure?.htfTrend;

  function structureReason(score) {
    // 'ranging' is direction-neutral — never penalize or reward for direction mismatch
    const isBull = htfTrend === 'bull';
    const isBear = htfTrend === 'bear';
    const match = (isBull && dir === 'LONG') || (isBear && dir === 'SHORT');
    // Korean trend label with proper ranging support
    const tl = htfTrend === 'bull' ? '상승' : htfTrend === 'bear' ? '하락' : htfTrend === 'ranging' ? '횡보' : (htfTrend || '?');
    return { cls: score > 0 ? 'pass' : 'fail', text: `HTF ${tl} 추세 — 방향 ${match ? '일치' : (isBull || isBear ? '역행' : '중립')}` };
  }
  function timeReason(score) {
    return score > 0
      ? { cls: 'pass', text: '킬존 진입 확인' }
      : { cls: 'warn', text: '킬존 외 시간대' };
  }
  function priceReason(score, oteZone) {
    if (!oteZone) return { cls: 'warn', text: '가격 구간 미확인' };
    if (oteZone === 'OTE')     return { cls: 'pass', text: 'OTE 구간 (62~79%)' };
    if (oteZone === 'SHALLOW') return { cls: 'warn', text: '얕은 되돌림 (50~62%)' };
    if (oteZone === 'DEEP')    return { cls: 'fail', text: '깊은 되돌림 (79%+)' };
    if (oteZone === 'PREMIUM') return { cls: 'fail', text: 'PREMIUM 구간 (<50%)' };
    return { cls: 'warn', text: oteZone };
  }
  function pdArrayReason(score) {
    if (score >= 2) return { cls: 'pass', text: '복수 POI 중첩 확인' };
    if (score >= 1) return { cls: 'warn', text: '단일 POI 확인' };
    return { cls: 'fail', text: 'POI 없음' };
  }
  function liquidityReason(score) {
    return score > 0
      ? { cls: 'pass', text: '유동성 스윕 확인' }
      : { cls: 'warn', text: '스윕 미확인' };
  }

  const items = [
    { label: '1. 구조 (Structure)',   score: sc.breakdown?.structure ?? '—', max: 1, reason: () => structureReason(sc.breakdown?.structure) },
    { label: '2. 시간 (Killzone)',    score: sc.breakdown?.time      ?? '—', max: 1, reason: () => timeReason(sc.breakdown?.time) },
    { label: '3. 가격 (OTE)',         score: sc.breakdown?.price     ?? '—', max: 1, reason: () => priceReason(sc.breakdown?.price, sc.oteZone) },
    { label: '4. PD Array',           score: sc.breakdown?.pdArray   ?? '—', max: 2, reason: () => pdArrayReason(sc.breakdown?.pdArray) },
    { label: '5. 유동성 (Liquidity)', score: sc.breakdown?.liquidity ?? '—', max: 1, reason: () => liquidityReason(sc.breakdown?.liquidity) },
  ];

  const gradeClass = `grade-${sc.grade || 'C'}`;
  const totalColor = sc.grade === 'S' ? '#FCD535' : sc.grade === 'A' ? '#0ECB81' : sc.grade === 'B' ? '#F0B90B' : '#848E9C';

  body.innerHTML = `
    <div class="scorecard-items">
      ${items.map(it => {
        const num = typeof it.score === 'number' ? it.score : 0;
        const pct = it.max > 0 ? Math.max(0, Math.min(100, (num / it.max) * 100)) : 0;
        const color = num > 0 ? (num >= it.max ? '#0ECB81' : '#F0B90B') : num < 0 ? '#F6465D' : '#2B2F36';
        const r = typeof it.score === 'number' ? it.reason() : null;
        return `
          <div class="sc-item-wrap">
            <div class="sc-item">
              <span class="sc-label">${it.label}</span>
              <span class="sc-score" style="color:${color}">${it.score}</span>
              <div class="sc-bar"><div class="sc-bar-fill" style="width:${pct}%;background:${color}"></div></div>
            </div>
            ${r ? `<div class="sc-reason ${r.cls}">${r.text}</div>` : ''}
          </div>`;
      }).join('')}
    </div>
    <div class="scorecard-total">
      <div>
        <div class="sc-total-label">총점</div>
        <div class="sc-total-val" style="color:${totalColor}">${sc.total ?? '—'}<span style="font-size:12px;color:var(--muted)">/6</span></div>
      </div>
      <div>
        <div class="sc-total-label" style="text-align:right;margin-bottom:4px">등급</div>
        <div class="sc-grade-badge ${gradeClass}">${sc.grade || '—'}</div>
      </div>
    </div>
    ${sc.sizeMultiplier != null ? `<div style="margin-top:8px;display:flex;align-items:center;gap:8px"><span style="font-size:11px;color:var(--muted)">포지션 배율</span><span class="sc-size-badge">×${sc.sizeMultiplier.toFixed(1)}</span></div>` : ''}
  `;
}

// ── 거래 이력 렌더링 ──────────────────────────────────────────────────────
function renderHistory(trades) {
  const tbody = document.getElementById('history-tbody');
  const empty = document.getElementById('history-empty');
  const table = document.getElementById('history-table');
  const count = document.getElementById('tradeCount');

  count.textContent = `${trades.length} 건`;

  if (!trades.length) {
    empty.style.display = 'block';
    table.style.display = 'none';
    return;
  }

  empty.style.display = 'none';
  table.style.display = 'table';

  tbody.innerHTML = trades.map(t => {
    const isLong = t.direction === 'LONG';
    const pnl = t.pnl != null ? t.pnl.toFixed(2) : '—';
    const pnlClass = t.pnl > 0 ? 'pos' : t.pnl < 0 ? 'neg' : '';
    const ts = t.timestamp ? (t.timestamp < 1e10 ? t.timestamp * 1000 : t.timestamp) : null;
    const time = ts ? new Date(ts).toLocaleTimeString('ko-KR', { hour:'2-digit', minute:'2-digit', second:'2-digit' }) : '—';
    return `<tr>
      <td>${time}</td>
      <td>${t.pair || state.pair}</td>
      <td class="${isLong ? 'td-long' : 'td-short'}">${t.direction || '—'}</td>
      <td>${formatPrice(t.entry?.price ?? t.entry)}</td>
      <td class="td-short">${formatPrice(t.sl)}</td>
      <td class="td-bull" style="color:var(--bull)">${t.tp?.[0] ? formatPrice(t.tp[0]) : '—'}</td>
      <td>${t.rr ? t.rr.toFixed(1) : '—'}</td>
      <td class="td-grade grade-${t.scorecard?.grade || 'C'}" style="color:var(--primary)">${t.scorecard?.grade || '—'}</td>
      <td class="${t.status === 'open' ? 'td-status-open' : 'td-status-closed'}">${t.status || 'dry-run'}</td>
      <td class="td-pnl ${pnlClass}">${pnl !== '—' ? (t.pnl > 0 ? '+' : '') + pnl + '%' : '—'}</td>
      <td><span class="td-mode">DRY</span></td>
    </tr>`;
  }).join('');
}


// ── 전체 페어 자동 분석 ───────────────────────────────────────────────────
async function runAnalyzeAll() {
  const badge = document.getElementById('analyze-all-badge');
  const text  = document.getElementById('analyze-all-text');
  badge.classList.add('visible');
  text.textContent = '전체 분석 중...';
  try {
    const resp = await fetch(`${API}/api/analyze-all`, {
      method: 'POST',
      signal: AbortSignal.timeout(90_000),
    });
    // 409 체크를 json() 파싱 전에 먼저 처리
    if (resp.status === 409) {
      // already running — silently wait for SSE analyze-done to trigger reload
      return;
    }
    let data;
    try {
      data = await resp.json();
    } catch (_) {
      console.error('[runAnalyzeAll] non-JSON response, status:', resp.status);
      if (resp.status === 404) showToast('서버를 재시작해주세요 (구버전 실행 중)', 'error');
      else showToast(`서버 오류 (HTTP ${resp.status}) — 재시작 후 새로고침`, 'error');
      return;
    }
    if (resp.ok) {
      const failed = data.results?.filter(r => r.error) ?? [];
      const done   = (data.results?.length ?? 0) - failed.length;
      const total  = data.results?.length ?? 0;
      if (failed.length > 0) {
        failed.forEach(r => showToast(`${r.pair} 분석 실패: ${r.error}`, 'error'));
      } else {
        showToast(`전체 분석 완료 (${done}/${total}페어)`, 'success');
      }
      await loadLatestSignal();
      await loadLatestDiary();
    } else {
      showToast(data.message || '전체 분석 실패', 'error');
    }
  } catch (e) {
    console.error('[runAnalyzeAll] fetch error:', e);
    showToast('서버 연결 실패: ' + e.message, 'error');
  } finally {
    badge.classList.remove('visible');
  }
}

// ── 분석 실행 ─────────────────────────────────────────────────────────────
async function runAnalysis() {
  if (state.analyzing) return;
  state.analyzing = true;

  const btn = document.getElementById('analyze-btn');
  btn.disabled = true;
  btn.classList.add('loading');

  const logPanel = document.getElementById('log-panel');
  logPanel.innerHTML = '';
  logPanel.classList.add('visible');

  try {
    const resp = await fetch(`${API}/api/analyze`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ pair: state.pair, tf: state.tf }),
    });
    const data = await resp.json();
    if (!resp.ok) {
      showToast(data.message || data.error || '분석 실패', 'error');
      resetAnalyzeBtn();
      return;
    }
    if (data.direction !== undefined) {
      // Vercel: analyze 엔드포인트가 신호를 직접 반환
      applySignal(data);
      resetAnalyzeBtn();
      showToast(`분석 완료: ${data.pair} — ${data.direction}`, 'success');
      loadLatestDiary();
      loadTrades();
    } else {
      showToast('분석 시작됨 — 로그 패널을 확인하세요', 'info');
    }
  } catch (e) {
    showToast('서버 연결 실패: ' + e.message, 'error');
    resetAnalyzeBtn();
  }
}

function resetAnalyzeBtn() {
  state.analyzing = false;
  const btn = document.getElementById('analyze-btn');
  btn.disabled = false;
  btn.classList.remove('loading');
}

// ── 구조 다이어리 ─────────────────────────────────────────────────────────
async function runDiary() {
  if (state.diaryLoading) return;
  state.diaryLoading = true;

  const btn = document.getElementById('diary-btn');
  btn.disabled = true;
  btn.textContent = '⏳ 분석 중…';

  try {
    const resp = await fetch(`${API}/api/diary`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ pair: state.pair }),
    });
    const data = await resp.json();
    if (resp.ok && data.ok) {
      renderDiary(data.diary);
      showToast('구조 다이어리 작성 완료', 'success');
    } else {
      showToast(data.message || '다이어리 생성 실패', 'error');
    }
  } catch (e) {
    showToast('서버 연결 실패: ' + e.message, 'error');
  } finally {
    state.diaryLoading = false;
    btn.disabled = false;
    btn.textContent = '📓 구조 확인';
  }
}

function renderDiary(md) {
  const el = document.getElementById('diary-body');
  if (!md) {
    el.innerHTML = '<div class="sc-placeholder">구조 확인 대기 중</div>';
    return;
  }
  const clean = md.replace(/^---[\s\S]*?---\n*/, '');
  const div = document.createElement('div');
  div.className = 'diary-rendered';
  div.innerHTML = marked.parse(clean, { breaks: true });
  el.innerHTML = '';
  el.appendChild(div);
}

async function loadLatestDiary() {
  try {
    const resp = await fetch(`${API}/api/latest-diary?pair=${state.pair}`);
    const data = await resp.json();
    if (data.ok && data.diary) renderDiary(data.diary);
  } catch (_) {}
}

function appendLog(line) {
  const logPanel = document.getElementById('log-panel');
  const level = line.match(/\[(INFO|DEBUG|WARN|ERROR)\]/)?.[1] || 'INFO';
  const div = document.createElement('div');
  div.className = `log-line ${level}`;
  div.textContent = line;
  logPanel.appendChild(div);
  logPanel.scrollTop = logPanel.scrollHeight;
}

// ── 데이터 로드 ───────────────────────────────────────────────────────────
async function loadTrades() {
  try {
    const resp = await fetch(`${API}/api/trades`);
    const trades = await resp.json();
    state.trades = Array.isArray(trades) ? trades : [];
    renderHistory(state.trades);
  } catch (_) {}
}

function applySignal(signal) {
  if (!signal) return;
  state.signal = signal;
  state.lastSignal = signal;
  state.overlayData.fvgs   = signal.levels?.fvgs   ?? [];
  state.overlayData.obs    = signal.levels?.obs    ?? [];
  state.overlayData.bbs    = signal.levels?.bbs    ?? [];
  state.overlayData.sweeps = signal.levels?.sweeps ?? [];
  clearOverlayLines();
  renderScorecard(signal.scorecard, signal);
  renderAMD(signal.structure?.amdPhase);
  renderSignalOverlays(signal);
  if (signal.direction === 'NEUTRAL' && state.candles) loadAutoLevels(state.candles);
  if (!state.useBoxOverlays) {
    if (signal.levels?.fvgs) renderFVGBands(signal.levels.fvgs);
    if (signal.levels?.obs)  renderOBLines(signal.levels.obs);
    if (signal.levels?.bbs)  renderBBLines(signal.levels.bbs);
  }
}

async function loadLatestSignal() {
  try {
    const resp = await fetch(`${API}/api/latest-signal?pair=${state.pair}`);
    if (!resp.ok) return;
    const signal = await resp.json();
    applySignal(signal);
  } catch (_) {}
}

// ── SSE 연결 (로컬 서버 전용) ─────────────────────────────────────────────
function connectSSE() {
  if (!API) return; // Vercel: SSE 엔드포인트 없음
  const evtSource = new EventSource(`${API}/api/events`);

  evtSource.addEventListener('trade', (e) => {
    try {
      const trade = JSON.parse(e.data);
      state.trades.unshift(trade);
      renderHistory(state.trades);
      showToast(`새 DRY-RUN 거래: ${trade.direction} ${trade.pair}`, 'success');
    } catch (_) {}
  });

  evtSource.addEventListener('log', (e) => {
    try {
      const { lines } = JSON.parse(e.data);
      lines.forEach(appendLog);
    } catch (_) {}
  });

  evtSource.addEventListener('analyze-done', (e) => {
    try {
      const { code, pair, tf } = JSON.parse(e.data);
      // tf가 있으면 단일 분석 (POST /api/analyze), 없으면 analyze-all 진행 중
      if (tf) resetAnalyzeBtn();
      if (code === 0) {
        if (pair === state.pair) {
          loadLatestSignal();
          loadLatestDiary();
        }
        if (tf) {
          showToast(`분석 완료: ${pair} ${tf}`, 'success');
          loadTrades();
        }
      } else if (tf) {
        showToast(`분석 종료 (code ${code}) — 로그 확인`, 'error');
      }
    } catch (_) {}
  });

  evtSource.onerror = () => {
    setTimeout(connectSSE, 3000);
    evtSource.close();
  };
}

// ── 유틸 ──────────────────────────────────────────────────────────────────
function formatPrice(p) {
  if (p == null || isNaN(p)) return '—';
  const n = parseFloat(p);
  if (n > 1000)  return n.toLocaleString('en-US', { minimumFractionDigits: 1, maximumFractionDigits: 1 });
  if (n > 1)     return n.toFixed(3);
  return n.toFixed(5);
}

let toastTimer = null;
function showToast(msg, type = 'info') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `show ${type}`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.className = type; }, 3500);
}

  document.getElementById(`btn${name}`).addEventListener('click', (e) => {
    state.overlays[key] = !state.overlays[key];
    e.currentTarget.classList.toggle('on', state.overlays[key]);
    if (state.signal) {
      clearOverlayLines();
      renderSignalOverlays(state.signal);
      if (state.signal.direction === 'NEUTRAL' && state.candles && name !== 'Sweep') loadAutoLevels(state.candles);
      if (!state.useBoxOverlays) {
        const lvl = state.signal.levels;
        if (lvl?.fvgs) renderFVGBands(lvl.fvgs);
        if (lvl?.obs)  renderOBLines(lvl.obs);
        if (lvl?.bbs)  renderBBLines(lvl.bbs);
      }
    } else if (state.candles && name !== 'Sweep') {
      loadAutoLevels(state.candles);
    }
  });
});

// 다이어리 버튼
document.getElementById('diary-btn').addEventListener('click', runDiary);

// 분석 버튼
document.getElementById('analyze-btn').addEventListener('click', runAnalysis);

// ── API 설정 모달 ─────────────────────────────────────────────────────────
(function() {
  const modal    = document.getElementById('api-modal');
  const input    = document.getElementById('api-url-input');
  const saveBtn  = document.getElementById('api-save-btn');
  const cancelBtn= document.getElementById('api-cancel-btn');
  const openBtn  = document.getElementById('api-settings-btn');

  input.value = localStorage.getItem('ict_api') || 'http://localhost:3210';

  openBtn.addEventListener('click', () => {
    input.value = localStorage.getItem('ict_api') || 'http://localhost:3210';
    modal.style.display = 'flex';
    input.focus();
    input.select();
  });
  cancelBtn.addEventListener('click', () => { modal.style.display = 'none'; });
  modal.addEventListener('click', (e) => { if (e.target === modal) modal.style.display = 'none'; });
  saveBtn.addEventListener('click', () => {
    const val = input.value.trim().replace(/\/$/, '');
    if (val) {
      localStorage.setItem('ict_api', val);
      location.href = location.pathname + `?api=${encodeURIComponent(val)}`;
    }
  });
  input.addEventListener('keydown', (e) => { if (e.key === 'Enter') saveBtn.click(); });
})();

// ── 연결 상태 표시 ────────────────────────────────────────────────────────
async function checkServerStatus() {
  const dot = document.getElementById('statusDot');
  try {
    const r = await fetch(`${API}/api/config`, { signal: AbortSignal.timeout(3000) });
    dot.style.background = r.ok ? 'var(--bull)' : 'var(--bear)';
    dot.title = r.ok ? `서버 연결됨: ${API}` : '서버 오류';
  } catch (_) {
    dot.style.background = 'var(--bear)';
    dot.title = `서버 미연결: ${API}`;
  }
}

// ── 초기화 ────────────────────────────────────────────────────────────────
async function init() {
  state.pairs = await loadPairsConfig();
  state.pair  = state.pairs[0]?.symbol || 'BTCUSDT';
  renderPairTabs();
  updateKillzoneBadge();
  setInterval(updateKillzoneBadge, 60_000);
  checkServerStatus();
  setInterval(checkServerStatus, 15_000);
  await loadCandles();
  connectWS();
  connectSSE();
  await loadTrades();
  await loadLatestSignal();
  await loadLatestDiary();
  setInterval(loadTrades, 10_000);
  runAnalyzeAll();
}

init();
</script>
