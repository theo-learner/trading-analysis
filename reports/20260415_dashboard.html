// ─── HOOKS ───────────────────────────────────────────────────────────────────

function useIsMobile() {
  const [isMobile, setIsMobile] = React.useState(
    () => window.matchMedia('(max-width: 767px)').matches
  );
  React.useEffect(() => {
    const mq = window.matchMedia('(max-width: 767px)');
    const handler = (e) => setIsMobile(e.matches);
    mq.addEventListener('change', handler);
    return () => mq.removeEventListener('change', handler);
  }, []);
  return isMobile;
}

              <span>{pair.name}</span>
              <span style={{ color: '#9ca3af' }}>{selected === pair.name ? '▲' : '▼'}</span>

      <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
        {PAIRS.map(pair => (
          <button
            key={pair.symbol}
            onClick={() => setSelected(pair.name)}
            style={{
              background: selected === pair.name ? '#1e2940' : '#131720',
              border: `1px solid ${selected === pair.name ? '#3b82f6' : '#2a3044'}`,
              borderRadius: 6, padding: '10px 14px', color: '#e8eaed',
              cursor: 'pointer', fontSize: 14, fontWeight: 700, textAlign: 'left',
            }}
          >{pair.name}</button>
        ))}
      </div>
      {activePair && <Card>{renderContent(activePair)}</Card>}
    </div>
  );
}

        ['손절(SL)', trade.sl, '#f87171'],
        ['TP1', trade.tp1, '#4ade80'],
        ['TP2', trade.tp2, '#4ade80'],
        ['R:R', trade.rr, '#fbbf24'],
      ].map(([label, val, valColor]) => (
        <div key={label} style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', marginBottom: 4, fontSize: 13 }}>
          <span style={{ color: '#9ca3af' }}>{label}</span>
          <span style={{ color: valColor, fontWeight: 700, fontFamily: 'monospace' }}>{val}</span>
        </div>
      ))}
      <div style={{
        marginTop: 6, padding: '6px 10px', background: '#0b0e14', borderRadius: 4,
        fontSize: 11, color: '#9ca3af', lineHeight: 1.5,
      }}>{trade.note}</div>
    </div>
  );
}

function RiskTab({ isMobile }) {
  return (
    <div>
      <PairAccordion isMobile={isMobile} renderContent={rd_pair => {
        const rd = RISK_DATA.find(r => r.name === rd_pair.name);
        if (!rd) return null;
        return (
          <div>
            <div style={{ fontWeight: 800, fontSize: 16, marginBottom: 14 }}>{rd.name} 리스크 관리</div>
            <TradeSetup title="롱 셋업" color="#4ade80" trade={rd.longTrade} />
            <TradeSetup title="숏 셋업" color="#f87171" trade={rd.shortTrade} />
            <div style={{
              padding: '10px 12px', background: '#1e1a0e',
              border: '1px solid #fbbf2444', borderRadius: 6,
              fontSize: 12, color: '#fbbf24', lineHeight: 1.6,
            }}>
              ⚠ 호르무즈 봉쇄(evt_004) 진행 중 — 뉴욕 오픈(23:30 KST) ±2h 신규 진입 금지 / 포지션 사이즈 30% 축소 권고
            </div>
          </div>
        );
      }} />
    </div>
  );
}

// ─── MAIN DASHBOARD ──────────────────────────────────────────────────────────

const TABS = ['Overview', 'Macro', 'Elliott Wave', 'ICT', 'Orderflow', 'Scenarios', 'Risk'];

function Dashboard() {
  const isMobile = useIsMobile();
  const [activeTab, setActiveTab] = React.useState('Overview');
  const tabBarRef = React.useRef(null);

  const handleTabClick = (tab) => {
    setActiveTab(tab);
    if (tabBarRef.current) {
      const btn = tabBarRef.current.querySelector(`[data-tab="${tab}"]`);
      if (btn) btn.scrollIntoView({ inline: 'center', behavior: 'smooth' });
    }
  };

  const tabContent = (() => {
    switch (activeTab) {
      case 'Overview':     return <OverviewTab isMobile={isMobile} />;
      case 'Macro':        return <MacroTab isMobile={isMobile} />;
      case 'Elliott Wave': return <EWTab isMobile={isMobile} />;
      case 'ICT':          return <ICTTab isMobile={isMobile} />;
      case 'Orderflow':    return <OrderflowTab isMobile={isMobile} />;
      case 'Scenarios':    return <ScenariosTab isMobile={isMobile} />;
      case 'Risk':         return <RiskTab isMobile={isMobile} />;
      default:             return null;
    }
  })();

  return (
    <div style={{ minHeight: '100vh', background: '#0b0e14', color: '#e8eaed' }}>

      {/* Header */}
      <div style={{
        background: '#131720', borderBottom: '1px solid #2a3044',
        padding: isMobile ? '12px 14px' : '14px 24px',
      }}>
        <div style={{
          display: 'flex',
          flexDirection: isMobile ? 'column' : 'row',
          justifyContent: 'space-between',
          alignItems: isMobile ? 'flex-start' : 'center',
          gap: 8,
        }}>
          <div>
            <span style={{ fontWeight: 900, fontSize: isMobile ? 16 : 20, letterSpacing: 0.5 }}>
              Crypto Analysis Dashboard
            </span>
            <span style={{ color: '#9ca3af', fontSize: 12, marginLeft: 10 }}>2026-04-15</span>
          </div>
          <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap' }}>
            <Badge color="#4ade80">강세 45%</Badge>
            <Badge color="#f87171">약세 40%</Badge>
            <Badge color="#fbbf24">중립 15%</Badge>
            <Badge color="#f87171">⚠ 호르무즈 봉쇄 중</Badge>
          </div>
        </div>
      </div>

      {/* Tab Bar */}
      <div
        ref={tabBarRef}
        style={{
          background: '#131720', borderBottom: '1px solid #2a3044',
          display: 'flex', overflowX: 'auto',
          WebkitOverflowScrolling: 'touch',
        }}
      >
        {TABS.map(tab => (
          <button
            key={tab}
            data-tab={tab}
            onClick={() => handleTabClick(tab)}
            style={{
              background: 'none', border: 'none',
              borderBottom: activeTab === tab ? '2px solid #3b82f6' : '2px solid transparent',
              color: activeTab === tab ? '#e8eaed' : '#9ca3af',
              padding: isMobile ? '14px 14px' : '12px 16px',
              cursor: 'pointer', fontWeight: activeTab === tab ? 700 : 400,
              fontSize: 13, whiteSpace: 'nowrap', flexShrink: 0,
              transition: 'color 0.15s',
            }}
          >{tab}</button>
        ))}
      </div>

      {/* Content */}
      <div style={{ padding: isMobile ? '14px' : '20px 24px', maxWidth: 1400, margin: '0 auto' }}>
        {tabContent}
      </div>

      {/* Footer */}
      <div style={{
        borderTop: '1px solid #2a3044', padding: '12px 24px',
        color: '#4b5563', fontSize: 11, textAlign: 'center', marginTop: 20,
      }}>
        Generated 2026-04-15 · EW + ICT/SMC + Orderflow · Coinalyze / TradingView / Coinglass · Not financial advice
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Dashboard />);
</script>
</body>
</html>
