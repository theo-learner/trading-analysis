// ─── 유틸 컴포넌트 ──────────────────────────────────────────────────────────────

function Card({ children, style = {} }) {
  return <div style={{ background: '#1a1f2e', borderRadius: '10px', padding: '16px', ...style }}>{children}</div>;
}

function Badge({ children, color = '#374151' }) {
  return <span style={{ background: color + '22', color: color, border: `1px solid ${color}44`, borderRadius: '6px', padding: '2px 8px', fontSize: '11px', fontWeight: 600 }}>{children}</span>;
}

function SectionTitle({ children }) {
  return <div style={{ fontSize: '11px', fontWeight: 700, color: '#6b7280', textTransform: 'uppercase', letterSpacing: '0.08em', marginBottom: '10px' }}>{children}</div>;
}

function LevelRow({ label, values, color }) {
  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: '8px', marginBottom: '4px' }}>
      <span style={{ fontSize: '10px', color: '#6b7280', minWidth: '36px' }}>{label}</span>
      <div style={{ display: 'flex', flexWrap: 'wrap', gap: '4px' }}>
        {(Array.isArray(values) ? values : [values]).filter(v => v !== null && v !== undefined).map((v, i) => (
          <span key={i} style={{ fontSize: '11px', color: color, background: color + '15', borderRadius: '4px', padding: '1px 6px' }}>{typeof v === 'number' ? v.toLocaleString() : v}</span>
        ))}
      </div>
    </div>
  );
}

function EmaRow({ tf, data }) {
  const { e7, e50, e200, rsi } = data;
  const bullish = e7 > e50 && e50 > e200;
  const bearish = e7 < e50 && e50 < e200;
  const trendColor = bullish ? '#4ade80' : bearish ? '#f87171' : '#fbbf24';
  const trendLabel = bullish ? '강세정렬' : bearish ? '약세정렬' : '혼재';
  return (
    <div style={{ display: 'grid', gridTemplateColumns: '32px 1fr 1fr 1fr 44px 52px', gap: '4px', alignItems: 'center', marginBottom: '6px', fontSize: '11px' }}>
      <span style={{ color: '#6b7280', fontWeight: 700 }}>{tf}</span>
      <span style={{ color: '#22d3ee' }}>E7: {e7?.toLocaleString()}</span>
      <span style={{ color: '#fbbf24' }}>E50: {e50?.toLocaleString()}</span>
      <span style={{ color: '#f87171' }}>E200: {e200?.toLocaleString()}</span>
      <span style={{ color: '#9ca3af' }}>RSI {rsi}</span>
      <Badge color={trendColor}>{trendLabel}</Badge>
    </div>
  );
}

function SentimentBadge({ sentiment }) {
  const map = { bullish: ['강세', '#4ade80'], bearish: ['약세', '#f87171'], neutral_bull: ['중립강세', '#a3e635'], neutral: ['중립', '#fbbf24'] };
  const [label, color] = map[sentiment] || ['중립', '#fbbf24'];
  return <Badge color={color}>{label}</Badge>;
}

function OrderflowTab({ isMobile }) {
  const pairs = ['BTCUSDT', 'ETHUSDT', 'SOLUSDT', 'HYPEUSDT'];

  const d = ORDERFLOW_DATA.pairs;

  const fundingColor = (f) => f?.startsWith('-') ? '#f87171' : '#4ade80';
  const cvdColor = (dir, trend) => {
    if (dir === 'positive' && trend === 'rising') return '#22d3ee';
    if (dir === 'positive' && trend === 'falling') return '#fbbf24';
    if (dir === 'negative') return '#fb923c';
    return '#9ca3af';
  };
  const oiColor = (t) => t === 'rising' ? '#4ade80' : '#f87171';

  return (
    <div>

        <table style={{ width: '100%', minWidth: isMobile ? '480px' : 'auto', borderCollapse: 'collapse', fontSize: '12px' }}>

                <th key={h} style={{ padding: '8px 12px', borderBottom: '1px solid #1f2937' }}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {pairs.map(sym => {
              const p = d[sym];
              return (
                <tr key={sym} style={{ borderBottom: '1px solid #1a1f2e' }}>
                  <td style={{ padding: '10px 12px', fontWeight: 700, color: '#e8eaed' }}>{shorts[sym]}</td>
                  <td style={{ padding: '10px 12px', color: '#9ca3af' }}>${p.price_usd.toLocaleString()}</td>
                  <td style={{ padding: '10px 12px', color: '#f59e0b', fontWeight: 700 }}>{p.oi_usd_str}</td>
                  <td style={{ padding: '10px 12px', color: oiColor(p.oi_trend), fontWeight: 700 }}>{p.oi_change_24h}</td>
                  <td style={{ padding: '10px 12px', color: fundingColor(p.funding_rate), fontWeight: 700 }}>{p.funding_rate}</td>
                  <td style={{ padding: '10px 12px', color: fundingColor(p.funding_rate_predicted) }}>{p.funding_rate_predicted}</td>
                  <td style={{ padding: '10px 12px' }}>
                    <span style={{ color: cvdColor(p.cvd_direction, p.cvd_trend), fontWeight: 700 }}>{p.cvd_direction}/{p.cvd_trend}</span>
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>

      <div style={{ display: 'grid', gridTemplateColumns: isMobile ? 'repeat(2, 1fr)' : 'repeat(4, 1fr)', gap: '10px', marginTop: '16px' }}>
        {pairs.map(sym => {
          const p = d[sym];
          const fundingNum = parseFloat(p.funding_rate);
          const isNegFunding = fundingNum < 0;
          const oiUp = p.oi_trend === 'rising';
          const cvdPos = p.cvd_direction === 'positive';
          const cvdUp = p.cvd_trend === 'rising';
          let signal = '중립';
          let sigColor = '#fbbf24';
          if (oiUp && cvdPos && cvdUp && fundingNum > 0) { signal = '강세'; sigColor = '#4ade80'; }
          else if (oiUp && isNegFunding) { signal = '숏스퀴즈 잠재'; sigColor = '#a78bfa'; }
          else if (!oiUp && !cvdPos) { signal = '약세'; sigColor = '#f87171'; }
          else if (oiUp && cvdPos && !cvdUp) { signal = '상승 둔화'; sigColor = '#fbbf24'; }
          return (
            <Card key={sym}>
              <div style={{ fontSize: '14px', fontWeight: 800, color: '#e8eaed', marginBottom: '8px' }}>{shorts[sym]}</div>
              <div style={{ fontSize: '11px', color: '#6b7280', marginBottom: '4px' }}>OI {p.oi_usd_str} <span style={{ color: oiColor(p.oi_trend) }}>{p.oi_change_24h}</span></div>
              <div style={{ fontSize: '11px', color: '#6b7280', marginBottom: '4px' }}>펀딩 <span style={{ color: fundingColor(p.funding_rate), fontWeight: 700 }}>{p.funding_rate}</span></div>
              <div style={{ fontSize: '11px', color: '#6b7280', marginBottom: '10px' }}>CVD <span style={{ color: cvdColor(p.cvd_direction, p.cvd_trend), fontWeight: 700 }}>{p.cvd_direction}/{p.cvd_trend}</span></div>
              <Badge color={sigColor}>{signal}</Badge>
            </Card>
          );
        })}
      </div>

      <Card style={{ marginTop: '16px' }}>

function RiskTab({ pairs, isMobile }) {
  const [expanded, setExpanded] = React.useState(pairs[0].symbol);
  const toggle = sym => setExpanded(prev => prev === sym ? null : sym);

  const renderTrade = (trade, isLong) => (
    <div style={{ padding: '12px', background: isLong ? '#4ade8010' : '#f8717110', borderRadius: '8px', border: `1px solid ${isLong ? '#4ade8030' : '#f8717130'}` }}>
      <div style={{ fontSize: '12px', fontWeight: 700, color: isLong ? '#4ade80' : '#f87171', marginBottom: '8px' }}>{isLong ? '롱 셋업' : '숏 셋업'}</div>
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '6px', marginBottom: '8px' }}>
        {[['진입', trade.entry], ['SL', trade.sl], ['TP1', trade.tp1], ['TP2', trade.tp2], ...(trade.tp3 ? [['TP3', trade.tp3]] : []), ['R:R', trade.rr]].map(([k, v]) => (
          <div key={k}>
            <div style={{ fontSize: '10px', color: '#6b7280', marginBottom: '2px' }}>{k}</div>
            <div style={{ fontSize: '12px', color: '#e8eaed', fontWeight: k === 'R:R' ? 700 : 400 }}>{v}</div>
          </div>
        ))}
      </div>
      <div style={{ fontSize: '11px', color: '#6b7280', lineHeight: '1.5' }}>조건: {trade.condition}</div>
    </div>
  );

  const renderContent = (p) => (
    <div>
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '10px', marginBottom: '12px' }}>
        {renderTrade(p.longTrade, true)}
        {renderTrade(p.shortTrade, false)}
      </div>
      <div style={{ padding: '10px', background: '#0f1520', borderRadius: '6px', fontSize: '11px', color: '#9ca3af', lineHeight: '1.6' }}>
        <strong style={{ color: '#fbbf24' }}>⚠️ 리스크 노트:</strong> {p.note}
      </div>
    </div>
  );

  if (isMobile) {
    return (
      <div>
        <div style={{ padding: '12px', background: '#f8717115', borderRadius: '8px', marginBottom: '12px', fontSize: '12px', color: '#f87171', borderLeft: '3px solid #f87171' }}>
          호르무즈 봉쇄 관련 이벤트 전후 ±2시간은 진입 금지 구간. 포지션 사이즈 통상 대비 50% 이하 유지 권장.
        </div>
        {pairs.map(p => {
          const isOpen = expanded === p.symbol;
          return (
            <div key={p.symbol} style={{ background: '#1a1f2e', borderRadius: '8px', overflow: 'hidden', marginBottom: '8px' }}>
              <div onClick={() => toggle(p.symbol)} style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '14px 16px', cursor: 'pointer' }}>
                <span style={{ fontSize: '15px', fontWeight: 700, color: '#e8eaed' }}>{p.short}</span>
                <span style={{ color: '#6b7280', fontSize: '14px' }}>{isOpen ? '▲' : '▼'}</span>
              </div>
              {isOpen && <div style={{ padding: '0 16px 16px' }}>{renderContent(p)}</div>}
            </div>
          );
        })}
      </div>
    );
  }

  return (
    <div>
      <div style={{ padding: '12px', background: '#f8717115', borderRadius: '8px', marginBottom: '16px', fontSize: '12px', color: '#f87171', borderLeft: '3px solid #f87171' }}>
        ⚠️ <strong>지정학 리스크 경보</strong>: 호르무즈 해협 봉쇄 진행 중. 관련 이벤트 전후 ±2시간 진입 금지. 포지션 사이즈 50% 이하 유지 권장. 모든 진입에 확증(Confirmation) 필수.
      </div>
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)', gap: '12px' }}>
        {pairs.map(p => (
          <Card key={p.symbol}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '14px' }}>
              <span style={{ fontSize: '16px', fontWeight: 800, color: '#e8eaed' }}>{p.short}</span>
              <SentimentBadge sentiment={p.sentiment} />
            </div>
            {renderContent(p)}
          </Card>
        ))}
      </div>
    </div>
  );
}

// ─── 메인 useIsMobile 훅 ───────────────────────────────────────────────────────

function useIsMobile() {
  const [m, setM] = React.useState(() => window.matchMedia('(max-width: 767px)').matches);
  React.useEffect(() => {
    const mql = window.matchMedia('(max-width: 767px)');
    const h = e => setM(e.matches);
    mql.addEventListener('change', h);
    return () => mql.removeEventListener('change', h);
  }, []);
  return m;
}
