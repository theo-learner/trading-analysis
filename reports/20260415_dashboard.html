      {children}

function Card({ children, style = {} }) {
  return (
    <div style={{ background: C.card, borderRadius: '10px', padding: '16px', border: `1px solid ${C.border}`, ...style }}>
      {children}
    </div>
  );
}

}

  const above = price > val;
  return (
    <div style={{ display: 'flex', justifyContent: 'space-between', padding: '3px 0', borderBottom: `1px solid ${C.border}`, fontSize: '12px' }}>
      <span style={{ color: C.sub }}>{label}</span>
      <span style={{ color: above ? C.bull : C.bear, fontFamily: 'monospace' }}>{format(val)}</span>
    </div>
  );
}

function FmtPrice(v, decimals = 1) {
  if (v >= 1000) return '$' + v.toLocaleString('en', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
  return '$' + v.toFixed(decimals);
}

function BiasColor(bias) {
  return bias === 'bull' ? C.bull : bias === 'bear' ? C.bear : C.neutral;
}

function ImportanceColor(imp) {
  return imp === 'high' ? C.bear : imp === 'medium' ? C.neutral : C.sub;
}

// ─── MOBILE HOOK ─────────────────────────────────────────────────────────────

function useIsMobile() {
  const [m, setM] = React.useState(() => window.matchMedia('(max-width: 767px)').matches);
  React.useEffect(() => {
    const mql = window.matchMedia('(max-width: 767px)');
    const h = e => setM(e.matches);
    mql.addEventListener('change', h);
    return () => mql.removeEventListener('change', h);
  }, []);
  return m;
}
