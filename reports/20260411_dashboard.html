    };

    function RSIBadge({ val }) {
      if (val === null || val === undefined) return <span style={{ color: C.sub }}>—</span>;
      const color = val < 35 ? C.bull : val > 65 ? C.bear : C.neutral;
      return <span style={{ color, fontWeight: 700 }}>{val}</span>;
    }

    function ProbBar({ prob, color }) {
      return (
        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
          <div style={{ position: "relative", width: 80, height: 8, background: "#1e2533", borderRadius: 4 }}>
            <div style={{ position: "absolute", left: 0, top: 0, height: "100%", width: prob + "%", background: color, borderRadius: 4 }} />
          </div>
          <span style={{ fontSize: 14, fontWeight: 700, color }}>{prob}%</span>
        </div>
      );
    }

    function Card({ children, style }) {
      return <div style={{ background: C.card, borderRadius: 8, padding: 12, ...style }}>{children}</div>;
    }

    function Panel({ children, style }) {
      return <div style={{ background: C.panel, borderRadius: 10, padding: 16, border: "1px solid #1e2533", ...style }}>{children}</div>;
    }

    function SectionTitle({ children, color }) {
      return <div style={{ fontSize: 13, fontWeight: 600, color: color || C.neutral, marginBottom: 12 }}>{children}</div>;
    }

    function OverviewTab({ pair, activePair }) {
      return (
        <div style={{ display: "grid", gap: 12 }}>
          {/* 전체 시장 카드 */}
          <Panel>
            <SectionTitle color={C.neutral}>📋 시장 전체 요약 ({ANALYSIS_DATE})</SectionTitle>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 10 }}>
              {Object.entries(pairs).map(([key, p]) => (
                <div key={key} style={{ background: C.card, borderRadius: 8, padding: 12, border: `1px solid ${p.biasColor}44` }}>
                  <div style={{ fontSize: 13, fontWeight: 700, color: C.main }}>{key}</div>
                  <div style={{ fontSize: 18, fontWeight: 700, color: C.main, margin: "4px 0" }}>${p.price.toLocaleString()}</div>
                  <div style={{ fontSize: 11, color: p.signalColor, fontWeight: 600 }}>{p.signal}</div>
                  <div style={{ fontSize: 11, color: C.sub, marginTop: 4 }}>RSI 1D: {p.rsi["1D"]}</div>
                  <div style={{ fontSize: 11, color: p.biasColor }}>{p.bias}</div>
                </div>
              ))}
            </div>
          </Panel>

          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
            {/* MTF 구조 */}
            <Panel>
              <SectionTitle color={C.cyan}>🔍 {activePair} 멀티타임프레임 구조</SectionTitle>
              {["1D", "4H", "1H"].map(tf => (
                <Card key={tf} style={{ marginBottom: 8 }}>
                  <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 6 }}>
                    <span style={{ fontSize: 12, fontWeight: 600, color: C.neutral }}>{tf}</span>
                    <span style={{ fontSize: 11, color: C.sub }}>
                      RSI: <RSIBadge val={pair.rsi[tf]} /> · CCI: {pair.cci[tf] ?? "—"}
                    </span>
                  </div>
                  <div style={{ fontSize: 12, color: C.main, fontWeight: 600, marginBottom: 4 }}>{pair.ew[tf].wave}</div>
                  <div style={{ fontSize: 11, color: C.sub, lineHeight: 1.5 }}>{pair.ew[tf].desc}</div>
                  <div style={{ fontSize: 11, color: C.purple, marginTop: 6 }}>📍 {pair.ew[tf].keyLevel}</div>
                </Card>
              ))}
            </Panel>

            {/* VRVP + ICT */}
            <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
              <Panel>
                <SectionTitle color={C.amber}>📊 VRVP 볼륨 프로파일</SectionTitle>
                {[["POC", pair.vrvp.poc, C.main], ["HVN (고볼륨)", pair.vrvp.hvn, C.amber], ["LVN (저볼륨)", pair.vrvp.lvn, C.cyan]].map(([label, val, col]) => (
                  <Card key={label} style={{ marginBottom: 8 }}>
                    <div style={{ fontSize: 11, color: C.sub }}>{label}</div>
                    <div style={{ fontSize: 13, color: col, fontWeight: 600, marginTop: 2 }}>{val}</div>
                  </Card>
                ))}
                <Card>
                  <div style={{ fontSize: 11, color: C.sub }}>분석 노트</div>
                  <div style={{ fontSize: 11, color: C.main, lineHeight: 1.5, marginTop: 4 }}>{pair.vrvp.note}</div>
                </Card>
              </Panel>
              <Panel>
                <SectionTitle color={C.purple}>🔥 유동성 (ICT)</SectionTitle>
                <Card style={{ marginBottom: 8, borderLeft: `3px solid ${C.bull}` }}>
                  <div style={{ fontSize: 11, color: C.sub }}>상단 유동성 ↑</div>
                  <div style={{ fontSize: 12, color: C.bull, fontWeight: 600, marginTop: 2 }}>{pair.ict.liquidity.above}</div>
                </Card>
                <Card style={{ borderLeft: `3px solid ${C.bear}` }}>
                  <div style={{ fontSize: 11, color: C.sub }}>하단 유동성 ↓</div>
                  <div style={{ fontSize: 12, color: C.bear, fontWeight: 600, marginTop: 2 }}>{pair.ict.liquidity.below}</div>
                </Card>
              </Panel>
            </div>
          </div>
        </div>
      );
    }

    function EWTab({ pair }) {
      return (
        <div style={{ display: "grid", gap: 12 }}>
          {["1D", "4H", "1H"].map(tf => (
            <Panel key={tf}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 10 }}>
                <div>
                  <span style={{ fontSize: 14, fontWeight: 700, color: C.neutral }}>{tf}</span>
                  <span style={{ fontSize: 12, color: C.sub, marginLeft: 10 }}>{pair.ew[tf].wave}</span>
                </div>
                <span style={{ fontSize: 11, color: C.sub, background: C.card, padding: "3px 8px", borderRadius: 6 }}>
                  신뢰도: {pair.ew[tf].confidence}
                </span>
              </div>
              <Card style={{ marginBottom: 10 }}>
                <div style={{ fontSize: 12, color: C.main, lineHeight: 1.6 }}>{pair.ew[tf].desc}</div>
              </Card>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 2fr", gap: 8 }}>
                {[["RSI", pair.rsi[tf] !== null ? pair.rsi[tf] : "—", pair.rsi[tf] < 35 ? C.bull : pair.rsi[tf] > 65 ? C.bear : C.neutral],
                  ["CCI", pair.cci[tf] ?? "—", pair.cci[tf] <= 20 ? C.bear : C.neutral]].map(([l, v, c]) => (
                  <Card key={l}>
                    <div style={{ fontSize: 11, color: C.sub }}>{l}</div>
                    <div style={{ fontSize: 15, fontWeight: 700, color: c, marginTop: 2 }}>{v}</div>
                  </Card>
                ))}
                <Card>
                  <div style={{ fontSize: 11, color: C.sub }}>핵심 레벨</div>
                  <div style={{ fontSize: 11, color: C.purple, marginTop: 4 }}>{pair.ew[tf].keyLevel}</div>
                </Card>
              </div>
            </Panel>
          ))}
        </div>
      );
    }

    function ICTTab({ pair }) {
      return (
        <div style={{ display: "grid", gap: 12 }}>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
            <Panel>
              <SectionTitle color={C.purple}>🏗️ 시장 구조</SectionTitle>
              {[
                ["BOS / CHoCH", pair.ict.structureBreak, C.main],
                ["Premium / Discount", pair.ict.premiumDiscount, C.cyan],
                ["FVG (Fair Value Gap)", pair.ict.fvg, C.amber],
              ].map(([l, v, c]) => (
                <Card key={l} style={{ marginBottom: 8 }}>
                  <div style={{ fontSize: 11, color: C.sub }}>{l}</div>
                  <div style={{ fontSize: 13, color: c, marginTop: 4 }}>{v}</div>
                </Card>
              ))}
            </Panel>
            <Panel>
              <SectionTitle color={C.amber}>🧱 오더블록</SectionTitle>
              {pair.ict.orderBlocks.map((ob, i) => (
                <Card key={i} style={{ marginBottom: 8, borderLeft: `3px solid ${C.bull}` }}>
                  <div style={{ fontSize: 12, color: C.main }}>{ob}</div>
                </Card>
              ))}
            </Panel>
          </div>
          <Panel>
            <SectionTitle color={C.cyan}>💧 유동성 레벨</SectionTitle>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 10 }}>
              <Card style={{ borderLeft: `3px solid ${C.bull}` }}>
                <div style={{ fontSize: 11, color: C.sub }}>상단 유동성 (Buy-Side)</div>
                <div style={{ fontSize: 13, color: C.bull, fontWeight: 600, marginTop: 4 }}>{pair.ict.liquidity.above}</div>
              </Card>
              <Card style={{ borderLeft: `3px solid ${C.bear}` }}>
                <div style={{ fontSize: 11, color: C.sub }}>하단 유동성 (Sell-Side)</div>
                <div style={{ fontSize: 13, color: C.bear, fontWeight: 600, marginTop: 4 }}>{pair.ict.liquidity.below}</div>
              </Card>
            </div>
            <Card>
              <div style={{ fontSize: 11, color: C.sub }}>분석 노트</div>
              <div style={{ fontSize: 12, color: C.main, lineHeight: 1.6, marginTop: 4 }}>{pair.ict.note}</div>
            </Card>
          </Panel>
        </div>
      );
    }

    function OrderflowTab() {
      return (
        <div style={{ display: "grid", gap: 12 }}>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 12 }}>
            {[
              ["BTC OI", orderflow.btcOI, orderflow.btcOIChange],
              ["ETH OI", orderflow.ethOI, orderflow.ethOIChange],
              ["전체 OI / 청산", orderflow.totalOI, `청산 ${orderflow.totalLiq}`],
            ].map(([l, v, c]) => (
              <Panel key={l}>
                <div style={{ fontSize: 11, color: C.sub, marginBottom: 6 }}>{l}</div>
                <div style={{ fontSize: 20, fontWeight: 700, color: C.cyan }}>{v}</div>
                <div style={{ fontSize: 12, color: C.bull, marginTop: 4 }}>{c}</div>
              </Panel>
            ))}
          </div>
          <Panel>
            <SectionTitle color={C.amber}>📡 오더플로우 핵심 포인트</SectionTitle>
            {orderflow.notes.map((n, i) => (
              <Card key={i} style={{ marginBottom: 8, display: "flex", gap: 10, alignItems: "flex-start" }}>
                <span style={{ color: C.amber, fontSize: 14, marginTop: 1 }}>▪</span>
                <span style={{ fontSize: 12, color: C.main, lineHeight: 1.5 }}>{n}</span>
              </Card>
            ))}
          </Panel>
          <Panel>
            <SectionTitle color={C.purple}>⚡ 프레임워크 수렴 (Confluence)</SectionTitle>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
              {orderflow.convergence.map((c, i) => (
                <Card key={i} style={{ borderLeft: `3px solid ${c.color}`, display: "flex", alignItems: "center", gap: 8 }}>
                  <span style={{ fontSize: 14 }}>
                    {c.type === "bull" ? "🟢" : c.type === "bear" ? "🔴" : c.type === "conv" ? "🟣" : "🟡"}
                  </span>
                  <span style={{ fontSize: 12, color: C.main }}>{c.label}</span>
                </Card>
              ))}
            </div>
          </Panel>
        </div>
      );
    }

    function ScenariosTab({ pair, activePair }) {
      return (
        <div style={{ display: "grid", gap: 12 }}>
          <Panel>
            <SectionTitle>📈 {activePair} 통합 시나리오 분석</SectionTitle>
            {pair.scenarios.map((s, i) => (
              <div key={i} style={{ background: C.card, borderRadius: 10, padding: 16, marginBottom: 12, border: `1px solid ${s.color}44` }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                    <span style={{ background: s.color, color: "#0b0e14", fontWeight: 700, fontSize: 12, padding: "3px 10px", borderRadius: 6 }}>{s.type}</span>
                    <span style={{ fontSize: 12, color: C.sub }}>트리거: {s.trigger}</span>
                  </div>
                  <ProbBar prob={s.prob} color={s.color} />
                </div>
                <div style={{ fontSize: 12, color: C.main, lineHeight: 1.6, marginBottom: 10 }}>{s.desc}</div>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8 }}>
                  {[["목표가", s.target, C.bull], ["SL", s.sl, C.bear], ["R:R", s.rr, C.neutral]].map(([l, v, c]) => (
                    <div key={l} style={{ background: C.bg, borderRadius: 6, padding: 8 }}>
                      <div style={{ fontSize: 10, color: C.sub }}>{l}</div>
                      <div style={{ fontSize: 12, color: c, fontWeight: 600, marginTop: 2 }}>{v}</div>
                    </div>
                  ))}
                </div>
              </div>
            ))}
          </Panel>
          <Panel>
            <SectionTitle color={C.purple}>🗂 전체 페어 시나리오 확률 요약</SectionTitle>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 10 }}>
              {Object.entries(pairs).map(([key, p]) => (
                <Card key={key}>
                  <div style={{ fontSize: 13, fontWeight: 700, color: C.main, marginBottom: 8 }}>{key}</div>
                  {p.scenarios.map((s, i) => (
                    <div key={i} style={{ marginBottom: 6 }}>
                      <div style={{ display: "flex", justifyContent: "space-between", fontSize: 11, marginBottom: 3 }}>
                        <span style={{ color: s.color }}>{s.type}</span>
                        <span style={{ color: C.main, fontWeight: 600 }}>{s.prob}%</span>
                      </div>
                      <div style={{ height: 4, background: "#1e2533", borderRadius: 2 }}>
                        <div style={{ height: "100%", width: s.prob + "%", background: s.color, borderRadius: 2 }} />
                      </div>
                    </div>
                  ))}
                </Card>
              ))}
            </div>
          </Panel>
        </div>
      );
    }

    function RiskTab({ pair, activePair }) {
      const risks = [
        { level: "HIGH", color: C.bear, text: "BTC OI 급증 (롱 누적) — 급락 시 롱 청산 캐스케이드 위험", pair: "BTC/시장 전체" },
        { level: "HIGH", color: C.bear, text: "SOL/ETH 구조적 약세 — BTC 약세 시 알트 낙폭 확대", pair: "ETH/SOL" },
        { level: "MED", color: C.neutral, text: "HYPE $37.885 SL 이탈 시 셋업 무효화", pair: "HYPE" },
        { level: "MED", color: C.neutral, text: "거시 이벤트 (금리/관세) 불확실성 지속", pair: "시장 전체" },
        { level: "LOW", color: C.bull, text: "BTC 1D RSI 과매도 → 기술적 반등 잠재력", pair: "BTC" },
        { level: "LOW", color: C.bull, text: "HYPE VRVP 반전 구간 + 1H 200일선 지지 수렴", pair: "HYPE" },
      ];
      return (
        <div style={{ display: "grid", gap: 12 }}>
          <Panel>
            <SectionTitle color={C.neutral}>⚠️ {activePair} 리스크 관리 제안</SectionTitle>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 12 }}>
              <Card>
                <div style={{ fontSize: 11, color: C.sub }}>진입 전략</div>
                <div style={{ fontSize: 13, color: C.main, marginTop: 6, lineHeight: 1.6 }}>{pair.risk.entry}</div>
              </Card>
              <Card>
                <div style={{ fontSize: 11, color: C.sub }}>거시 리스크</div>
                <div style={{ fontSize: 13, color: C.neutral, marginTop: 6, lineHeight: 1.6 }}>{pair.risk.macro}</div>
              </Card>
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 10 }}>
              {[["손절 (SL)", pair.risk.sl, C.bear], ["1차 TP", pair.risk.tp1, C.bull], ["2차 TP", pair.risk.tp2, C.bull], ["R:R", pair.risk.rr, C.neutral]].map(([l, v, c]) => (
                <Card key={l} style={{ borderLeft: `3px solid ${c}` }}>
                  <div style={{ fontSize: 11, color: C.sub }}>{l}</div>
                  <div style={{ fontSize: 15, color: c, fontWeight: 700, marginTop: 6 }}>{v}</div>
                </Card>
              ))}
            </div>
          </Panel>
          <Panel>
            <SectionTitle color={C.bear}>🛡 전체 리스크 레지스터</SectionTitle>
            <div style={{ display: "grid", gap: 8 }}>
              {risks.map((r, i) => (
                <Card key={i} style={{ display: "flex", alignItems: "center", gap: 12 }}>
                  <span style={{ background: r.color + "22", color: r.color, fontSize: 10, fontWeight: 700, padding: "2px 8px", borderRadius: 4, minWidth: 36, textAlign: "center" }}>
                    {r.level}
                  </span>
                  <span style={{ fontSize: 12, color: C.main, flex: 1 }}>{r.text}</span>
                  <span style={{ fontSize: 11, color: C.sub, minWidth: 80, textAlign: "right" }}>{r.pair}</span>
                </Card>
              ))}
            </div>
          </Panel>
          <Panel style={{ border: "1px solid #2a3348" }}>
            <div style={{ fontSize: 12, color: C.sub, lineHeight: 1.8 }}>
              ⚠️ 본 분석은 차트에서 실제로 확인된 데이터만을 기반으로 합니다. 불확실한 레벨은 "차트 미확인"으로 명시하였습니다. EW 파동 카운트는 낮은~중간 신뢰도이며, 추측으로 생성된 레벨이 없습니다. 확신도 과장 없이 분석되었습니다. 투자는 본인 책임입니다.
            </div>
          </Panel>
        </div>
      );
    }

    function App() {
      const [activeTab, setActiveTab] = useState("Overview");
      const [activePair, setActivePair] = useState("BTC");
      const pair = pairs[activePair];

      return (
        <div style={{ background: C.bg, minHeight: "100vh", color: C.main, padding: 16 }}>
          {/* 헤더 */}
          <div style={{ background: C.panel, borderRadius: 12, padding: "16px 20px", marginBottom: 16, display: "flex", justifyContent: "space-between", alignItems: "center", border: "1px solid #1e2533", flexWrap: "wrap", gap: 12 }}>
            <div>
              <div style={{ fontSize: 20, fontWeight: 700, color: C.main }}>📊 크립토 선물 기술적 분석 대시보드</div>
              <div style={{ fontSize: 12, color: C.sub, marginTop: 4 }}>{ANALYSIS_DATE} {GENERATED_AT} · EW + ICT/SMC + 오더플로우 통합 분석</div>
            </div>
            <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
              {Object.keys(pairs).map(p => (
                <button key={p} onClick={() => setActivePair(p)} style={{
                  background: activePair === p ? pairs[p].biasColor : C.card,
                  color: activePair === p ? "#0b0e14" : C.main,
                  border: `1px solid ${activePair === p ? pairs[p].biasColor : "#2a3348"}`,
                  borderRadius: 8, padding: "6px 14px", fontWeight: 600, fontSize: 13,
                }}>{p}</button>
              ))}
            </div>
          </div>

          {/* 상단 통계 */}
          <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 12, marginBottom: 16 }}>
            {[
              { label: `${pair.symbol} 현재가`, val: `$${pair.price.toLocaleString()}`, sub: "USDT · Binance Perp", valColor: C.main },
              { label: "RSI (1D / 4H / 1H)", val: null, sub: `CCI: ${pair.cci["1D"]} / ${pair.cci["4H"]} / ${pair.cci["1H"]}` },
              { label: "오픈 인터레스트", val: pair.oi, sub: pair.oiChange, valColor: C.cyan, subColor: C.bull },
              { label: "분석 시그널", val: pair.signal, sub: `${pair.bias} · ${pair.ewLabel}`, valColor: pair.signalColor, border: pair.signalColor },
            ].map((item, i) => (
              <div key={i} style={{ background: C.panel, borderRadius: 10, padding: 14, border: `1px solid ${item.border || "#1e2533"}` }}>
                <div style={{ fontSize: 11, color: C.sub, marginBottom: 4 }}>{item.label}</div>
                {item.val !== null ? (
                  <div style={{ fontSize: i === 0 ? 22 : 18, fontWeight: 700, color: item.valColor || C.main }}>{item.val}</div>
                ) : (
                  <div style={{ fontSize: 14, fontWeight: 700 }}>
                    <RSIBadge val={pair.rsi["1D"]} />
                    <span style={{ color: C.sub }}> / </span>
                    <RSIBadge val={pair.rsi["4H"]} />
                    <span style={{ color: C.sub }}> / </span>
                    <RSIBadge val={pair.rsi["1H"]} />
                  </div>
                )}
                <div style={{ fontSize: i === 0 ? 11 : 12, color: item.subColor || C.sub, marginTop: 4 }}>{item.sub}</div>
              </div>
            ))}
          </div>

          {/* 탭 */}
          <div style={{ display: "flex", gap: 4, marginBottom: 16, background: C.panel, padding: 6, borderRadius: 10, border: "1px solid #1e2533" }}>
            {TABS.map(tab => (
              <button key={tab} onClick={() => setActiveTab(tab)} style={{
                flex: 1, background: activeTab === tab ? C.card : "transparent",
                color: activeTab === tab ? C.main : C.sub,
                border: `1px solid ${activeTab === tab ? "#2a3348" : "transparent"}`,
                borderRadius: 7, padding: "8px 4px",
                fontWeight: activeTab === tab ? 600 : 400, fontSize: 12,
              }}>{tab}</button>
            ))}
          </div>

          {/* 탭 콘텐츠 */}
          {activeTab === "Overview" && <OverviewTab pair={pair} activePair={activePair} />}
          {activeTab === "Elliott Wave" && <EWTab pair={pair} />}
          {activeTab === "ICT" && <ICTTab pair={pair} />}
          {activeTab === "Orderflow" && <OrderflowTab />}
          {activeTab === "Scenarios" && <ScenariosTab pair={pair} activePair={activePair} />}
          {activeTab === "Risk" && <RiskTab pair={pair} activePair={activePair} />}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
