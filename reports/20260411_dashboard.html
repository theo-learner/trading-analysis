    function Badge({ children, color }) {

          border: `1px solid ${color}44`,

          padding: "2px 8px",

          border: `1px solid ${colors.border}`,
          borderRadius: 8,
          padding: 16,
          ...style

    function SectionTitle({ children }) {

          fontWeight: 700,
          letterSpacing: "1px",

    function RSIBar({ label, value }) {
      const pct = Math.min(Math.max(value, 0), 100);
      const barColor = value < 30 ? colors.bear : value > 70 ? colors.bull : colors.neutral;
      return (
        <div style={{ marginBottom: 6 }}>
          <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 3 }}>
            <span style={{ color: colors.textSecondary, fontSize: 11 }}>{label}</span>

          </div>
          <div style={{ background: colors.border, borderRadius: 3, height: 4 }}>
            <div style={{
              width: pct + "%", height: 4, borderRadius: 3,
              background: barColor, transition: "width 0.3s"
            }} />
          </div>
        </div>
      );
