  const tp = pickNearest(shortTargets, v => price == null || v < price, (a, b) => b - a);
  const sl = entry != null ? pickNearest(shortStops, v => v > entry, (a, b) => a - b) : null;
  if (entry == null || tp == null || sl == null) return { label, scenarioKey: 'bear', prob, action: 'Wait', entry: null, tp: null, sl: null, rationale: '약세 방향이나 레벨 불완전 — 대기.' };
  return { label, scenarioKey: 'bear', prob, action: nearSupportBreakdown ? 'Breakdown Short' : 'Rejection Short', entry, tp, sl, rationale: `Bear ${prob}% + ${pair.biasLabel} bias${confluence ? ` · ${confluence.split(' + ')[0]}` : ''}.` };
}

// ─── useIsMobile HOOK ─────────────────────────────────────────────────────────
function useIsMobile() {
  const [m, setM] = React.useState(() => window.matchMedia('(max-width: 767px)').matches);
  React.useEffect(() => {
    const mql = window.matchMedia('(max-width: 767px)');
    const h = e => setM(e.matches);
    mql.addEventListener('change', h);
    return () => mql.removeEventListener('change', h);
  }, []);
  return m;
}

              · BTC 펀딩 예상 -0.4707% 전환 → 펀딩비 정상화 과정 (롱 우위)<br/>
              · HYPE CVD 양수 + 펀딩 소폭 양수 → 4개 중 유일 매수 우위 유지<br/>
              · ETH 펀딩 예상 -0.5576% 급전환 → 다음 구간 숏 청산 가능성
            </div>
          </Card>
        </div>
      </div>
    </div>
  );
}

// ── Scenarios ──
function ScenariosTab({ pairs, isMobile }) {
  const scenarioKeys = ['bull', 'neutral', 'bear'];
  const scenarioColors = { bull: C.bull, neutral: C.neutral, bear: C.bear };
  const scenarioLabels = { bull: '강세', neutral: '중립', bear: '약세' };
  return (
    <div>
      <div style={{ background: C.neutral + '12', border: `1px solid ${C.neutral}30`, borderRadius: '8px', padding: '12px', marginBottom: '16px' }}>
        <div style={{ fontSize: '11px', color: C.neutral, fontWeight: 700, marginBottom: '4px' }}>시장 전체 시나리오 요약 (2026-04-30)</div>
        <div style={{ fontSize: '11px', color: C.sub, lineHeight: '1.6' }}>
          BTC/ETH/SOL 베어 우세(45-55%). HYPE 강세 우세(45%). Fed 금리 동결 후 BTC $76k 아래 슬립. ETH -1.40% 상대 약세 심화. SOL 펀딩비 -0.67% 극단 음수 = 숏스퀴즈 리스크. HYPE 유일한 강세 EMA 배열 유지. 전 CVD falling → 단기 매수세 약화 환경.
        </div>
      </div>
      {pairs.map(p => (
        <div key={p.symbol} style={{ marginBottom: '20px' }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: '10px', marginBottom: '10px' }}>
            <span style={{ fontSize: '14px', fontWeight: 800, color: C.text, fontFamily: 'Poppins' }}>{p.short}</span>
            <span style={{ fontSize: '12px', color: C.sub, fontFamily: 'Inconsolata' }}>${fmtPrice(p.price)}</span>
            <Badge color={biasColor(p.bias)}>{p.biasLabel}</Badge>
          </div>
          <div style={{ display: 'grid', gridTemplateColumns: isMobile ? '1fr' : 'repeat(3, 1fr)', gap: '10px' }}>
            {scenarioKeys.map(key => {
              const sc = p.scenarios?.[key];
              if (!sc) return null;
              const color = scenarioColors[key];
              return (
                <div key={key} style={{ background: color + '10', border: `1px solid ${color}30`, borderRadius: '8px', padding: '12px' }}>
                  <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: '8px' }}>
                    <Badge color={color}>{scenarioLabels[key]}</Badge>
                    <span style={{ color, fontSize: '13px', fontWeight: 800, fontFamily: 'Inconsolata' }}>{sc.prob}%</span>
                  </div>
                  <div style={{ fontSize: '12px', fontWeight: 700, color: C.text, marginBottom: '8px' }}>{sc.title}</div>
                  <KV label="트리거" value={sc.trigger} />
                  <KV label="무효화" value={sc.invalidation} />
                  {sc.targets?.length > 0 && <KV label="목표가" value={sc.targets.map(t => formatStrategyPrice(t)).join(' → ')} valueColor={color} />}
                </div>
              );
            })}
          </div>
        </div>
      ))}
    </div>
  );
}

// ── Risk ──
function RiskCard({ p }) {
  const { long: l, short: s } = p.risk;
  const rrLong = ((l.tp - l.entry) / (l.entry - l.sl)).toFixed(1);
  const rrShort = ((s.entry - s.tp) / (s.sl - s.entry)).toFixed(1);
  return (
    <Card>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '12px' }}>
        <div style={{ fontSize: '14px', fontWeight: 800, color: C.text, fontFamily: 'Poppins' }}>{p.short}</div>
        <Badge color={biasColor(p.bias)}>{p.biasLabel}</Badge>
      </div>
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '8px' }}>
        <div style={{ background: '#4ade8010', border: '1px solid #4ade8030', borderRadius: '6px', padding: '10px' }}>
          <div style={{ fontSize: '10px', fontWeight: 700, color: C.bull, marginBottom: '8px' }}>LONG</div>
          <KV label="Entry" value={formatStrategyPrice(l.entry)} />
          <KV label="TP" value={formatStrategyPrice(l.tp)} valueColor={C.bull} />
          <KV label="SL" value={formatStrategyPrice(l.sl)} valueColor={C.bear} />
          <KV label="R:R" value={`1:${rrLong}`} valueColor={parseFloat(rrLong) >= 2 ? C.bull : C.neutral} />
        </div>
        <div style={{ background: '#f8717110', border: '1px solid #f8717130', borderRadius: '6px', padding: '10px' }}>
          <div style={{ fontSize: '10px', fontWeight: 700, color: C.bear, marginBottom: '8px' }}>SHORT</div>
          <KV label="Entry" value={formatStrategyPrice(s.entry)} />
          <KV label="TP" value={formatStrategyPrice(s.tp)} valueColor={C.bull} />
          <KV label="SL" value={formatStrategyPrice(s.sl)} valueColor={C.bear} />
          <KV label="R:R" value={`1:${rrShort}`} valueColor={parseFloat(rrShort) >= 2 ? C.bull : C.neutral} />
        </div>
      </div>
      <div style={{ marginTop: '8px', fontSize: '10px', color: C.sub, lineHeight: '1.6' }}>
        <span style={{ color: C.bull }}>L: </span>{l.notes} &nbsp;|&nbsp; <span style={{ color: C.bear }}>S: </span>{s.notes}
      </div>
    </Card>
  );
}
function RiskTab({ pairs, selectedPair, onSelectPair, isMobile }) {
  if (!isMobile) {
    return (
      <div>
        <div style={{ background: C.neutral + '15', border: `1px solid ${C.neutral}40`, borderRadius: '8px', padding: '12px', marginBottom: '16px', fontSize: '11px', color: C.neutral }}>
          ⚠ Fed 금리 동결 후 변동성 지속. BTC 펀딩 +0.36% + 예상 -0.47% → 펀딩 정상화 과정. SOL 펀딩 -0.67% 극단 음수 숏스퀴즈 경계. 전 CVD falling = 매수세 약화 환경.
        </div>
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)', gap: '12px' }}>
          {pairs.map(p => <RiskCard key={p.symbol} p={p} />)}
        </div>
      </div>
    );
  }
  const pair = pairs.find(p => p.symbol === selectedPair) || pairs[0];
  return (
    <div>
      <div style={{ background: C.neutral + '15', border: `1px solid ${C.neutral}40`, borderRadius: '8px', padding: '10px', marginBottom: '12px', fontSize: '10px', color: C.neutral }}>
        ⚠ Fed 동결 후 변동성 지속 · SOL 펀딩 -0.67% 숏스퀴즈 경계 · 전 CVD falling
      </div>
      <div style={{ display: 'flex', gap: '8px', marginBottom: '16px', flexWrap: 'wrap' }}>
        {pairs.map(p => (
          <button key={p.symbol} onClick={() => onSelectPair(p.symbol)} style={{ background: selectedPair === p.symbol ? '#f8717122' : C.card, color: selectedPair === p.symbol ? C.bear : C.sub, border: `1px solid ${selectedPair === p.symbol ? C.bear : C.border}`, borderRadius: '6px', padding: '8px 14px', fontSize: '12px', fontWeight: selectedPair === p.symbol ? 700 : 400, cursor: 'pointer' }}>{p.short}</button>
        ))}
      </div>
      <RiskCard p={pair} />
    </div>
  );
}

// ─── DASHBOARD ────────────────────────────────────────────────────────────────
function Dashboard() {
  const isMobile = useIsMobile();
  const tabBarRef = React.useRef(null);
  const TABS = ['Overview', 'Macro', '분석', 'Orderflow', 'Scenarios', 'Risk'];
  const [activeTab, setActiveTab] = React.useState('Overview');
  const [selectedPair, setSelectedPair] = React.useState('BTCUSDT');

  React.useEffect(() => {
    if (!isMobile || !tabBarRef.current) return;
    const activeBtn = tabBarRef.current.querySelector('[data-active="true"]');
    if (activeBtn) activeBtn.scrollIntoView({ inline: 'center', behavior: 'smooth' });
  }, [activeTab, isMobile]);

  const contentPadding = isMobile ? '14px 12px' : '20px 24px';
  const headerPadding = isMobile ? '12px' : '14px 24px';

  const bullCount = PAIRS.filter(p => p.bias === 'bull').length;
  const bearCount = PAIRS.filter(p => p.bias === 'bear').length;
  const neutralCount = PAIRS.filter(p => p.bias === 'neutral').length;
  const mktSentiment = bullCount > bearCount ? '강세 우세' : bearCount > bullCount ? '약세 우세' : '혼조';

  let tabContent;
  if (activeTab === 'Overview') {
    tabContent = <OverviewTab pairs={PAIRS} selectedPair={selectedPair} onSelectPair={setSelectedPair} isMobile={isMobile} />;
  } else if (activeTab === 'Macro') {
    tabContent = <MacroTab isMobile={isMobile} />;
  } else if (activeTab === '분석') {
    tabContent = <AnalysisTab pairs={PAIRS} selectedPair={selectedPair} onSelectPair={setSelectedPair} isMobile={isMobile} />;
  } else if (activeTab === 'Orderflow') {
    tabContent = <OrderflowTab pairs={PAIRS} isMobile={isMobile} />;
  } else if (activeTab === 'Scenarios') {
    tabContent = <ScenariosTab pairs={PAIRS} isMobile={isMobile} />;
  } else if (activeTab === 'Risk') {
    tabContent = <RiskTab pairs={PAIRS} selectedPair={selectedPair} onSelectPair={setSelectedPair} isMobile={isMobile} />;
  }

  return (
    <div style={{ minHeight: '100vh', background: C.bg }}>
      <div style={{ background: C.panel, borderBottom: `1px solid ${C.border}`, padding: headerPadding }}>
        {isMobile ? (
          <div style={{ display: 'flex', flexDirection: 'column', gap: '10px' }}>
            <div>
              <div style={{ fontSize: '16px', fontWeight: 800, color: C.text, fontFamily: 'Poppins', marginBottom: '2px' }}>Crypto Futures Analysis</div>
              <div style={{ fontSize: '11px', color: C.dim }}>2026-04-30 · EW + ICT/SMC + Orderflow</div>
            </div>
            <div style={{ display: 'flex', gap: '6px', flexWrap: 'wrap' }}>
              {bullCount > 0 && <Badge color={C.bull}>강세 ×{bullCount}</Badge>}
              {neutralCount > 0 && <Badge color={C.neutral}>중립 ×{neutralCount}</Badge>}
              {bearCount > 0 && <Badge color={C.bear}>약세 ×{bearCount}</Badge>}
              <Badge color={C.primary}>{mktSentiment}</Badge>
              <Badge color={C.neutral}>Fed 동결</Badge>
            </div>
          </div>
        ) : (
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
            <div>
              <div style={{ fontSize: '18px', fontWeight: 800, color: C.text, fontFamily: 'Poppins' }}>Crypto Futures Analysis</div>
              <div style={{ fontSize: '11px', color: C.dim, marginTop: '2px' }}>2026-04-30 · BTCUSDT · ETHUSDT · SOLUSDT · HYPEUSDT · EW + ICT/SMC + Orderflow</div>
            </div>
            <div style={{ display: 'flex', gap: '8px', alignItems: 'center' }}>
              {bullCount > 0 && <Badge color={C.bull}>강세 ×{bullCount}</Badge>}
              {neutralCount > 0 && <Badge color={C.neutral}>중립 ×{neutralCount}</Badge>}
              {bearCount > 0 && <Badge color={C.bear}>약세 ×{bearCount}</Badge>}
              <Badge color={C.primary}>{mktSentiment}</Badge>
              <Badge color={C.neutral}>Fed 동결 확인</Badge>
            </div>
          </div>
        )}
      </div>

      <div ref={tabBarRef} style={{ background: C.panel, borderBottom: `1px solid ${C.border}`, display: 'flex', overflowX: 'auto', scrollbarWidth: 'none' }}>
        {TABS.map(tab => (
          <button key={tab} data-active={activeTab === tab ? 'true' : 'false'} onClick={() => setActiveTab(tab)} style={{ background: 'none', border: 'none', borderBottom: `2px solid ${activeTab === tab ? C.primary : 'transparent'}`, color: activeTab === tab ? C.primary : C.sub, padding: isMobile ? '14px 14px' : '12px 20px', fontSize: '12px', fontWeight: activeTab === tab ? 700 : 400, cursor: 'pointer', whiteSpace: 'nowrap', fontFamily: 'Poppins', transition: 'color 0.15s' }}>{tab}</button>
        ))}
      </div>

      <div style={{ padding: contentPadding }}>
        {tabContent}
      </div>

      <div style={{ padding: isMobile ? '12px' : '14px 24px', borderTop: `1px solid ${C.border}`, background: C.panel, display: 'flex', flexDirection: isMobile ? 'column' : 'row', justifyContent: 'space-between', gap: isMobile ? '6px' : '0', alignItems: isMobile ? 'flex-start' : 'center', fontSize: '10px', color: C.dim }}>
        <span>데이터 기준: 2026-04-29 23:04 UTC (Binance · Coinalyze · Coinglass · Investing.com · TradingView)</span>
        <span>투자 참고용 분석 · 손익에 대한 책임은 본인에게 있습니다</span>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Dashboard />);
</script>
</body>
</html>
