// ─── STRATEGY UTILS (from _mobile_snippet.md §6) ─────────────────────────────
function asNumber(v){if(typeof v==='number'&&Number.isFinite(v))return v;if(typeof v==='string'&&v.trim()!==''){const n=Number(v);return Number.isFinite(n)?n:null;}return null;}
function dedupeLevels(levels){return[...new Set((levels||[]).map(asNumber).filter(v=>v!=null))].sort((a,b)=>a-b);}
function pickNearest(levels,predicate,sortFn){const f=dedupeLevels(levels).filter(predicate||(()=>true));if(!f.length)return null;return[...f].sort(sortFn||((a,b)=>a-b))[0];}
function formatStrategyPrice(v){const n=asNumber(v);return n!=null?`$${n.toLocaleString(undefined,{maximumFractionDigits:2})}`:'—';}
function sortScenariosByProbability(pair){const order=['bull','bear','neutral'];return order.map(k=>({key:k,...(pair.scenarios?.[k]||{})})).sort((l,r)=>{const lp=asNumber(l.prob)??-Infinity;const rp=asNumber(r.prob)??-Infinity;if(rp!==lp)return rp-lp;return order.indexOf(l.key)-order.indexOf(r.key);});}
function collectStrategyLevels(pair){const price=asNumber(pair.price);const l4=pair.levels?.['4H']||{};const ict4=pair.ict?.['4H']||{};const ew4=pair.ew?.['4H']||{};const support=dedupeLevels([...(l4.ssl||[]),...(l4.swing_lows||[])]);const resistance=dedupeLevels([...(l4.bsl||[]),...(l4.swing_highs||[])]);const poi=asNumber(ict4.poi_level);const poiB=poi!=null&&price!=null?poi<=price*1.02:poi!=null;const poiS=poi!=null&&price!=null?poi>price:poi!=null;const longEntries=dedupeLevels([...support,...(poiB?[poi]:[])]);const shortEntries=dedupeLevels([...resistance,...(poiS?[poi]:[])]);const longTargets=dedupeLevels([...resistance.filter(v=>price==null||v>price),ew4.target]);const shortTargets=dedupeLevels([...support.filter(v=>price==null||v<price)]);const longStops=dedupeLevels([...support,...(poi!=null?[poi]:[])]);const shortStops=dedupeLevels([...resistance,...(poi!=null?[poi]:[])]);return{price,support,resistance,longEntries,shortEntries,longTargets,shortTargets,longStops,shortStops};}
function buildStrategyRecommendation(pair,ranked,variant){const{price,support,resistance,longEntries,shortEntries,longTargets,shortTargets,longStops,shortStops}=collectStrategyLevels(pair);const key=ranked?.key||'neutral';const prob=asNumber(ranked?.prob)??0;const conf=Array.isArray(pair.confluence)?pair.confluence.slice(0,1).join(' + '):'';const label=variant||'Primary';const nearR=price!=null&&resistance.length?Math.abs(resistance.filter(v=>v>price)[0]-price)/price<=0.01:false;const nearS=price!=null&&support.length?Math.abs(price-[...support].reverse().filter(v=>v<price)[0])/price<=0.01:false;if(key==='neutral')return{label,scenarioKey:key,prob,action:'Wait',entry:null,tp:null,sl:null,rationale:`${ranked?.title||'중립 바이어스'} — 관망 유지.`};if(key==='bull'){const entry=pickNearest(longEntries,v=>price==null||v<=price*1.02,(a,b)=>price==null?a-b:Math.abs(a-price)-Math.abs(b-price));const tp=pickNearest(longTargets,v=>price==null||v>price,(a,b)=>a-b);const sl=entry!=null?pickNearest(longStops,v=>v<entry,(a,b)=>b-a):null;if(!entry||!tp||!sl)return{label,scenarioKey:key,prob,action:'Wait',entry:null,tp:null,sl:null,rationale:'강세 방향성 존재하나 구조 레벨 불완전.'};return{label,scenarioKey:key,prob,action:nearR?'Breakout Long':'Pullback Long',entry,tp,sl,rationale:`Bull ${prob}% + ${pair.biasLabel||'neutral'}${conf?` + ${conf}`:''}.`};}const entry=pickNearest(shortEntries,v=>price==null||v>=price*0.98,(a,b)=>price==null?a-b:Math.abs(a-price)-Math.abs(b-price));const tp=pickNearest(shortTargets,v=>price==null||v<price,(a,b)=>b-a);const sl=entry!=null?pickNearest(shortStops,v=>v>entry,(a,b)=>a-b):null;if(!entry||!tp||!sl)return{label,scenarioKey:'bear',prob,action:'Wait',entry:null,tp:null,sl:null,rationale:'약세 방향성 존재하나 구조 레벨 불완전.'};return{label,scenarioKey:'bear',prob,action:nearS?'Breakdown Short':'Rejection Short',entry,tp,sl,rationale:`Bear ${prob}% + ${pair.biasLabel||'neutral'}${conf?` + ${conf}`:''}.`};}

function useIsMobile(){const[m,setM]=React.useState(()=>window.matchMedia('(max-width:767px)').matches);React.useEffect(()=>{const mql=window.matchMedia('(max-width:767px)');const h=e=>setM(e.matches);mql.addEventListener('change',h);return()=>mql.removeEventListener('change',h);},[]);return m;}

function Card({children,style}){return<div style={{background:C.card,borderRadius:'10px',padding:'16px',border:`1px solid ${C.border}`,...style}}>{children}</div>;}

function Badge({color,bg,children,style}){const c=color||C.text;const b=bg||(c+'20');return<span style={{background:b,color:c,borderRadius:'4px',padding:'2px 8px',fontSize:'11px',fontWeight:600,display:'inline-block',...style}}>{children}</span>;}

function biasColor(bias){if(bias==='bull'||bias==='long')return C.bull;if(bias==='bear'||bias==='short')return C.bear;return C.neutral;}

// ─── STRATEGY COMPONENTS ─────────────────────────────────────────────────────
function StrategyKVRow({label,value}){return<div style={{display:'flex',justifyContent:'space-between',gap:'10px',fontSize:'11px',marginBottom:'4px'}}><span style={{color:C.dim}}>{label}</span><span style={{color:C.text,fontWeight:600}}>{value}</span></div>;}

function strategyTone(s){if(s.action.includes('Long'))return{color:C.bull,bg:'#4ade8010',border:'#4ade8030'};if(s.action.includes('Short'))return{color:C.bear,bg:'#f8717110',border:'#f8717130'};return{color:C.neutral,bg:'#fbbf2410',border:'#fbbf2430'};}

function StrategyBlock({title,strategy,muted}){const tone=strategyTone(strategy);return<div style={{background:muted?C.bg:tone.bg,border:`1px solid ${muted?C.border:tone.border}`,borderRadius:'8px',padding:'12px'}}><div style={{display:'flex',justifyContent:'space-between',gap:'8px',marginBottom:'10px'}}><span style={{color:muted?C.sub:tone.color,fontSize:'11px',fontWeight:700}}>{title}</span><span style={{color:muted?C.sub:tone.color,fontSize:'11px',fontWeight:700}}>{strategy.prob}%</span></div><StrategyKVRow label="Action" value={strategy.action}/><StrategyKVRow label="Entry" value={formatStrategyPrice(strategy.entry)}/><StrategyKVRow label="TP" value={formatStrategyPrice(strategy.tp)}/><StrategyKVRow label="SL" value={formatStrategyPrice(strategy.sl)}/><div style={{marginTop:'8px',fontSize:'11px',color:C.sub,lineHeight:'1.5'}}>{strategy.rationale}</div></div>;}

function OverviewStrategyCard({pair}){const ranked=sortScenariosByProbability(pair);const primary=buildStrategyRecommendation(pair,ranked[0],'Primary');const alternate=buildStrategyRecommendation(pair,ranked[1],'Alternate');return<Card><div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'12px'}}><div><div style={{fontSize:'14px',fontWeight:800,color:C.text,fontFamily:'Poppins',marginBottom:'2px'}}>{pair.short}</div><div style={{fontSize:'11px',color:C.sub}}>${pair.price.toLocaleString()}</div></div><Badge color={biasColor(pair.bias)}>{pair.biasLabel}</Badge></div><div style={{display:'grid',gridTemplateColumns:'1fr',gap:'10px'}}><StrategyBlock title="Primary" strategy={primary}/><StrategyBlock title="Alternate" strategy={alternate} muted/></div></Card>;}

function OverviewStrategyGrid({pairs,isMobile}){return<div style={{marginBottom:'16px'}}><div style={{fontSize:'12px',color:C.sub,textTransform:'uppercase',letterSpacing:'0.5px',marginBottom:'10px',fontWeight:600}}>Strategy Recommendation</div><div style={{display:'grid',gridTemplateColumns:isMobile?'1fr':'repeat(2,1fr)',gap:'12px'}}>{pairs.map(p=><OverviewStrategyCard key={p.symbol} pair={p}/>)}</div></div>;}

  const borderColor=imp=>imp==='high'?C.bear:imp==='medium'?C.neutral:'#9ca3af';
  const catStyle=cat=>{if(cat==='monetary_policy')return{color:'#c084fc',bg:'#c084fc20'};if(cat==='macro_data')return{color:C.cvdPos,bg:C.cvdPos+'20'};if(cat==='crypto_event')return{color:C.bull,bg:C.bull+'20'};return{color:C.sub,bg:C.border};};
  if(!events||!events.length)return<div style={{padding:'32px',textAlign:'center',color:C.sub}}>No macro events in 36h window</div>;
  return(
    <div style={{display:'flex',flexDirection:'column',gap:'12px'}}>
      {events.map(ev=>{const cs=catStyle(ev.category);return(
        <div key={ev.id} style={{background:C.card,border:`1px solid ${C.border}`,borderLeft:`4px solid ${borderColor(ev.importance)}`,borderRadius:'8px',padding:'14px'}}>

            <Badge color={cs.color} bg={cs.bg}>{ev.category.replace(/_/g,' ')}</Badge>
            {ev.importance==='high'&&<Badge color={C.bear} bg={C.bear+'20'}>HIGH</Badge>}
          </div>
          <div style={{fontSize:'13px',fontWeight:600,color:C.text,marginBottom:'6px'}}>{ev.title}</div>
          {(ev.actual||ev.forecast||ev.previous)&&(
            <div style={{display:'flex',gap:'16px',marginBottom:'6px',flexWrap:'wrap'}}>
              {ev.actual&&<span style={{fontSize:'11px',color:C.sub}}>실제: <b style={{color:C.text}}>{ev.actual}</b></span>}
              {ev.forecast&&<span style={{fontSize:'11px',color:C.sub}}>예상: <b style={{color:C.text}}>{ev.forecast}</b></span>}
              {ev.previous&&<span style={{fontSize:'11px',color:C.sub}}>이전: <b style={{color:C.text}}>{ev.previous}</b></span>}
            </div>
          )}
          <div style={{fontSize:'12px',color:C.sub,lineHeight:'1.5',marginBottom:'8px'}}>{ev.summary}</div>
          <div style={{display:'flex',flexWrap:'wrap',gap:'4px'}}>
            {(ev.impact_assets||[]).map(a=><span key={a} style={{fontSize:'10px',border:`1px solid ${C.bull}`,color:C.bull,borderRadius:'4px',padding:'1px 6px'}}>{a.replace('USDT','')}</span>)}
          </div>
        </div>
      );})}
    </div>
  );
}

// ─── ANALYSIS TAB COMPONENTS ──────────────────────────────────────────────────
function TFAlignmentBar({pair}){
  return(
    <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:'6px',marginBottom:'14px'}}>
      {['1D','4H','1H'].map(tf=>{
        const ew=pair.ew[tf]||{};const ict=pair.ict[tf]||{};const dc=biasColor(ew.direction);
        return(
          <div key={tf} style={{background:C.panel,borderRadius:'8px',padding:'10px',textAlign:'center',border:`1px solid ${dc+'40'}`}}>
            <div style={{fontSize:'12px',fontWeight:700,color:C.sub,marginBottom:'4px'}}>{tf}</div>
            <div style={{fontSize:'12px',fontWeight:700,color:dc,marginBottom:'2px',fontFamily:'Inconsolata'}}>EW: {ew.current_wave||'—'}</div>
            <div style={{fontSize:'10px',color:C.dim}}>{ict.structure_tag||'—'} · {ict.structure_direction||'—'}</div>
          </div>
        );
      })}
    </div>
  );
}

function EWWaveStep({ew}){
  if(!ew)return<div style={{color:C.dim,fontSize:'12px'}}>데이터 없음</div>;
  const dc=biasColor(ew.direction);
  return(
    <div>
      <div style={{display:'flex',justifyContent:'space-between',marginBottom:'7px'}}><span style={{fontSize:'11px',color:C.sub}}>방향</span><span style={{fontSize:'11px',fontWeight:700,color:dc}}>{ew.direction||'—'}</span></div>
      <div style={{display:'flex',justifyContent:'space-between',marginBottom:'7px'}}><span style={{fontSize:'11px',color:C.sub}}>현재 파동</span><span style={{fontSize:'14px',fontWeight:800,color:dc,fontFamily:'Inconsolata'}}>{ew.current_wave||'—'}</span></div>
      <div style={{display:'flex',justifyContent:'space-between',marginBottom:'7px'}}><span style={{fontSize:'11px',color:C.sub}}>완료 파동</span><span style={{fontSize:'11px',color:C.text}}>{(ew.completed_waves||[]).join(' → ')||'—'}</span></div>
      <div style={{display:'flex',justifyContent:'space-between',marginBottom:'10px'}}><span style={{fontSize:'11px',color:C.sub}}>목표</span><span style={{fontSize:'11px',color:C.bull,fontFamily:'Inconsolata',fontWeight:600}}>{ew.target!=null?ew.target.toLocaleString():'—'}</span></div>
      {ew.count&&<div style={{fontSize:'11px',color:C.sub,lineHeight:'1.6',background:C.panel,borderRadius:'6px',padding:'8px',marginBottom:'6px'}}>{ew.count}</div>}
      {ew.detail&&<div style={{fontSize:'11px',color:C.dim,lineHeight:'1.5'}}>{ew.detail}</div>}
    </div>
  );
}

function ICTGrid({ict}){
  if(!ict)return<div style={{color:C.dim,fontSize:'12px'}}>데이터 없음</div>;
  const sc=biasColor(ict.structure_direction);
  const rows=[
    {label:'Structure',value:ict.structure_tag||'—',color:sc},
    {label:'Direction',value:ict.structure_direction||'—',color:sc},
    {label:'POI',value:ict.poi_level!=null?`$${ict.poi_level.toLocaleString()}`:'—',color:C.neutral},
    {label:'BSL',value:ict.bsl!=null?`$${ict.bsl.toLocaleString()}`:'—',color:C.bull},
    {label:'SSL',value:ict.ssl!=null?`$${ict.ssl.toLocaleString()}`:'—',color:C.bear},
  ];
  return(
    <div>
      {rows.map(r=><div key={r.label} style={{display:'flex',justifyContent:'space-between',marginBottom:'7px'}}><span style={{fontSize:'11px',color:C.sub}}>{r.label}</span><span style={{fontSize:'11px',fontWeight:600,color:r.color,fontFamily:'Inconsolata'}}>{r.value}</span></div>)}
      {ict.structure&&<div style={{fontSize:'11px',color:C.sub,lineHeight:'1.5',background:C.panel,borderRadius:'6px',padding:'8px',marginTop:'6px',marginBottom:'4px'}}>{ict.structure}</div>}
      {ict.smt&&<div style={{fontSize:'11px',color:C.convergence,marginTop:'4px',lineHeight:'1.4'}}>⚡ SMT: {ict.smt}</div>}
    </div>
  );
}

function LevelsPanel({levels,tf}){
  if(!levels)return null;
  const fmtList=(arr,color)=>arr&&arr.length?arr.map((v,i)=><span key={i} style={{fontSize:'10px',fontFamily:'Inconsolata',color,marginRight:'6px'}}>{typeof v==='number'?v.toLocaleString():v}</span>):<span style={{fontSize:'10px',color:C.dim}}>—</span>;
  const section=(label,arr,color)=>(
    <div style={{marginBottom:'6px'}}>
      <span style={{fontSize:'10px',color:C.sub,fontWeight:600,marginRight:'6px'}}>{label}</span>
      {fmtList(arr,color)}
    </div>
  );
  return(
    <div style={{background:C.panel,borderRadius:'8px',padding:'10px',marginTop:'12px'}}>
      <div style={{fontSize:'11px',fontWeight:700,color:C.sub,marginBottom:'8px'}}>Key Levels ({tf})</div>
      {section('Bull OB',levels.ob?.bull,C.bull)}
      {section('Bear OB',levels.ob?.bear,C.bear)}
      {section('Bull FVG',levels.fvg?.bull,C.bull)}
      {section('Bear FVG',levels.fvg?.bear,C.bear)}
      {section('BSL',levels.bsl,C.bull)}
      {section('SSL',levels.ssl,C.bear)}
    </div>
  );
}

function AnalysisCard({p,isMobile}){
  const[tf,setTf]=React.useState('4H');
  const ew=p.ew[tf]||{};const ict=p.ict[tf]||{};const lvl=p.levels[tf];
  return(
    <div>
      <TFAlignmentBar pair={p}/>
      <div style={{marginBottom:'14px'}}>
        <div style={{fontSize:'11px',color:C.sub,marginBottom:'6px',fontWeight:600}}>Confluence</div>
        <div style={{display:'flex',flexWrap:'wrap',gap:'6px'}}>
          {(p.confluence||[]).map((c,i)=><span key={i} style={{fontSize:'11px',background:C.convergence+'20',color:C.convergence,borderRadius:'4px',padding:'3px 8px',lineHeight:'1.4'}}>{c}</span>)}
        </div>
      </div>
      <div style={{display:'flex',gap:'6px',marginBottom:'14px'}}>
        {['1D','4H','1H'].map(t=><button key={t} onClick={()=>setTf(t)} style={{background:tf===t?C.primary+'30':C.panel,color:tf===t?C.primary:C.sub,border:`1px solid ${tf===t?C.primary:C.border}`,borderRadius:'6px',padding:'4px 14px',fontSize:'11px',fontWeight:tf===t?700:400,cursor:'pointer'}}>{t}</button>)}
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:'12px'}}>
        <Card><div style={{fontSize:'12px',fontWeight:700,color:C.text,marginBottom:'10px',fontFamily:'Poppins'}}>Elliott Wave</div><EWWaveStep ew={ew}/></Card>
        <Card><div style={{fontSize:'12px',fontWeight:700,color:C.text,marginBottom:'10px',fontFamily:'Poppins'}}>ICT / SMC</div><ICTGrid ict={ict}/></Card>
      </div>
      <LevelsPanel levels={lvl} tf={tf}/>
    </div>
  );
}

function AnalysisTab({pairs,selectedPair,onSelectPair,isMobile}){
  const pair=pairs.find(p=>p.symbol===selectedPair)||pairs[0];
  return(
    <div>
      <div style={{display:'flex',gap:'8px',marginBottom:'16px',flexWrap:'wrap'}}>
        {pairs.map(p=><button key={p.symbol} onClick={()=>onSelectPair(p.symbol)} style={{background:selectedPair===p.symbol?C.heatHigh+'22':C.card,color:selectedPair===p.symbol?C.heatHigh:C.sub,border:`1px solid ${selectedPair===p.symbol?C.heatHigh:C.border}`,borderRadius:'6px',padding:isMobile?'8px 14px':'6px 16px',fontSize:'12px',fontWeight:selectedPair===p.symbol?700:400,cursor:'pointer'}}>{p.short}</button>)}
      </div>
      <AnalysisCard p={pair} isMobile={isMobile}/>
    </div>

}

// ─── ORDERFLOW TAB ────────────────────────────────────────────────────────────
function OrderflowTab({data,isMobile}){
  const syms=['BTCUSDT','ETHUSDT','SOLUSDT','HYPEUSDT'];
  const shorts={BTCUSDT:'BTC',ETHUSDT:'ETH',SOLUSDT:'SOL',HYPEUSDT:'HYPE'};
  const fr=v=>{if(!v)return<span style={{color:C.sub}}>—</span>;const pos=v.startsWith('+');return<span style={{color:pos?C.bull:C.bear,fontFamily:'Inconsolata',fontWeight:600}}>{v}</span>;};
  const cvdCell=d=>{if(!d)return<span style={{color:C.sub}}>—</span>;const c=d.cvd_direction==='positive'?C.cvdPos:C.cvdNeg;return<span style={{color:c,fontFamily:'Inconsolata'}}>{d.cvd_direction}/{d.cvd_trend}</span>;};
  return(
    <div>
      <div style={{display:'grid',gridTemplateColumns:isMobile?'repeat(2,1fr)':'repeat(4,1fr)',gap:'12px',marginBottom:'16px'}}>
        {syms.map(sym=>{const d=data[sym]||{};const oir=d.oi_trend==='rising';return(
          <Card key={sym}>
            <div style={{fontSize:'13px',fontWeight:700,color:C.text,marginBottom:'8px',fontFamily:'Poppins'}}>{shorts[sym]}</div>
            <div style={{fontSize:'11px',color:C.sub,marginBottom:'2px'}}>Open Interest</div>
            <div style={{fontSize:'16px',fontWeight:700,color:oir?C.bull:C.bear,fontFamily:'Inconsolata',marginBottom:'2px'}}>{d.oi_usd_str||'—'}</div>
            <div style={{fontSize:'11px',color:oir?C.bull:C.bear,marginBottom:'8px'}}>{d.oi_change_24h} ({d.oi_trend})</div>
            <div style={{display:'flex',justifyContent:'space-between',fontSize:'11px'}}><span style={{color:C.sub}}>Funding</span>{fr(d.funding_rate)}</div>
          </Card>
        );})}
      </div>
      <div style={{overflowX:'auto'}}>
        <table style={{width:'100%',minWidth:isMobile?'480px':'auto',borderCollapse:'collapse'}}>
          <thead><tr style={{borderBottom:`1px solid ${C.border}`}}>{['페어','OI','OI 24h Change','Funding','Predicted','CVD'].map(h=><th key={h} style={{fontSize:'11px',color:C.sub,padding:'8px 12px',textAlign:'left',fontWeight:600,whiteSpace:'nowrap'}}>{h}</th>)}</tr></thead>
          <tbody>
            {syms.map((sym,i)=>{const d=data[sym]||{};const oir=d.oi_trend==='rising';return(
              <tr key={sym} style={{borderBottom:`1px solid ${C.border}`,background:i%2===0?'transparent':C.panel}}>
                <td style={{padding:'10px 12px',fontSize:'13px',fontWeight:700,color:C.text,fontFamily:'Poppins'}}>{shorts[sym]}</td>
                <td style={{padding:'10px 12px',fontSize:'12px',fontFamily:'Inconsolata',color:oir?C.bull:C.bear,fontWeight:600}}>{d.oi_usd_str}</td>
                <td style={{padding:'10px 12px',fontSize:'12px',fontFamily:'Inconsolata',color:oir?C.bull:C.bear}}>{d.oi_change_24h}</td>
                <td style={{padding:'10px 12px'}}>{fr(d.funding_rate)}</td>
                <td style={{padding:'10px 12px'}}>{fr(d.funding_rate_predicted)}</td>
                <td style={{padding:'10px 12px'}}>{cvdCell(d)}</td>
              </tr>
            );})}
          </tbody>
        </table>
      </div>
      <div style={{marginTop:'12px',fontSize:'11px',color:C.dim}}>* 데이터 기준: Coinalyze API 2026-05-02 00:04 UTC · Binance Futures</div>
    </div>
  );
}

// ─── SCENARIOS TAB ────────────────────────────────────────────────────────────
function ScenariosTab({pairs,isMobile}){
  const[sel,setSel]=React.useState(pairs[0]?.symbol);
  const pair=pairs.find(p=>p.symbol===sel)||pairs[0];
  const scenOrder=['bull','neutral','bear'];
  const scCol={bull:{c:C.bull,bg:C.bull+'12',bd:C.bull+'35'},neutral:{c:C.neutral,bg:C.neutral+'12',bd:C.neutral+'35'},bear:{c:C.bear,bg:C.bear+'12',bd:C.bear+'35'}};
  const scLabel={bull:'강세',neutral:'중립',bear:'약세'};
  return(
    <div>
      <div style={{display:'flex',gap:'8px',marginBottom:'16px',flexWrap:'wrap'}}>
        {pairs.map(p=><button key={p.symbol} onClick={()=>setSel(p.symbol)} style={{background:sel===p.symbol?biasColor(p.bias)+'22':C.card,color:sel===p.symbol?biasColor(p.bias):C.sub,border:`1px solid ${sel===p.symbol?biasColor(p.bias):C.border}`,borderRadius:'6px',padding:'6px 14px',fontSize:'12px',fontWeight:sel===p.symbol?700:400,cursor:'pointer'}}>{p.short}</button>)}
      </div>
      <div style={{display:'grid',gridTemplateColumns:isMobile?'1fr':'repeat(3,1fr)',gap:'12px'}}>
        {scenOrder.map(key=>{const sc=pair.scenarios[key];if(!sc)return null;const col=scCol[key];return(
          <div key={key} style={{background:col.bg,border:`1px solid ${col.bd}`,borderRadius:'10px',padding:'16px'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'12px'}}>
              <span style={{fontSize:'12px',fontWeight:700,color:col.c}}>{scLabel[key]}</span>
              <span style={{fontSize:'20px',fontWeight:800,color:col.c,fontFamily:'Poppins'}}>{sc.prob}%</span>
            </div>
            <div style={{fontSize:'12px',color:C.text,fontWeight:600,marginBottom:'10px',lineHeight:'1.5'}}>{sc.title}</div>
            <div style={{borderTop:`1px solid ${col.bd}`,paddingTop:'10px'}}>
              <div style={{fontSize:'11px',color:C.sub,marginBottom:'4px',fontWeight:600}}>트리거</div>
              <div style={{fontSize:'11px',color:C.text,marginBottom:'10px',lineHeight:'1.4'}}>{sc.trigger}</div>
              <div style={{fontSize:'11px',color:C.sub,marginBottom:'4px',fontWeight:600}}>무효화</div>
              <div style={{fontSize:'11px',color:C.dim,lineHeight:'1.4'}}>{sc.invalidate}</div>
            </div>
          </div>
        );})}
      </div>
    </div>
  );
}

// ─── RISK TAB ─────────────────────────────────────────────────────────────────
function RiskCard({p}){
  const bc=biasColor(p.bias);
  const long=p.risk.long;const short=p.risk.short;
  const setupBlock=(setup,color,label)=>(
    <div style={{background:color+'10',border:`1px solid ${color+'30'}`,borderRadius:'8px',padding:'12px'}}>
      <div style={{fontSize:'11px',fontWeight:700,color,marginBottom:'10px'}}>{label}</div>
      {setup.entry!=null?(
        <>
          <div style={{display:'flex',justifyContent:'space-between',fontSize:'11px',marginBottom:'4px'}}><span style={{color:C.sub}}>Entry</span><span style={{color:C.text,fontFamily:'Inconsolata',fontWeight:600}}>${setup.entry.toLocaleString()}</span></div>
          <div style={{display:'flex',justifyContent:'space-between',fontSize:'11px',marginBottom:'4px'}}><span style={{color:C.sub}}>TP</span><span style={{color:C.bull,fontFamily:'Inconsolata',fontWeight:600}}>${setup.tp.toLocaleString()}</span></div>
          <div style={{display:'flex',justifyContent:'space-between',fontSize:'11px',marginBottom:'4px'}}><span style={{color:C.sub}}>SL</span><span style={{color:C.bear,fontFamily:'Inconsolata',fontWeight:600}}>${setup.sl.toLocaleString()}</span></div>
          <div style={{display:'flex',justifyContent:'space-between',fontSize:'11px',marginBottom:'8px'}}><span style={{color:C.sub}}>R:R</span><span style={{color:C.neutral,fontWeight:700}}>{setup.rr}</span></div>
        </>
      ):<div style={{fontSize:'11px',color:C.dim,marginBottom:'8px'}}>비추천</div>}
      <div style={{fontSize:'10px',color:C.dim,lineHeight:'1.4'}}>{setup.note}</div>
    </div>
  );
  return(
    <Card>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'14px'}}>
        <div style={{fontSize:'14px',fontWeight:800,color:C.text,fontFamily:'Poppins'}}>{p.short} <span style={{fontSize:'11px',color:C.sub,fontWeight:400}}>${p.price.toLocaleString()}</span></div>
        <Badge color={bc}>{p.biasLabel}</Badge>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'10px'}}>
        {setupBlock(long,C.bull,'Long Setup')}
        {setupBlock(short,C.bear,'Short Setup')}
      </div>
    </Card>
  );
}

function RiskTab({pairs,selectedPair,onSelectPair,isMobile}){
  if(!isMobile)return<div style={{display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:'12px'}}>{pairs.map(p=><RiskCard key={p.symbol} p={p}/>)}</div>;
  const pair=pairs.find(p=>p.symbol===selectedPair)||pairs[0];
  return(
    <div>
      <div style={{display:'flex',gap:'8px',marginBottom:'16px',flexWrap:'wrap'}}>
        {pairs.map(item=><button key={item.symbol} onClick={()=>onSelectPair(item.symbol)} style={{background:selectedPair===item.symbol?biasColor(item.bias)+'22':C.card,color:selectedPair===item.symbol?biasColor(item.bias):C.sub,border:`1px solid ${selectedPair===item.symbol?biasColor(item.bias):C.border}`,borderRadius:'6px',padding:'8px 14px',fontSize:'12px',cursor:'pointer',fontWeight:selectedPair===item.symbol?700:400}}>{item.short}</button>)}
      </div>
      <RiskCard p={pair}/>
    </div>
  );
}

// ─── DASHBOARD ────────────────────────────────────────────────────────────────
function Dashboard(){
  const isMobile=useIsMobile();
  const tabBarRef=React.useRef(null);
  const[activeTab,setActiveTab]=React.useState('Overview');
  const[selectedPair,setSelectedPair]=React.useState(PAIRS[0].symbol);

  React.useEffect(()=>{
    if(!isMobile||!tabBarRef.current)return;
    const btn=tabBarRef.current.querySelector('[data-active="true"]');
    if(btn)btn.scrollIntoView({inline:'center',behavior:'smooth'});
  },[activeTab,isMobile]);

  const tabs=['Overview','Macro','분석','Orderflow','Scenarios','Risk'];

  let tabContent;
  if(activeTab==='Overview') tabContent=<OverviewTab pairs={PAIRS} selectedPair={selectedPair} onSelectPair={setSelectedPair} isMobile={isMobile}/>;
  else if(activeTab==='Macro') tabContent=<MacroTab events={MACRO_EVENTS} isMobile={isMobile}/>;
  else if(activeTab==='분석') tabContent=<AnalysisTab pairs={PAIRS} selectedPair={selectedPair} onSelectPair={setSelectedPair} isMobile={isMobile}/>;
  else if(activeTab==='Orderflow') tabContent=<OrderflowTab data={ORDERFLOW_DATA} isMobile={isMobile}/>;
  else if(activeTab==='Scenarios') tabContent=<ScenariosTab pairs={PAIRS} isMobile={isMobile}/>;
  else if(activeTab==='Risk') tabContent=<RiskTab pairs={PAIRS} selectedPair={selectedPair} onSelectPair={setSelectedPair} isMobile={isMobile}/>;

  const contentPadding=isMobile?'14px 12px':'20px 24px';
  const headerPadding=isMobile?'12px':'14px 24px';

  return(
    <div style={{minHeight:'100vh',background:C.bg}}>
      {/* HEADER */}
      <div style={{background:C.panel,borderBottom:`1px solid ${C.border}`,padding:headerPadding}}>
        {isMobile?(
          <div style={{display:'flex',flexDirection:'column',gap:'10px'}}>
            <div>
              <div style={{fontSize:'16px',fontWeight:700,color:C.text,fontFamily:'Poppins',marginBottom:'2px'}}>Crypto Futures Analysis</div>
              <div style={{fontSize:'11px',color:C.dim}}>2026-05-02 · EW + ICT/SMC + Orderflow</div>
            </div>
            <div style={{display:'flex',gap:'6px',flexWrap:'wrap'}}>
              {PAIRS.map(p=><Badge key={p.symbol} color={biasColor(p.bias)}>{p.short}: {p.change}</Badge>)}
            </div>
          </div>
        ):(
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <div>
              <div style={{fontSize:'20px',fontWeight:800,color:C.text,fontFamily:'Poppins',marginBottom:'3px'}}>Crypto Futures Analysis</div>
              <div style={{fontSize:'12px',color:C.dim}}>2026-05-02 · EW + ICT/SMC + Orderflow</div>
            </div>
            <div style={{display:'flex',gap:'8px',alignItems:'center'}}>
              {PAIRS.map(p=>(
                <div key={p.symbol} style={{textAlign:'center'}}>
                  <Badge color={biasColor(p.bias)} style={{marginBottom:'2px',display:'block'}}>{p.short}</Badge>
                  <div style={{fontSize:'11px',color:p.change.startsWith('+')?C.bull:C.bear,fontFamily:'Inconsolata'}}>{p.change}</div>
                </div>
              ))}
            </div>
          </div>
        )}
      </div>
      {/* TAB BAR */}
      <div ref={tabBarRef} style={{background:C.panel,borderBottom:`1px solid ${C.border}`,display:'flex',overflowX:'auto',WebkitOverflowScrolling:'touch',padding:'0 12px',scrollbarWidth:'none'}}>
        {tabs.map(tab=>(
          <button key={tab} data-active={activeTab===tab?'true':'false'} onClick={()=>setActiveTab(tab)} style={{background:'transparent',color:activeTab===tab?C.primary:C.sub,border:'none',borderBottom:activeTab===tab?`2px solid ${C.primary}`:'2px solid transparent',padding:isMobile?'14px 14px':'12px 18px',fontSize:'13px',fontWeight:activeTab===tab?700:400,cursor:'pointer',whiteSpace:'nowrap',transition:'color 0.15s'}}>{tab}</button>
        ))}
      </div>
      {/* CONTENT */}
      <div style={{padding:contentPadding,maxWidth:'1280px',margin:'0 auto'}}>
        {tabContent}
      </div>
      {/* FOOTER */}
      <div style={{display:'flex',flexDirection:isMobile?'column':'row',justifyContent:'space-between',gap:isMobile?'6px':'0',alignItems:isMobile?'flex-start':'center',fontSize:'11px',color:'#4b5563',padding:'16px 24px',borderTop:`1px solid ${C.border}`,marginTop:'24px'}}>
        <span>데이터 기준: 2026-05-02 00:00 UTC · Binance Futures · Coinalyze</span>
        <span>투자 참고용 — 매매 결정은 본인 책임</span>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Dashboard/>);
</script>
