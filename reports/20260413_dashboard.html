// ── Helpers ───────────────────────────────────────────────────────────────────

function useIsMobile() {
  const [m, setM] = React.useState(() => window.matchMedia('(max-width: 767px)').matches);
  React.useEffect(() => {
    const mql = window.matchMedia('(max-width: 767px)');
    const h = e => setM(e.matches);
    mql.addEventListener('change', h);
    return () => mql.removeEventListener('change', h);
  }, []);
  return m;
}

function fmt(n) {
  if (n >= 10000) return n.toLocaleString('en-US', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
  if (n >= 100) return n.toFixed(2);
  return n.toFixed(3);
}

function Badge({ children, color, bg }) {
  return (
    <span style={{
      display: 'inline-block', padding: '2px 8px', borderRadius: '4px',
      fontSize: '11px', fontWeight: 700, color: color || '#e8eaed', background: bg || '#1a1f2e',
      border: `1px solid ${color || '#374151'}`
    }}>{children}</span>
  );
}

function Card({ children, style }) {
  return (
    <div style={{ background: '#1a1f2e', borderRadius: '10px', padding: '16px', ...style }}>
      {children}
    </div>
  );
}

function SectionTitle({ children }) {
  return (
    <div style={{ fontSize: '11px', fontWeight: 700, color: '#6b7280', textTransform: 'uppercase', letterSpacing: '0.1em', marginBottom: '10px' }}>
      {children}
    </div>
  );
}

function RSIBar({ value, tf }) {
  const color = value >= 70 ? '#f87171' : value <= 30 ? '#4ade80' : value >= 60 ? '#fbbf24' : '#9ca3af';
  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: '8px', marginBottom: '6px' }}>
      <span style={{ fontSize: '11px', color: '#6b7280', width: '24px' }}>{tf}</span>
      <div style={{ flex: 1, height: '6px', background: '#0b0e14', borderRadius: '3px', overflow: 'hidden' }}>
        <div style={{ width: `${value}%`, height: '100%', background: color, borderRadius: '3px' }} />
      </div>
      <span style={{ fontSize: '12px', color, fontWeight: 700, width: '38px', textAlign: 'right' }}>{value.toFixed(1)}</span>
    </div>
  );
}

function VRVPRow({ label, value, price }) {
  const isAbove = price > value;
  const colors = { VAH: '#f59e0b', POC: '#22d3ee', VAL: '#4ade80' };
  return (
    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '5px' }}>
      <span style={{ fontSize: '11px', color: colors[label] || '#6b7280', fontWeight: 700 }}>{label}</span>
      <span style={{ fontSize: '12px', fontWeight: 700, color: isAbove ? '#4ade80' : '#f87171' }}>${fmt(value)}</span>
    </div>
  );
}

function BiasTag({ bias, label }) {
  const colors = { bullish: '#4ade80', bearish: '#f87171', neutral: '#fbbf24', warning: '#f59e0b' };
  const bgs = { bullish: '#052e16', bearish: '#2d0f0f', neutral: '#2d2100', warning: '#2d1b00' };
  return (
    <span style={{
      padding: '3px 8px', borderRadius: '4px', fontSize: '11px', fontWeight: 700,
      color: colors[bias], background: bgs[bias], border: `1px solid ${colors[bias]}40`
    }}>{label}</span>
  );
}

              background: 'transparent',
              border: 'none',
              borderBottom: activeTab === tab.id ? '2px solid #3b82f6' : '2px solid transparent',
              color: activeTab === tab.id ? '#3b82f6' : '#6b7280',
              fontSize: '13px',
              fontWeight: activeTab === tab.id ? 700 : 400,
              cursor: 'pointer',
              whiteSpace: 'nowrap',
              transition: 'color 0.15s',
            }}
          >
            {tab.label}
          </button>
        ))}
      </div>

      {/* Content */}
      <div style={{ padding: contentPadding, maxWidth: '1400px', margin: '0 auto' }}>
        {tabContent}
      </div>

      {/* Footer */}
      <div style={{
        display: 'flex',
        flexDirection: isMobile ? 'column' : 'row',
        justifyContent: 'space-between',
        alignItems: isMobile ? 'flex-start' : 'center',
        gap: isMobile ? '4px' : '0',
        padding: isMobile ? '12px' : '12px 24px',
        borderTop: '1px solid #1f2937',
        background: '#131720',
        fontSize: '11px',
        color: '#374151',
        marginTop: '20px',
      }}>
        <span>데이터: TradingView VRVP+RSI · Coinalyze OI/Funding · Coinglass Liquidation · 기준 2026-04-13</span>
        <span>투자 참고용 — 모든 분석은 확률적 시나리오이며 투자 권유가 아닙니다.</span>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Dashboard />);
  </script>
</body>
</html>
