// ─── 유틸 ────────────────────────────────────────────────────────────────
const fmtPrice = (p) => p >= 10000 ? `$${p.toLocaleString()}` : p >= 100 ? `$${p.toFixed(1)}` : `$${p.toFixed(2)}`;
const biasColor = (b) => b === 'bullish' ? '#4ade80' : b === 'bearish' ? '#f87171' : '#fbbf24';
const impColor = (imp) => imp === 'high' ? '#f87171' : imp === 'medium' ? '#fbbf24' : '#9ca3af';

// ─── useIsMobile ─────────────────────────────────────────────────────────
function useIsMobile() {
  const [m, setM] = React.useState(() => window.matchMedia('(max-width: 767px)').matches);
  React.useEffect(() => {
    const mql = window.matchMedia('(max-width: 767px)');
    const h = e => setM(e.matches);
    mql.addEventListener('change', h);
    return () => mql.removeEventListener('change', h);
  }, []);
  return m;
}

// ─── Mono ─────────────────────────────────────────────────────────────────
const Mono = ({ children, style }) => (
  <span style={{ fontFamily: "'Space Mono', monospace", ...style }}>{children}</span>
);

// ─── RSIBar ───────────────────────────────────────────────────────────────
function RSIBar({ value, tf }) {
  const color = value >= 70 ? '#f87171' : value <= 30 ? '#4ade80' : '#e8eaed';
  return (
    <div style={{ background: '#131720', borderRadius: '6px', padding: '8px 6px', textAlign: 'center' }}>
      <div style={{ fontSize: '10px', color: '#6b7280', marginBottom: '4px' }}>RSI {tf}</div>
      <div style={{ fontSize: '13px', fontWeight: 700, color, fontFamily: "'Space Mono', monospace" }}>{value.toFixed(1)}</div>
      <div style={{ marginTop: '5px', height: '2px', background: '#2d3748', borderRadius: '1px' }}>
        <div style={{ height: '100%', width: `${Math.min(value, 100)}%`, background: color, borderRadius: '1px' }} />
      </div>
    </div>
  );
}

// ─── Card ─────────────────────────────────────────────────────────────────
function Card({ children, style }) {
  return (
    <div style={{ background: '#1a1f2e', borderRadius: '10px', padding: '16px', border: '1px solid #1f2937', boxShadow: '0 2px 8px rgba(0,0,0,0.25)', ...style }}>
      {children}
    </div>
  );
}

function SectionTitle({ children, accent }) {
  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: '8px', fontSize: '11px', fontWeight: 600, color: '#6b7280', textTransform: 'uppercase', letterSpacing: '0.1em', marginBottom: '12px' }}>
      <div style={{ width: '3px', height: '12px', background: accent || '#3b82f6', borderRadius: '2px', flexShrink: 0 }} />
      {children}
    </div>
  );
}

    tabContent = <RiskTab pairs={PAIRS} isMobile={isMobile} />;
