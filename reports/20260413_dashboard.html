// ---- Helper Components ----

function Badge({ children, bg, color, border }) {
  return (
    <span style={{
      background: bg || 'transparent',
      color: color || '#e8eaed',
      border: border ? `1px solid ${border}` : 'none',
      borderRadius: '4px',
      padding: '2px 7px',
      fontSize: '11px',
      fontWeight: 600,
      display: 'inline-block',
      whiteSpace: 'nowrap'
    }}>{children}</span>
  );
}

function RSIBar({ value }) {
  if (value === '미확인') return <span style={{ color: '#6b7280', fontSize: '12px' }}>미확인</span>;
  const v = parseFloat(value);
  const color = v < 30 ? '#f87171' : v > 70 ? '#4ade80' : '#fbbf24';
  const label = v < 30 ? '과매도' : v > 70 ? '과매수' : '중립';
  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: '6px' }}>
      <span style={{ color, fontWeight: 700, fontSize: '13px' }}>{v.toFixed(1)}</span>
      <span style={{ color: '#6b7280', fontSize: '11px' }}>{label}</span>
    </div>
  );
}

function ProbBar({ scenarios }) {
  return (
    <div style={{ display: 'flex', borderRadius: '4px', overflow: 'hidden', height: '8px', width: '100%' }}>
      {scenarios.map(s => (
        <div key={s.label} style={{ width: `${s.prob}%`, background: s.color }} title={`${s.label} ${s.prob}%`} />
      ))}
    </div>
  );
}

function SectionTitle({ children }) {
  return (
    <div style={{ color: '#9ca3af', fontSize: '11px', fontWeight: 700, letterSpacing: '0.1em', textTransform: 'uppercase', marginBottom: '10px', paddingBottom: '6px', borderBottom: '1px solid #1e2535' }}>
      {children}
    </div>
  );
}

function Card({ children, style }) {
  return (
    <div style={{ background: '#1a1f2e', borderRadius: '8px', padding: '16px', ...style }}>
      {children}
    </div>
  );
}

                const rColor = typeof rsi === 'number' ? (rsi < 30 ? '#f87171' : rsi > 70 ? '#4ade80' : '#fbbf24') : '#6b7280';
                const cColor = typeof cci === 'number' ? (cci < -100 ? '#f87171' : cci > 100 ? '#4ade80' : cci < 0 ? '#fbbf24' : '#4ade80') : '#6b7280';

        </Card>

        {/* Key Levels */}
        <Card>

          <div style={{ marginBottom: '12px' }}>
            <div style={{ color: '#f87171', fontSize: '11px', fontWeight: 600, marginBottom: '6px' }}>저항 Resistance</div>

          <div>
            <div style={{ color: '#4ade80', fontSize: '11px', fontWeight: 600, marginBottom: '6px' }}>지지 Support</div>
            {pair.keyLevels.support.map(l => (

                <span style={{ color: '#4ade80' }}>${l.toLocaleString()}</span>
              </div>
            ))}
          </div>
        </Card>
      </div>

      <Card>
        <SectionTitle>Volume Profile (VRVP) 요약</SectionTitle>
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: '12px' }}>

                <div><span style={{ color: '#6b7280' }}>VAL: </span>${pair.vrvp[tf].val.toLocaleString()}</div>
                <div style={{ color: '#9ca3af', marginTop: '4px', fontSize: '11px' }}>{pair.vrvp[tf].note}</div>
              </div>
            </div>
          ))}
        </div>
      </Card>
    </div>
  );
