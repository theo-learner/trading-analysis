    // ─── UTILITY COMPONENTS ──────────────────────────────────────────────────────
    function Card({ children, style = {} }) {

    function Badge({ color = C.neutral, children }) {

        <span style={{ display: 'inline-block', background: color + '18', color: color, fontSize: '11px', fontWeight: 700, padding: '6px 10px', borderRadius: '6px', textTransform: 'uppercase', letterSpacing: '0.5px' }}>
          {children}

    function biasColor(bias) {
      if (bias === 'bull') return C.bull;
      if (bias === 'bear') return C.bear;
      return C.neutral;
    }

    // ─── STRATEGY UTILS ──────────────────────────────────────────────────────────
    function asNumber(value) {
      if (typeof value === 'number' && Number.isFinite(value)) return value;
      if (typeof value === 'string' && value.trim() !== '') {
        const parsed = Number(value);
        return Number.isFinite(parsed) ? parsed : null;
      }
      return null;
    }

    function dedupeLevels(levels) {
      return [...new Set((levels || []).map(asNumber).filter(value => value != null))].sort((a, b) => a - b);
    }

    function pickNearest(levels, predicate, sortFn) {
      const filtered = dedupeLevels(levels).filter(predicate || (() => true));
      if (filtered.length === 0) return null;
      return [...filtered].sort(sortFn || ((a, b) => a - b))[0];
    }

    function formatStrategyPrice(value) {
      const n = asNumber(value);
      return n != null ? `$${n.toLocaleString(undefined, { maximumFractionDigits: 2 })}` : '—';
    }

    function sortScenariosByProbability(pair) {
      const order = ['bull', 'bear', 'neutral'];
      return order
        .map(key => ({ key, ...(pair.scenarios?.[key] || {}) }))
        .sort((left, right) => {
          const leftProb = asNumber(left.prob) ?? -Infinity;
          const rightProb = asNumber(right.prob) ?? -Infinity;
          if (rightProb !== leftProb) return rightProb - leftProb;
          return order.indexOf(left.key) - order.indexOf(right.key);
        });
    }

    function collectStrategyLevels(pair) {
      const price = asNumber(pair.price);
      const levels4H = pair.levels?.['4H'] || {};
      const ict4H = pair.ict?.['4H'] || {};
      const ew4H = pair.ew?.['4H'] || {};
      const support = dedupeLevels(levels4H.ssl || []);
      const resistance = dedupeLevels(levels4H.bsl || []);
      const poi = asNumber(ict4H.poi_level);
      const poiAsBullCandidate = poi != null && price != null ? poi <= price * 1.01 : poi != null;
      const poiAsBearCandidate = poi != null && price != null ? poi > price : poi != null;
      const longEntries = dedupeLevels([...support, ...(poiAsBullCandidate ? [poi] : [])]);
      const shortEntries = dedupeLevels([...resistance, ...(poiAsBearCandidate ? [poi] : [])]);
      const longTargets = dedupeLevels([...resistance.filter(value => price == null || value > price), ew4H.target]);
      const shortTargets = dedupeLevels([...support.filter(value => price == null || value < price)]);
      const longStops = dedupeLevels([...support, ...(poi != null ? [poi] : [])]);
      const shortStops = dedupeLevels([...resistance, ...(poi != null ? [poi] : [])]);
      return { price, support, resistance, longEntries, shortEntries, longTargets, shortTargets, longStops, shortStops };
    }

    function buildStrategyRecommendation(pair, rankedScenario, variant) {
      const { price, support, resistance, longEntries, shortEntries, longTargets, shortTargets, longStops, shortStops } = collectStrategyLevels(pair);
      const scenarioKey = rankedScenario?.key || 'neutral';
      const prob = asNumber(rankedScenario?.prob) ?? 0;
      const confluence = Array.isArray(pair.confluence) ? pair.confluence.slice(0, 2).join(' + ') : '';
      const label = variant || 'Primary';
      const nearestSupport = pickNearest(support, value => price == null || value < price, (a, b) => Math.abs(a - price) - Math.abs(b - price));
      const nearestResistance = pickNearest(resistance, value => price == null || value > price, (a, b) => Math.abs(a - price) - Math.abs(b - price));
      const nearResistance = price != null && nearestResistance != null ? Math.abs(nearestResistance - price) / price <= 0.01 : false;
      const nearSupportBreakdown = price != null && nearestSupport != null ? Math.abs(price - nearestSupport) / price <= 0.01 : false;

      if (scenarioKey === 'neutral') {
        return { label, scenarioKey, prob, action: 'Wait', entry: null, tp: null, sl: null, rationale: `${rankedScenario?.title || 'Neutral bias'} keeps the setup in wait mode.` };
      }

      if (scenarioKey === 'bull') {
        const entry = pickNearest(longEntries, value => price == null || value <= price * 1.02, (a, b) => price == null ? a - b : Math.abs(a - price) - Math.abs(b - price));
        const tp = pickNearest(longTargets, value => price == null || value > price, (a, b) => a - b);
        const sl = entry != null ? pickNearest(longStops, value => value < entry, (a, b) => b - a) : null;
        if (entry == null || tp == null || sl == null) return { label, scenarioKey, prob, action: 'Wait', entry: null, tp: null, sl: null, rationale: 'Bullish direction exists, but structured levels are incomplete.' };
        return { label, scenarioKey, prob, action: nearResistance ? 'Breakout Long' : 'Pullback Long', entry, tp, sl, rationale: `Bull ${prob}% + ${pair.biasLabel || pair.bias || 'neutral'} bias${confluence ? ` + ${confluence}` : ''}.` };
      }

      const entry = pickNearest(shortEntries, value => price == null || value >= price * 0.98, (a, b) => price == null ? a - b : Math.abs(a - price) - Math.abs(b - price));
      const tp = pickNearest(shortTargets, value => price == null || value < price, (a, b) => b - a);
      const sl = entry != null ? pickNearest(shortStops, value => value > entry, (a, b) => a - b) : null;
      if (entry == null || tp == null || sl == null) return { label, scenarioKey: 'bear', prob, action: 'Wait', entry: null, tp: null, sl: null, rationale: 'Bearish direction exists, but structured levels are incomplete.' };
      return { label, scenarioKey: 'bear', prob, action: nearSupportBreakdown ? 'Breakdown Short' : 'Rejection Short', entry, tp, sl, rationale: `Bear ${prob}% + ${pair.biasLabel || pair.bias || 'neutral'} bias${confluence ? ` + ${confluence}` : ''}.` };
    }

    // ─── STRATEGY COMPONENTS ─────────────────────────────────────────────────────
    function StrategyKVRow({ label, value }) {
      return (
        <div style={{ display: 'flex', justifyContent: 'space-between', gap: '10px', fontSize: '11px' }}>
          <span style={{ color: C.dim }}>{label}</span>
          <span style={{ color: C.text, fontWeight: 600 }}>{value}</span>

    function strategyTone(strategy) {
      if (strategy.action.includes('Long')) return { color: C.bull, bg: '#4ade8010', border: '#4ade8030' };
      if (strategy.action.includes('Short')) return { color: C.bear, bg: '#f8717110', border: '#f8717130' };
      return { color: C.neutral, bg: '#fbbf2410', border: '#fbbf2430' };
    }

    function StrategyBlock({ title, strategy, muted }) {
      const tone = strategyTone(strategy);
      return (
        <div style={{ background: muted ? C.bg : tone.bg, border: `1px solid ${muted ? C.border : tone.border}`, borderRadius: '8px', padding: '12px' }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', gap: '8px', marginBottom: '10px' }}>
            <span style={{ color: muted ? C.sub : tone.color, fontSize: '11px', fontWeight: 700 }}>{title}</span>
            <span style={{ color: muted ? C.sub : tone.color, fontSize: '11px', fontWeight: 700 }}>{strategy.prob}%</span>
          </div>
          <StrategyKVRow label="Action" value={strategy.action} />
          <StrategyKVRow label="Entry" value={formatStrategyPrice(strategy.entry)} />
          <StrategyKVRow label="TP" value={formatStrategyPrice(strategy.tp)} />
          <StrategyKVRow label="SL" value={formatStrategyPrice(strategy.sl)} />
          <div style={{ marginTop: '10px', fontSize: '11px', color: C.sub, lineHeight: '1.5' }}>{strategy.rationale}</div>
        </div>
      );

    function OverviewStrategyCard({ pair }) {

            <StrategyBlock title="Alternate" strategy={alternate} muted />

        </Card>

                      </div>
                      <div style={{ fontSize: '11px', color: C.sub, marginBottom: '10px', lineHeight: '1.5' }}>

                  <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '12px' }}>
                    <div>
                      <div style={{ fontSize: '14px', fontWeight: 700, color: C.text }}>{p.short}</div>
                      <div style={{ fontSize: '12px', color: C.sub }}>${p.price.toLocaleString(undefined, { maximumFractionDigits: 2 })}</div>
                    </div>
                    <div style={{ textAlign: 'right' }}>
                      <div style={{ fontSize: '13px', fontWeight: 700, color: p.change24h.startsWith('+') ? C.bull : C.bear }}>{p.change24h}</div>
                    </div>
                  </div>
                  <Badge color={biasColor(p.bias)}>{p.bias.toUpperCase()}</Badge>
                  <div style={{ fontSize: '11px', color: C.sub, margin: '10px 0' }}>{p.biasLabel}</div>
                  <div style={{ fontSize: '10px', color: C.dim, lineHeight: '1.4' }}>
                    {p.confluence.slice(0, 2).map((c, i) => <div key={i}>• {c}</div>)}
                  </div>
                </Card>
              ))}
            </div>
          )}

          <OverviewStrategyGrid pairs={pairs} isMobile={isMobile} />

          <div style={{ fontSize: '12px', color: C.sub, textTransform: 'uppercase', letterSpacing: '0.5px', marginBottom: '12px' }}>Key Levels</div>
          <div style={{ display: 'grid', gridTemplateColumns: isMobile ? '1fr' : 'repeat(2, 1fr)', gap: '12px' }}>
            {pairs.map(p => (
              <Card key={p.symbol}>
                <div style={{ fontSize: '13px', fontWeight: 700, color: C.text, marginBottom: '10px' }}>{p.short} Levels (4H)</div>
                <div style={{ display: 'grid', gap: '8px', fontSize: '12px' }}>
                  <div>
                    <span style={{ color: C.sub }}>BSL:</span>
                    <span style={{ marginLeft: '8px', color: C.text, fontWeight: 600 }}>${p.levels['4H'].bsl.length > 0 ? p.levels['4H'].bsl[0].toLocaleString(undefined, { maximumFractionDigits: 2 }) : '—'}</span>
                  </div>
                  <div>
                    <span style={{ color: C.sub }}>SSL:</span>
                    <span style={{ marginLeft: '8px', color: C.text, fontWeight: 600 }}>${p.levels['4H'].ssl.length > 0 ? p.levels['4H'].ssl[0].toLocaleString(undefined, { maximumFractionDigits: 2 }) : '—'}</span>
                  </div>
                  <div>
                    <span style={{ color: C.sub }}>OB (Bull):</span>
                    <span style={{ marginLeft: '8px', color: C.text, fontWeight: 600 }}>${p.levels['4H'].ob_bull.length > 0 ? p.levels['4H'].ob_bull[0].toLocaleString(undefined, { maximumFractionDigits: 2 }) : '—'}</span>
                  </div>
                </div>
              </Card>
            ))}
          </div>
        </div>
      );
    }

    function MacroTab({ isMobile }) {
      return (
        <div>
          <div style={{ fontSize: '12px', color: C.sub, textTransform: 'uppercase', letterSpacing: '0.5px', marginBottom: '12px' }}>Market Events (KST)</div>
          <div style={{ display: 'grid', gap: '12px' }}>
            {MACRO_EVENTS.map(event => {
              const borderColor = event.importance === 'high' ? C.bear : event.importance === 'medium' ? C.neutral : '#9ca3af';
              return (
                <Card key={event.title} style={{ borderLeft: `4px solid ${borderColor}` }}>
                  <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: '8px' }}>
                    <div style={{ flex: 1 }}>
                      <div style={{ fontSize: '13px', fontWeight: 700, color: C.text, marginBottom: '4px' }}>{event.title}</div>
                      <div style={{ fontSize: '11px', color: C.dim }}>{event.time_kst.split('T')[1].substring(0, 5)}</div>
                    </div>
                    <Badge color={event.importance === 'high' ? C.bear : event.importance === 'medium' ? C.neutral : '#6b7280'}>
                      {event.importance}
                    </Badge>
                  </div>
                  <div style={{ fontSize: '12px', color: C.sub, marginBottom: '8px', lineHeight: '1.5' }}>{event.summary}</div>
                  <div style={{ fontSize: '11px', color: C.dim }}>
                    <strong>Impact:</strong> {event.impact_assets.join(', ')}
                  </div>
                </Card>
              );
            })}
          </div>
        </div>
      );
    }

    function AnalysisCard({ p, isMobile }) {
      const [selectedTF, setSelectedTF] = React.useState('4H');
      const tfs = ['1D', '4H', '1H'];
      const ewData = p.ew[selectedTF] || {};
      const ictData = p.ict[selectedTF] || {};

      return (
        <div>
          <div style={{ display: 'flex', gap: '8px', marginBottom: '12px', flexWrap: 'wrap' }}>
            {tfs.map(tf => (
              <button
                key={tf}
                onClick={() => setSelectedTF(tf)}
                style={{
                  background: selectedTF === tf ? C.primary : '#f3f4f6',
                  color: selectedTF === tf ? '#ffffff' : C.text,
                  border: 'none',
                  borderRadius: '6px',
                  padding: '8px 16px',
                  fontSize: '13px',
                  fontWeight: selectedTF === tf ? 700 : 500,
                  cursor: 'pointer',
                }}
              >
                {tf}
              </button>
            ))}
          </div>

          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)', gap: '12px' }}>
            <Card>
              <div style={{ fontSize: '13px', fontWeight: 700, color: C.text, marginBottom: '12px' }}>Elliott Wave ({selectedTF})</div>
              <div style={{ display: 'grid', gap: '10px', fontSize: '12px' }}>
                <div>
                  <span style={{ color: C.sub }}>Direction:</span>
                  <span style={{ marginLeft: '8px', color: C.text, fontWeight: 600 }}>{ewData.direction ? (ewData.direction === 'up' ? '↑ Uptrend' : '↓ Downtrend') : '—'}</span>
                </div>
                <div>
                  <span style={{ color: C.sub }}>Current Wave:</span>
                  <span style={{ marginLeft: '8px', color: C.text, fontWeight: 600 }}>{ewData.current_wave ? `Wave ${ewData.current_wave}` : '—'}</span>
                </div>
                <div>
                  <span style={{ color: C.sub }}>Target:</span>
                  <span style={{ marginLeft: '8px', color: C.text, fontWeight: 600 }}>${ewData.target ? ewData.target.toLocaleString() : '—'}</span>
                </div>
                <div>
                  <span style={{ color: C.sub }}>Completed:</span>
                  <span style={{ marginLeft: '8px', color: C.text, fontWeight: 600 }}>{ewData.completed_waves && ewData.completed_waves.length > 0 ? `[${ewData.completed_waves.join(', ')}]` : '—'}</span>
                </div>
              </div>
            </Card>

            <Card>
              <div style={{ fontSize: '13px', fontWeight: 700, color: C.text, marginBottom: '12px' }}>ICT/SMC ({selectedTF})</div>
              <div style={{ display: 'grid', gap: '10px', fontSize: '12px' }}>
                <div>
                  <span style={{ color: C.sub }}>Structure:</span>
                  <span style={{ marginLeft: '8px', color: C.text, fontWeight: 600 }}>{ictData.structure_tag || '—'}</span>
                </div>
                <div>
                  <span style={{ color: C.sub }}>Direction:</span>
                  <span style={{ marginLeft: '8px', color: C.text, fontWeight: 600 }}>{ictData.structure_direction ? (ictData.structure_direction === 'bullish' ? '↑ Bullish' : '↓ Bearish') : '—'}</span>
                </div>
                <div>
                  <span style={{ color: C.sub }}>POI Level:</span>
                  <span style={{ marginLeft: '8px', color: C.text, fontWeight: 600 }}>${ictData.poi_level ? ictData.poi_level.toLocaleString() : '—'}</span>
                </div>
                <div>
                  <span style={{ color: C.sub }}>BSL/SSL:</span>
                  <span style={{ marginLeft: '8px', color: C.text, fontWeight: 600 }}>
                    {ictData.bsl ? `$${ictData.bsl.toLocaleString()}` : '—'} / {ictData.ssl ? `$${ictData.ssl.toLocaleString()}` : '—'}
                  </span>
                </div>
              </div>
            </Card>
          </div>
        </div>
      );
    }

    function AnalysisTab({ pairs, selectedPair, onSelectPair, isMobile }) {
      const pair = pairs.find(item => item.symbol === selectedPair) || pairs[0];

      return (
        <div>
          <div style={{ display: 'flex', gap: '8px', marginBottom: '16px', flexWrap: 'wrap' }}>
            {pairs.map(item => (
              <button
                key={item.symbol}
                onClick={() => onSelectPair(item.symbol)}
                style={{
                  background: selectedPair === item.symbol ? '#f59e0b22' : '#f3f4f6',
                  color: selectedPair === item.symbol ? '#f59e0b' : C.text,
                  border: 'none',
                  borderRadius: '6px',
                  padding: isMobile ? '8px 14px' : '6px 16px',
                  fontSize: '12px',
                  fontWeight: selectedPair === item.symbol ? 700 : 400,
                  cursor: 'pointer',
                }}
              >
                {item.short}
              </button>
            ))}
          </div>
          <AnalysisCard p={pair} isMobile={isMobile} />
        </div>
      );
    }

    function OrderflowTab({ isMobile }) {
      return (
        <div>
          <div style={{ fontSize: '12px', color: C.sub, textTransform: 'uppercase', letterSpacing: '0.5px', marginBottom: '12px' }}>Open Interest & CVD</div>
          <div style={{ overflowX: 'auto' }}>
            <table style={{ width: '100%', minWidth: isMobile ? '480px' : 'auto', borderCollapse: 'collapse', fontSize: '12px' }}>
              <thead>
                <tr style={{ borderBottom: `1px solid ${C.border}` }}>
                  <th style={{ padding: '10px 8px', textAlign: 'left', color: C.sub, fontWeight: 600 }}>Pair</th>
                  <th style={{ padding: '10px 8px', textAlign: 'right', color: C.sub, fontWeight: 600 }}>OI</th>
                  <th style={{ padding: '10px 8px', textAlign: 'right', color: C.sub, fontWeight: 600 }}>24h Change</th>
                  <th style={{ padding: '10px 8px', textAlign: 'right', color: C.sub, fontWeight: 600 }}>Funding %</th>
                  <th style={{ padding: '10px 8px', textAlign: 'center', color: C.sub, fontWeight: 600 }}>CVD</th>
                </tr>
              </thead>
              <tbody>
                {Object.entries(ORDERFLOW_DATA).map(([symbol, data]) => (
                  <tr key={symbol} style={{ borderBottom: `1px solid ${C.border}` }}>
                    <td style={{ padding: '10px 8px', color: C.text, fontWeight: 600 }}>{symbol}</td>
                    <td style={{ padding: '10px 8px', textAlign: 'right', color: C.text }}>{data.oi_usd_str}</td>
                    <td style={{ padding: '10px 8px', textAlign: 'right', color: data.oi_change_24h.startsWith('+') ? C.bull : C.bear, fontWeight: 600 }}>{data.oi_change_24h}</td>
                    <td style={{ padding: '10px 8px', textAlign: 'right', color: data.funding_rate.startsWith('+') ? C.bear : C.bull, fontWeight: 600 }}>{data.funding_rate}</td>
                    <td style={{ padding: '10px 8px', textAlign: 'center' }}>
                      <Badge color={data.cvd_direction === 'positive' ? C.cvdPos : C.cvdNeg}>
                        {data.cvd_direction}/{data.cvd_trend}
                      </Badge>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      );
    }

    function ScenariosTab({ pairs, selectedPair, onSelectPair, isMobile }) {
      const pair = pairs.find(item => item.symbol === selectedPair) || pairs[0];

      return (
        <div>
          <div style={{ display: 'flex', gap: '8px', marginBottom: '16px', flexWrap: 'wrap' }}>
            {pairs.map(item => (
              <button
                key={item.symbol}
                onClick={() => onSelectPair(item.symbol)}
                style={{
                  background: selectedPair === item.symbol ? '#f59e0b22' : '#f3f4f6',
                  color: selectedPair === item.symbol ? '#f59e0b' : C.text,
                  border: 'none',
                  borderRadius: '6px',
                  padding: isMobile ? '8px 14px' : '6px 16px',
                  fontSize: '12px',
                  fontWeight: selectedPair === item.symbol ? 700 : 400,
                  cursor: 'pointer',
                }}
              >
                {item.short}
              </button>
            ))}
          </div>

          <div style={{ display: 'grid', gridTemplateColumns: isMobile ? '1fr' : 'repeat(3, 1fr)', gap: '12px' }}>
            {Object.entries(pair.scenarios || {}).map(([key, scenario]) => {
              const color = key === 'bull' ? C.bull : key === 'bear' ? C.bear : C.neutral;
              return (
                <Card key={key} style={{ borderTop: `3px solid ${color}` }}>
                  <div style={{ fontSize: '13px', fontWeight: 700, color: C.text, marginBottom: '8px' }}>{scenario.title}</div>
                  <div style={{ fontSize: '11px', color: C.sub, marginBottom: '10px', lineHeight: '1.5' }}>{scenario.desc}</div>
                  <div style={{ display: 'flex', alignItems: 'center', gap: '8px' }}>
                    <div style={{ flex: 1, height: '6px', background: C.border, borderRadius: '3px', overflow: 'hidden' }}>
                      <div style={{ height: '100%', background: color, width: `${scenario.prob}%` }} />
                    </div>
                    <span style={{ fontSize: '12px', fontWeight: 700, color, minWidth: '40px' }}>{scenario.prob}%</span>
                  </div>
                </Card>
              );
            })}
          </div>
        </div>
      );
    }

    function RiskTab({ pairs, selectedPair, onSelectPair, isMobile }) {
      const pair = pairs.find(item => item.symbol === selectedPair) || pairs[0];

      return (
        <div>
          <div style={{ display: 'flex', gap: '8px', marginBottom: '16px', flexWrap: 'wrap' }}>
            {pairs.map(item => (
              <button
                key={item.symbol}
                onClick={() => onSelectPair(item.symbol)}
                style={{
                  background: selectedPair === item.symbol ? '#f59e0b22' : '#f3f4f6',
                  color: selectedPair === item.symbol ? '#f59e0b' : C.text,
                  border: 'none',
                  borderRadius: '6px',
                  padding: isMobile ? '8px 14px' : '6px 16px',
                  fontSize: '12px',
                  fontWeight: selectedPair === item.symbol ? 700 : 400,
                  cursor: 'pointer',
                }}
              >
                {item.short}
              </button>
            ))}
          </div>

          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)', gap: '12px' }}>
            {Object.entries(pair.scenarios || {}).map(([key, scenario]) => {
              const ranked = sortScenariosByProbability(pair);
              const best = ranked[0];
              if (best.key !== key) return null;

              const strat = buildStrategyRecommendation(pair, best);
              const color = key === 'bull' ? C.bull : key === 'bear' ? C.bear : C.neutral;

              return (
                <Card key={key} style={{ borderTop: `4px solid ${color}` }}>
                  <div style={{ fontSize: '13px', fontWeight: 700, color: C.text, marginBottom: '10px' }}>
                    {key === 'bull' ? '↑ Long Setup' : key === 'bear' ? '↓ Short Setup' : '➡ Wait'}
                  </div>
                  <div style={{ display: 'grid', gap: '8px', fontSize: '12px' }}>
                    <div>
                      <span style={{ color: C.sub }}>Entry:</span>
                      <span style={{ marginLeft: '8px', color: C.text, fontWeight: 600 }}>{formatStrategyPrice(strat.entry)}</span>
                    </div>
                    <div>
                      <span style={{ color: C.sub }}>Take Profit:</span>
                      <span style={{ marginLeft: '8px', color: C.text, fontWeight: 600 }}>{formatStrategyPrice(strat.tp)}</span>
                    </div>
                    <div>
                      <span style={{ color: C.sub }}>Stop Loss:</span>
                      <span style={{ marginLeft: '8px', color: C.text, fontWeight: 600 }}>{formatStrategyPrice(strat.sl)}</span>
                    </div>
                    {strat.entry && strat.tp && strat.sl && (
                      <div>
                        <span style={{ color: C.sub }}>Risk/Reward:</span>
                        <span style={{ marginLeft: '8px', color: C.text, fontWeight: 600 }}>
                          {(Math.abs(strat.tp - strat.entry) / Math.abs(strat.entry - strat.sl)).toFixed(2)}:1
                        </span>
                      </div>
                    )}
                  </div>
                  <div style={{ marginTop: '12px', padding: '10px', background: color + '10', borderLeft: `3px solid ${color}`, borderRadius: '4px', fontSize: '11px', color: C.text, lineHeight: '1.5' }}>
                    {strat.rationale}
                  </div>
                </Card>
              );
            })}
          </div>
        </div>
      );
    }

    // ─── DASHBOARD ────────────────────────────────────────────────────────────────
    function Dashboard() {
      const isMobile = useIsMobile();
      const [activeTab, setActiveTab] = React.useState('overview');
      const [selectedPair, setSelectedPair] = React.useState('BTCUSDT');
      const tabBarRef = React.useRef(null);

      React.useEffect(() => {
        if (!isMobile || !tabBarRef.current) return;
        const activeBtn = tabBarRef.current.querySelector('[data-active="true"]');
        if (activeBtn) activeBtn.scrollIntoView({ inline: 'center', behavior: 'smooth' });
      }, [activeTab, isMobile]);

      const tabs = [
        { id: 'overview', label: 'Overview' },
        { id: 'macro', label: 'Macro' },
        { id: 'analysis', label: 'Analysis' },
        { id: 'orderflow', label: 'Orderflow' },
        { id: 'scenarios', label: 'Scenarios' },
        { id: 'risk', label: 'Risk' },
      ];

      let tabContent;
      switch (activeTab) {
        case 'overview':
          tabContent = <OverviewTab pairs={pairs} selectedPair={selectedPair} onSelectPair={setSelectedPair} isMobile={isMobile} />;
          break;
        case 'macro':
          tabContent = <MacroTab isMobile={isMobile} />;
          break;
        case 'analysis':
          tabContent = <AnalysisTab pairs={pairs} selectedPair={selectedPair} onSelectPair={setSelectedPair} isMobile={isMobile} />;
          break;
        case 'orderflow':
          tabContent = <OrderflowTab isMobile={isMobile} />;
          break;
        case 'scenarios':
          tabContent = <ScenariosTab pairs={pairs} selectedPair={selectedPair} onSelectPair={setSelectedPair} isMobile={isMobile} />;
          break;
        case 'risk':
          tabContent = <RiskTab pairs={pairs} selectedPair={selectedPair} onSelectPair={setSelectedPair} isMobile={isMobile} />;
          break;
        default:
          tabContent = null;
      }

      return (
        <div style={{ display: 'flex', flexDirection: 'column', height: '100vh', background: C.bg }}>
          {/* Header */}
          <div style={{ background: C.surface, borderBottom: `1px solid ${C.border}`, padding: isMobile ? '12px' : '14px 24px' }}>
            {isMobile ? (
              <div style={{ display: 'flex', flexDirection: 'column', gap: '10px' }}>
                <div>
                  <div style={{ fontSize: '16px', fontWeight: 700, color: C.text, marginBottom: '2px' }}>Crypto Futures Analysis</div>
                  <div style={{ fontSize: '11px', color: C.sub }}>2026-04-18 · EW + ICT/SMC + Orderflow</div>
                </div>
                <div style={{ display: 'flex', gap: '6px', flexWrap: 'wrap' }}>
                  <Badge color={C.bull}>BTC +2.72%</Badge>
                  <Badge color={C.bull}>ETH +3.06%</Badge>
                  <Badge color={C.bear}>SOL -0.24%</Badge>
                  <Badge color={C.bull}>HYPE +1.61%</Badge>
                </div>
              </div>
            ) : (
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                <div>
                  <div style={{ fontSize: '18px', fontWeight: 700, color: C.text, marginBottom: '2px' }}>Crypto Futures Analysis</div>
                  <div style={{ fontSize: '12px', color: C.sub }}>2026-04-18 · Elliott Wave + ICT/SMC + Orderflow Integration</div>
                </div>
                <div style={{ display: 'flex', gap: '8px' }}>
                  <Badge color={C.bull}>BTC +2.72%</Badge>
                  <Badge color={C.bull}>ETH +3.06%</Badge>
                  <Badge color={C.bear}>SOL -0.24%</Badge>
                  <Badge color={C.bull}>HYPE +1.61%</Badge>
                </div>
              </div>
            )}
          </div>

          {/* Tabs */}
          <div ref={tabBarRef} style={{ display: 'flex', overflowX: 'auto', gap: '0px', borderBottom: `1px solid ${C.border}`, background: C.surface, WebkitOverflowScrolling: 'touch' }}>
            {tabs.map(tab => (
              <button
                key={tab.id}
                data-active={activeTab === tab.id ? 'true' : 'false'}
                onClick={() => setActiveTab(tab.id)}
                style={{
                  flex: 'none',
                  padding: isMobile ? '14px 14px' : '12px 16px',
                  fontSize: '13px',
                  fontWeight: activeTab === tab.id ? 700 : 500,
                  color: activeTab === tab.id ? C.primary : C.sub,
                  background: 'transparent',
                  border: 'none',
                  borderBottom: activeTab === tab.id ? `2px solid ${C.primary}` : '2px solid transparent',
                  cursor: 'pointer',
                  whiteSpace: 'nowrap',
                }}
              >
                {tab.label}
              </button>
            ))}
          </div>

          {/* Content */}
          <div style={{ flex: 1, overflowY: 'auto', padding: isMobile ? '14px 12px' : '20px 24px' }}>
            {tabContent}
          </div>

          {/* Footer */}
          <div style={{ background: C.surface, borderTop: `1px solid ${C.border}`, padding: isMobile ? '12px' : '14px 24px', display: 'flex', flexDirection: isMobile ? 'column' : 'row', justifyContent: 'space-between', gap: isMobile ? '6px' : '0', alignItems: isMobile ? 'flex-start' : 'center', fontSize: '11px', color: '#6b7280' }}>
            <span>Data: Binance, Coinalyze, Coinglass (2026-04-18 00:04 UTC)</span>
            <span>Educational & Research Purpose Only — Not Financial Advice</span>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<Dashboard />);
  </script>
</body>
</html>
