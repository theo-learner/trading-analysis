          bear: { title: '저항 거절 후 되돌림', prob: 30, trigger: '44.84-45.5 거절 → 43-42.81 OB/FVG 되돌림', invalidation: '45.75 이상 안착' },
          neutral: { title: '43~46 레인지 횡보', prob: 20, trigger: '명확한 방향성 부재', invalidation: '레인지 돌파' },
        },

    // ─── CONSTANTS ────────────────────────────────────────────────────────────────
    const C = {

    function PairSelector({ pairs, selected, onSelect }) {

    // ─── STRATEGY UTILS ───────────────────────────────────────────────────────────

    function asNumber(value) {
      if (typeof value === 'number' && Number.isFinite(value)) return value;
      if (typeof value === 'string' && value.trim() !== '') {
        const parsed = Number(value);
        return Number.isFinite(parsed) ? parsed : null;
      }
      return null;
    }

    function dedupeLevels(levels) {
      return [...new Set((levels || []).map(asNumber).filter(v => v != null))].sort((a, b) => a - b);
    }

    function pickNearest(levels, predicate, sortFn) {
      const filtered = dedupeLevels(levels).filter(predicate || (() => true));
      if (filtered.length === 0) return null;
      return [...filtered].sort(sortFn || ((a, b) => a - b))[0];
    }

    function formatStrategyPrice(value) {
      const n = asNumber(value);
      return n != null ? '$' + n.toLocaleString(undefined, { maximumFractionDigits: 2 }) : '—';
    }

    function sortScenariosByProbability(pair) {
      const order = ['bull', 'bear', 'neutral'];
      return order
        .map(key => ({ key, ...(pair.scenarios?.[key] || {}) }))
        .sort((left, right) => {
          const lp = asNumber(left.prob) ?? -Infinity;
          const rp = asNumber(right.prob) ?? -Infinity;
          if (rp !== lp) return rp - lp;
          return order.indexOf(left.key) - order.indexOf(right.key);
        });
    }

    function collectStrategyLevels(pair) {
      const price = asNumber(pair.price);
      const levels4H = pair.levels?.['4H'] || {};
      const ict4H = pair.ict?.['4H'] || {};
      const ew4H = pair.ew?.['4H'] || {};
      const support = dedupeLevels(levels4H.ssl || []);
      const resistance = dedupeLevels(levels4H.bsl || []);
      const poi = asNumber(ict4H.poi_level);
      const poiAsBull = poi != null && price != null ? poi <= price * 1.01 : poi != null;
      const poiAsBear = poi != null && price != null ? poi > price : poi != null;
      const longEntries = dedupeLevels([...support, ...(poiAsBull ? [poi] : [])]);
      const shortEntries = dedupeLevels([...resistance, ...(poiAsBear ? [poi] : [])]);
      const longTargets = dedupeLevels([...resistance.filter(v => price == null || v > price), ew4H.target]);
      const shortTargets = dedupeLevels([...support.filter(v => price == null || v < price)]);
      const longStops = dedupeLevels([...support, ...(poi != null ? [poi] : [])]);
      const shortStops = dedupeLevels([...resistance, ...(poi != null ? [poi] : [])]);
      return { price, support, resistance, longEntries, shortEntries, longTargets, shortTargets, longStops, shortStops };
    }

    function buildStrategyRecommendation(pair, rankedScenario, variant) {
      const { price, support, resistance, longEntries, shortEntries, longTargets, shortTargets, longStops, shortStops } = collectStrategyLevels(pair);
      const scenarioKey = rankedScenario?.key || 'neutral';
      const prob = asNumber(rankedScenario?.prob) ?? 0;
      const label = variant || 'Primary';
      const nearestResistance = pickNearest(resistance, v => price == null || v > price, (a, b) => Math.abs(a - price) - Math.abs(b - price));
      const nearestSupport = pickNearest(support, v => price == null || v < price, (a, b) => Math.abs(a - price) - Math.abs(b - price));
      const nearResistance = price != null && nearestResistance != null ? Math.abs(nearestResistance - price) / price <= 0.01 : false;
      const nearSupport = price != null && nearestSupport != null ? Math.abs(price - nearestSupport) / price <= 0.01 : false;

      if (scenarioKey === 'neutral') {
        return { label, scenarioKey, prob, action: 'Wait', entry: null, tp: null, sl: null, rationale: (rankedScenario?.title || 'Neutral') + ' — 방향 확인 대기.' };
      }

      if (scenarioKey === 'bull') {
        const entry = pickNearest(longEntries, v => price == null || v <= price * 1.02, (a, b) => price == null ? a - b : Math.abs(a - price) - Math.abs(b - price));
        const tp = pickNearest(longTargets, v => price == null || v > price, (a, b) => a - b);
        const sl = entry != null ? pickNearest(longStops, v => v < entry, (a, b) => b - a) : null;
        if (entry == null || tp == null || sl == null) return { label, scenarioKey, prob, action: 'Wait', entry: null, tp: null, sl: null, rationale: '강세 방향 존재하나 레벨 불완전.' };
        return { label, scenarioKey, prob, action: nearResistance ? 'Breakout Long' : 'Pullback Long', entry, tp, sl, rationale: 'Bull ' + prob + '% + ' + (pair.biasLabel || 'neutral') + ' bias.' };
      }

      const entry = pickNearest(shortEntries, v => price == null || v >= price * 0.98, (a, b) => price == null ? a - b : Math.abs(a - price) - Math.abs(b - price));
      const tp = pickNearest(shortTargets, v => price == null || v < price, (a, b) => b - a);
      const sl = entry != null ? pickNearest(shortStops, v => v > entry, (a, b) => a - b) : null;
      if (entry == null || tp == null || sl == null) return { label, scenarioKey: 'bear', prob, action: 'Wait', entry: null, tp: null, sl: null, rationale: '약세 방향 존재하나 레벨 불완전.' };
      return { label, scenarioKey: 'bear', prob, action: nearSupport ? 'Breakdown Short' : 'Rejection Short', entry, tp, sl, rationale: 'Bear ' + prob + '% + ' + (pair.biasLabel || 'neutral') + ' bias.' };
    }

    // ─── STRATEGY COMPONENTS ──────────────────────────────────────────────────────

    function StrategyKVRow({ label, value }) {

    function strategyTone(strategy) {

      if (strategy.action.includes('Short')) return { color: C.bear, bg: '#f8717110', border: '#f8717130' };

      const marketSummary = (

          <div style={{ display: 'grid', gridTemplateColumns: isMobile ? '1fr' : 'repeat(2, 1fr)', gap: '10px' }}>
            <Card>
              <div style={{ fontSize: '12px', fontWeight: 700, color: C.bull, marginBottom: '6px' }}>BTC / ETH — 단기 반등 구간</div>
              <div style={{ fontSize: '12px', color: C.sub, lineHeight: '1.7' }}>
                OI 급증(BTC +8.58% / ETH +10.23%) + CVD 양수/상승 → 숏 청산 주도 강한 반등. 1D RSI 극과매도(BTC 28.53)에서 회복 중. 이란 해협 재개방 지정학 완화가 촉매. 단기 Bear OB(BTC 77,389 / ETH 2,431)이 다음 분기점.
              </div>
            </Card>
            <Card>
              <div style={{ fontSize: '12px', fontWeight: 700, color: C.neutral, marginBottom: '6px' }}>SOL — Bear OB 정면 충돌 / HYPE — 상대 강세</div>
              <div style={{ fontSize: '12px', color: C.sub, lineHeight: '1.7' }}>
                SOL OI -8.42% + CVD 음수 → 실질 매도압력. 4H Bear OB 클러스터(88.80-89.04) 정확히 도달. HYPE는 전 TF EMA 불리쉬 정렬로 4종목 중 구조적 강도 최고, 45.5 Bear OB 돌파 여부가 핵심.

    function MacroTab({ events, isMobile }) {
      const sorted = [...events].sort((a, b) => new Date(a.time_utc) - new Date(b.time_utc));
      const borderColor = imp => imp === 'high' ? C.bear : imp === 'medium' ? C.neutral : C.sub;
      if (!sorted.length) return <div style={{ color: C.sub, textAlign: 'center', padding: '40px' }}>No macro events in 36h window</div>;
      return (
        <div style={{ display: 'flex', flexDirection: 'column', gap: '10px' }}>

            return (

    function LevelPills({ values, color }) {
      if (!values || !values.length) return <span style={{ fontSize: '10px', color: C.dim }}>—</span>;

        <div style={{ display: 'flex', flexWrap: 'wrap', gap: '4px' }}>
          {values.map(v => (
            <span key={v} style={{ fontSize: '10px', background: color + '15', color, padding: '2px 6px', borderRadius: '3px' }}>
              {v.toLocaleString()}
            </span>
          ))}
        </div>
      );
    }

    function normalizeAnalysisDirection(direction) {
      const value = String(direction || '').toLowerCase();
      if (value === 'long' || value.includes('bull') || value.includes('recover')) return 'long';
      if (value === 'short' || value.includes('bear')) return 'short';
      return 'neutral';
    }

    function normalizeWave(value) {
      if (value == null) return null;
      const raw = String(value).trim();
      if (/^W[1-5]$/i.test(raw)) return raw.toUpperCase();
      if (/^[1-5]$/.test(raw)) return `W${raw}`;
      if (raw === 'B_or_1') return 'W1';
      if (raw === 'C_or_3') return 'W3';
      return raw;
    }

    function normalizeCompletedWaves(value) {
      if (Array.isArray(value)) {
        return value.map(normalizeWave).filter(wave => /^W[1-5]$/.test(wave || ''));
      }
      if (typeof value !== 'string') return [];
      const matches = value.match(/\bW?[1-5]\b/g) || [];
      return [...new Set(matches.map(item => normalizeWave(item)).filter(wave => /^W[1-5]$/.test(wave || '')))];
    }

    function normalizeStructureTag(tag) {
      const value = String(tag || '').toUpperCase();
      if (value.includes('BOS')) return 'BOS';
      if (value.includes('MSS')) return 'MSS';
      if (value.includes('CHOCH')) return 'CHoCH';
      return null;
    }

    function normalizeStructureDirection(direction) {
      const value = String(direction || '').toLowerCase();
      if (value.includes('bull')) return 'bullish';
      if (value.includes('bear')) return 'bearish';
      return 'neutral';
    }

    function tfDirStyle(direction) {
      const normalized = normalizeAnalysisDirection(direction);
      if (normalized === 'long') return { bg: '#4ade8015', border: '#4ade8040', color: '#4ade80', label: '▲ 상승' };
      if (normalized === 'short') return { bg: '#f8717115', border: '#f8717140', color: '#f87171', label: '▼ 하락' };
      return { bg: '#fbbf2415', border: '#fbbf2440', color: '#fbbf24', label: '↔ 중립' };
    }

    function structureLabel(tag, direction) {
      const normalizedTag = normalizeStructureTag(tag);
      if (!normalizedTag) return null;
      const normalizedDirection = normalizeStructureDirection(direction);
      const arrow = normalizedDirection === 'bullish' ? '▲' : normalizedDirection === 'bearish' ? '▼' : '↔';
      return `ICT ${arrow}${normalizedTag}`;
    }

    function fmtAnalysisPrice(value) {
      return value != null ? '$' + Number(value).toLocaleString() : '—';
    }

    function TFAlignmentBar({ pair, tfs }) {
      return (
        <div style={{ display: 'flex', gap: '8px', marginBottom: '14px' }}>
          {tfs.map(tf => {
            const ew = pair.ew?.[tf] || {};
            const ict = pair.ict?.[tf] || {};
            const directionStyle = tfDirStyle(ew.direction);
            const ictLabel = structureLabel(ict.structure_tag, ict.structure_direction);
            return (
              <div key={tf} style={{ flex: 1, background: directionStyle.bg, border: `1px solid ${directionStyle.border}`, borderRadius: '7px', padding: '10px', minWidth: 0 }}>
                <div style={{ color: C.sub, fontSize: '10px', marginBottom: '4px' }}>{tf}</div>
                <div style={{ color: directionStyle.color, fontWeight: 700, fontSize: '13px' }}>{directionStyle.label}</div>
                <div style={{ display: 'flex', flexDirection: 'column', gap: '2px', marginTop: '5px' }}>
                  <span style={{ color: C.heatHigh, fontSize: '10px', whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>
                    EW {normalizeWave(ew.current_wave) || '—'}
                  </span>
                  {ictLabel && (
                    <span style={{ color: C.cvdPos, fontSize: '10px', whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>
                      {ictLabel}
                    </span>
                  )}
                </div>
              </div>
            );
          })}
        </div>
      );
    }

    const ALL_WAVES = ['W1', 'W2', 'W3', 'W4', 'W5'];

    function EWWaveStep({ ew }) {
      const completed = normalizeCompletedWaves(ew?.completed_waves);
      const current = normalizeWave(ew?.current_wave);

      return (
        <div style={{ background: C.elevated, borderRadius: '10px', padding: '12px', border: '1px solid ' + C.border }}>
          <div style={{ color: C.heatHigh, fontSize: '10px', fontWeight: 700, textTransform: 'uppercase', letterSpacing: '0.8px', marginBottom: '8px' }}>EW 파동 위치</div>
          <div style={{ display: 'flex', alignItems: 'center', marginBottom: '10px', overflowX: 'auto', paddingBottom: '2px' }}>
            {ALL_WAVES.map((wave, index) => {
              const isDone = completed.includes(wave);
              const isCurrent = current === wave;
              const boxStyle = isDone
                ? { background: '#4ade8033', border: `2px solid ${C.bull}`, color: C.bull }
                : isCurrent
                  ? { background: '#f59e0b22', border: `2px solid ${C.heatHigh}`, color: C.heatHigh }
                  : { background: C.card, border: `1px solid ${C.border}`, color: '#4b5563' };
              const lineColor = isDone ? C.bull : isCurrent ? C.heatHigh : C.border;
              return (
                <React.Fragment key={wave}>
                  <div style={{ ...boxStyle, borderRadius: '4px', padding: '4px 7px', fontSize: '10px', fontWeight: 700, flexShrink: 0, whiteSpace: 'nowrap' }}>
                    {wave}{isDone ? '✓' : isCurrent ? '◀' : ''}
                  </div>
                  {index < ALL_WAVES.length - 1 && <div style={{ height: '2px', width: '10px', background: lineColor, flexShrink: 0 }} />}
                </React.Fragment>
              );
            })}
          </div>
          <div style={{ display: 'grid', gridTemplateColumns: ew?.target != null ? '1fr 1fr' : '1fr', gap: '5px' }}>
            {ew?.target != null && (
              <div style={{ background: C.panel, borderRadius: '6px', padding: '7px', border: '1px solid ' + C.border }}>
                <div style={{ color: C.sub, fontSize: '9px' }}>타겟</div>
                <div style={{ color: C.cvdPos, fontWeight: 700, fontSize: '11px' }}>{fmtAnalysisPrice(ew.target)}</div>
              </div>
            )}
            {ew?.confirmation && (
              <div style={{ background: C.panel, borderRadius: '6px', padding: '7px', border: '1px solid ' + C.border }}>
                <div style={{ color: C.sub, fontSize: '9px' }}>확인 ✓</div>
                <div style={{ color: C.bull, fontWeight: 700, fontSize: '10px', lineHeight: '1.3' }}>{ew.confirmation}</div>
              </div>
            )}
            {ew?.invalidation && (
              <div style={{ background: C.panel, borderRadius: '6px', padding: '7px', border: '1px solid ' + C.border, gridColumn: ew?.target != null ? '1 / -1' : 'auto' }}>
                <div style={{ color: C.sub, fontSize: '9px' }}>무효화 ✗</div>
                <div style={{ color: C.bear, fontWeight: 700, fontSize: '10px', lineHeight: '1.3' }}>{ew.invalidation}</div>
              </div>
            )}
          </div>
        </div>
      );
    }

    function ICTGrid({ ict }) {
      const normalizedDirection = normalizeStructureDirection(ict?.structure_direction);
      const normalizedTag = normalizeStructureTag(ict?.structure_tag);
      const structureArrow = normalizedDirection === 'bullish' ? '▲' : normalizedDirection === 'bearish' ? '▼' : '↔';

      return (
        <div style={{ background: C.elevated, borderRadius: '10px', padding: '12px', border: '1px solid ' + C.border }}>
          <div style={{ color: C.cvdPos, fontSize: '10px', fontWeight: 700, textTransform: 'uppercase', letterSpacing: '0.8px', marginBottom: '8px' }}>ICT</div>
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '5px', marginBottom: ict?.smt ? '6px' : 0 }}>
            <div style={{ background: '#4ade8010', border: '1px solid #4ade8025', borderRadius: '5px', padding: '7px' }}>
              <div style={{ color: C.bull, fontSize: '9px', fontWeight: 700, marginBottom: '2px' }}>구조</div>
              <div style={{ color: C.text, fontWeight: 600, fontSize: '11px' }}>{normalizedTag ? `${structureArrow} ${normalizedTag}` : '—'}</div>
            </div>
            <div style={{ background: '#f59e0b10', border: '1px solid #f59e0b25', borderRadius: '5px', padding: '7px' }}>
              <div style={{ color: C.heatHigh, fontSize: '9px', fontWeight: 700, marginBottom: '2px' }}>POI</div>
              <div style={{ color: C.text, fontWeight: 600, fontSize: '11px' }}>{fmtAnalysisPrice(ict?.poi_level)}</div>
            </div>
            <div style={{ background: '#22d3ee10', border: '1px solid #22d3ee25', borderRadius: '5px', padding: '7px' }}>
              <div style={{ color: C.cvdPos, fontSize: '9px', fontWeight: 700, marginBottom: '2px' }}>유동성</div>
              <div style={{ color: C.text, fontWeight: 600, fontSize: '11px' }}>BSL {fmtAnalysisPrice(ict?.bsl)}</div>
              <div style={{ color: C.sub, fontSize: '9px' }}>SSL {fmtAnalysisPrice(ict?.ssl)}</div>
            </div>
            <div style={{ background: '#a78bfa10', border: '1px solid #a78bfa25', borderRadius: '5px', padding: '7px' }}>
              <div style={{ color: C.convergence, fontSize: '9px', fontWeight: 700, marginBottom: '2px' }}>구조 방향</div>
              <div style={{ color: C.sub, fontSize: '10px', lineHeight: '1.4' }}>{normalizedDirection}</div>
            </div>
          </div>
          {ict?.smt && (
            <div style={{ background: '#fb923c10', border: '1px solid #fb923c25', borderRadius: '5px', padding: '6px', display: 'flex', gap: '6px', alignItems: 'center' }}>
              <span style={{ color: C.cvdNeg, fontSize: '9px', fontWeight: 700 }}>SMT</span>
              <span style={{ color: C.sub, fontSize: '10px', lineHeight: '1.4' }}>{ict.smt}</span>
            </div>
          )}
        </div>
      );
    }

    function AnalysisCard({ pair, isMobile }) {
      const tfs = ['1D', '4H', '1H'];
      const [selectedTF, setSelectedTF] = React.useState('4H');
      const [textOpen, setTextOpen] = React.useState(false);
      const bias = pair.bias === 'bull' ? 'long' : pair.bias === 'bear' ? 'short' : 'neutral';
      const biasStyle = bias === 'long'
        ? { bg: '#4ade8022', color: C.bull, label: '▲ LONG' }
        : bias === 'short'
          ? { bg: '#f8717122', color: C.bear, label: '▼ SHORT' }
          : { bg: '#fbbf2422', color: C.neutral, label: '↔ NEUTRAL' };
      const ew = pair.ew?.[selectedTF] || {};
      const ict = pair.ict?.[selectedTF] || {};

      return (
        <div style={{ background: `linear-gradient(180deg, ${C.panel} 0%, ${C.card} 100%)`, borderRadius: '14px', padding: isMobile ? '14px' : '18px', border: '1px solid ' + C.borderStrong, boxShadow: 'inset 0 1px 0 rgba(255,255,255,0.04)' }}>
          <div style={{ display: 'flex', alignItems: isMobile ? 'flex-start' : 'center', flexDirection: isMobile ? 'column' : 'row', justifyContent: 'space-between', gap: '10px', marginBottom: '16px', paddingBottom: '14px', borderBottom: `1px solid ${C.card}` }}>
            <div>
              <span style={{ color: C.text, fontWeight: 700, fontSize: '15px' }}>{pair.symbol}</span>
              <span style={{ color: C.dim, fontSize: '12px', marginLeft: '8px' }}>EW + ICT</span>
            </div>
            <span style={{ background: biasStyle.bg, color: biasStyle.color, padding: '4px 14px', borderRadius: '20px', fontSize: '12px', fontWeight: 700 }}>
              {biasStyle.label}
            </span>
          </div>

          <div style={{ marginBottom: '14px' }}>
            <div style={{ color: C.sub, fontSize: '10px', textTransform: 'uppercase', letterSpacing: '0.5px', marginBottom: '8px' }}>타임프레임 정렬</div>
            <TFAlignmentBar pair={pair} tfs={tfs} />
          </div>

          <div style={{ marginBottom: '14px' }}>
            <div style={{ display: 'flex', gap: '6px', marginBottom: '10px', flexWrap: 'wrap' }}>
              {tfs.map(tf => <TFPill key={tf} active={selectedTF === tf} onClick={() => setSelectedTF(tf)}>{tf}</TFPill>)}
            </div>
            <div style={{ display: 'grid', gridTemplateColumns: isMobile ? '1fr' : '1fr 1fr', gap: '10px' }}>
              <EWWaveStep ew={ew} />
              <ICTGrid ict={ict} />
            </div>
          </div>

          {pair.confluence && pair.confluence.length > 0 && (
            <div style={{ background: C.elevated, borderRadius: '10px', padding: '12px', border: '1px solid ' + C.border, marginBottom: '12px' }}>
              <div style={{ color: C.sub, fontSize: '10px', textTransform: 'uppercase', letterSpacing: '0.5px', marginBottom: '8px' }}>컨플루언스 요약</div>
              <div style={{ display: 'flex', gap: '8px', flexWrap: 'wrap' }}>
                {pair.confluence.map((item, index) => (
                  <span key={index} style={{ background: '#4ade8022', color: C.bull, padding: '3px 10px', borderRadius: '4px', fontSize: '11px' }}>{item}</span>
                ))}
              </div>
            </div>
          )}

          <div>
            <div onClick={() => setTextOpen(open => !open)} style={{ color: C.dim, fontSize: '11px', textAlign: 'right', cursor: 'pointer', marginBottom: textOpen ? '10px' : 0 }}>
              {textOpen ? '▾ 전체 분석 텍스트 닫기' : '▸ 전체 분석 텍스트 보기'}
            </div>
            {textOpen && (
              <div style={{ fontSize: '11px', color: C.sub, lineHeight: '1.6' }}>
                {tfs.map((tf, index) => {
                  const ewTF = pair.ew?.[tf] || {};
                  const ictTF = pair.ict?.[tf] || {};
                  return (
                    <div key={tf} style={{ marginBottom: index < tfs.length - 1 ? '14px' : 0 }}>
                      <div style={{ color: C.heatHigh, fontWeight: 700, marginBottom: '4px' }}>{tf} — EW</div>
                      <div style={{ marginBottom: '4px', color: C.text }}>{ewTF.count || normalizeWave(ewTF.current_wave) || '—'}</div>
                      <div style={{ marginBottom: '8px' }}>{ewTF.detail || '—'}</div>
                      <div style={{ color: C.cvdPos, fontWeight: 700, marginBottom: '4px' }}>{tf} — ICT</div>
                      <div>구조: {ictTF.structure || normalizeStructureTag(ictTF.structure_tag) || '—'}</div>
                      <div>POI: {ictTF.poi || fmtAnalysisPrice(ictTF.poi_level)}</div>
                      <div>유동성: {ictTF.liquidity || `BSL ${fmtAnalysisPrice(ictTF.bsl)} / SSL ${fmtAnalysisPrice(ictTF.ssl)}`}</div>
                      <div>킬존: {ictTF.killzone || '—'}</div>
                      {ictTF.smt && <div>SMT: {ictTF.smt}</div>}
                      {index < tfs.length - 1 && <div style={{ height: '1px', background: C.border, margin: '12px 0' }} />}
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        </div>
      );
    }

    function AnalysisTab({ pairs, selectedPair, onSelectPair, isMobile }) {
      const pair = pairs.find(item => item.symbol === selectedPair) || pairs[0];

      return (
        <div>
          <PairSelector pairs={pairs} selected={pair.symbol} onSelect={onSelectPair} />
          <AnalysisCard pair={pair} isMobile={isMobile} />
        </div>
      );
    }

    function OrderflowTab({ pairs, isMobile }) {
      const summaryCards = (
        <div style={{ display: 'grid', gridTemplateColumns: isMobile ? 'repeat(2, 1fr)' : 'repeat(4, 1fr)', gap: '10px', marginBottom: '16px' }}>
          {pairs.map(p => {
            const of = ORDERFLOW_DATA.pairs[p.symbol];
            if (!of) return null;
            return (
              <Card key={p.symbol}>
                <div style={{ fontSize: '13px', fontWeight: 700, color: C.text, marginBottom: '6px' }}>{p.short}</div>
                <div style={{ fontSize: '11px', color: C.sub, marginBottom: '2px' }}>OI: <span style={{ color: C.text }}>{of.oi_usd_str}</span></div>
                <div style={{ fontSize: '12px', fontWeight: 700, color: of.oi_trend === 'rising' ? C.bull : C.bear, marginBottom: '2px' }}>{of.oi_change_24h} {of.oi_trend === 'rising' ? '↑' : '↓'}</div>
                <div style={{ fontSize: '11px', color: of.cvd_direction === 'positive' ? C.cvdPos : C.cvdNeg }}>{of.cvd_direction}/{of.cvd_trend}</div>
              </Card>
            );
          })}
        </div>
      );

      const table = (
        <Card>
          <div style={{ overflowX: 'auto' }}>
            <table style={{ width: '100%', minWidth: isMobile ? '480px' : 'auto', borderCollapse: 'collapse' }}>
              <thead>
                <tr>
                  {['페어', 'OI', 'OI 24h', '펀딩비', '펀딩(예측)', 'CVD'].map(h => (
                    <th key={h} style={{ padding: '8px 12px', fontSize: '11px', color: C.sub, textAlign: 'left', borderBottom: '1px solid ' + C.border, whiteSpace: 'nowrap' }}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {pairs.map(p => {
                  const of = ORDERFLOW_DATA.pairs[p.symbol];
                  if (!of) return null;
                  const frNum = parseFloat(of.funding_rate);
                  return (
                    <tr key={p.symbol} style={{ borderBottom: '1px solid ' + C.border }}>
                      <td style={{ padding: '10px 12px', fontSize: '13px', fontWeight: 700, color: C.text }}>{p.short}</td>
                      <td style={{ padding: '10px 12px', fontSize: '12px', color: C.text }}>{of.oi_usd_str}</td>
                      <td style={{ padding: '10px 12px', fontSize: '12px', fontWeight: 700, color: of.oi_change_24h.startsWith('+') ? C.bull : C.bear }}>{of.oi_change_24h}</td>
                      <td style={{ padding: '10px 12px', fontSize: '12px', fontWeight: 700, color: frNum >= 0 ? C.bull : C.bear }}>{of.funding_rate}</td>
                      <td style={{ padding: '10px 12px', fontSize: '12px', color: C.sub }}>{of.funding_rate_predicted}</td>
                      <td style={{ padding: '10px 12px', fontSize: '12px', fontWeight: 700, color: of.cvd_direction === 'positive' ? C.cvdPos : C.cvdNeg }}>{of.cvd_direction + '/' + of.cvd_trend}</td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </Card>
      );

      const interpretCards = (
        <div style={{ marginTop: '16px' }}>
          <SectionTitle>해석</SectionTitle>
          <div style={{ display: 'grid', gridTemplateColumns: isMobile ? '1fr' : 'repeat(2, 1fr)', gap: '10px' }}>
            <Card>
              <div style={{ fontSize: '12px', fontWeight: 700, color: C.bull, marginBottom: '6px' }}>BTC / ETH — 강세 신호</div>
              <div style={{ fontSize: '12px', color: C.sub, lineHeight: '1.7' }}>
                OI 급증(+8.58% / +10.23%) + CVD 양수/상승 → 신규 롱 또는 숏 청산 주도 반등. 펀딩비 음수(-0.81% / -0.23%)는 숏 우세 → 추가 숏스퀴즈 잠재력 유효. ETH가 BTC 대비 OI 증가폭 더 커서 단기 상대 강세 가능.
              </div>
            </Card>
            <Card>
              <div style={{ fontSize: '12px', fontWeight: 700, color: C.bear, marginBottom: '6px' }}>SOL / HYPE — 약세 오더플로우</div>
              <div style={{ fontSize: '12px', color: C.sub, lineHeight: '1.7' }}>
                SOL OI -8.42% + CVD 음수/하락 → 롱 청산 또는 실질 매도압력. 펀딩 +0.10% 과열. HYPE OI -3.91% + CVD 음수이나 가격은 상승 유지 → 시장 구조 강도 시사. HYPE 펀딩 -0.41%는 숏 우세로 추가 상승 여력.
              </div>
            </Card>
          </div>
        </div>
      );

      return (
        <div>
          {summaryCards}
          <SectionTitle>상세 데이터 (Coinalyze)</SectionTitle>
          {table}
          {interpretCards}
        </div>
      );
    }

    function ScenariosTab({ pairs, isMobile }) {
      return (
        <div style={{ display: 'flex', flexDirection: 'column', gap: '24px' }}>
          {pairs.map(p => (
            <div key={p.symbol}>
              <div style={{ fontSize: '14px', fontWeight: 800, color: C.text, marginBottom: '10px', display: 'flex', alignItems: 'center', gap: '8px' }}>
                {p.short}
                <span style={{ fontSize: '13px', color: C.sub }}>${p.price.toLocaleString()}</span>
                <Badge color={biasColor(p.bias)}>{p.biasLabel}</Badge>
              </div>
              <div style={{ display: 'grid', gridTemplateColumns: isMobile ? '1fr' : 'repeat(3, 1fr)', gap: '10px' }}>
                {['bull', 'bear', 'neutral'].map(key => {
                  const s = p.scenarios[key];
                  if (!s) return null;
                  const c = key === 'bull' ? C.bull : key === 'bear' ? C.bear : C.neutral;
                  return (
                    <div key={key} style={{ background: `linear-gradient(180deg, ${C.card} 0%, ${C.cardAlt} 100%)`, borderRadius: '12px', padding: '14px', border: '1px solid ' + c + '40', boxShadow: 'inset 0 1px 0 rgba(255,255,255,0.03)' }}>
                      <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: '8px' }}>
                        <span style={{ fontSize: '12px', fontWeight: 700, color: c }}>{key.toUpperCase()}</span>
                        <span style={{ fontSize: '18px', fontWeight: 800, color: c }}>{s.prob}%</span>
                      </div>
                      <div style={{ fontSize: '13px', fontWeight: 700, color: C.text, marginBottom: '8px' }}>{s.title}</div>
                      <div style={{ fontSize: '11px', color: C.sub, marginBottom: '5px' }}><span style={{ color: C.dim }}>트리거: </span>{s.trigger}</div>
                      <div style={{ fontSize: '11px', color: C.sub }}><span style={{ color: C.dim }}>무효화: </span>{s.invalidation}</div>
                    </div>
                  );
                })}
              </div>
            </div>
          ))}
        </div>
      );
    }

    function RiskTab({ pairs, isMobile }) {
      return (
        <div style={{ display: 'flex', flexDirection: 'column', gap: '14px' }}>
          <Card style={{ borderLeft: '4px solid ' + C.bear }}>
            <div style={{ fontSize: '13px', fontWeight: 700, color: C.bear, marginBottom: '6px' }}>⚠ Entry 금지 구간 (importance: high)</div>
            <div style={{ fontSize: '12px', color: C.sub, lineHeight: '1.7' }}>
              <strong style={{ color: C.text }}>Apr 18 09:00–13:00 KST (±2h)</strong>: 이란 호르무즈 재개방 뉴스 후속 변동 구간. 신규 포지션 금지, 기존 포지션 사이즈 50% 축소 권장.
            </div>
          </Card>
          <div style={{ display: 'grid', gridTemplateColumns: isMobile ? '1fr' : 'repeat(2, 1fr)', gap: '12px' }}>
            {pairs.map(p => (
              <Card key={p.symbol} style={{ border: '1px solid ' + (p.bias === 'bull' ? C.bull + '40' : p.bias === 'bear' ? C.bear + '40' : C.borderStrong) }}>
                <div style={{ fontSize: '14px', fontWeight: 800, color: C.text, marginBottom: '12px', display: 'flex', alignItems: 'center', gap: '8px' }}>
                  {p.short} <Badge color={biasColor(p.bias)}>{p.biasLabel}</Badge>
                </div>
                <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '12px' }}>
                  <div>
                    <div style={{ fontSize: '11px', fontWeight: 700, color: C.bull, marginBottom: '6px' }}>LONG 셋업</div>
                    <KVRow label="Entry" value={'$' + p.risk.long.entry.toLocaleString()} />
                    <KVRow label="TP1" value={'$' + p.risk.long.tp1.toLocaleString()} />
                    <KVRow label="TP2" value={'$' + p.risk.long.tp2.toLocaleString()} />
                    <KVRow label="SL" value={'$' + p.risk.long.sl.toLocaleString()} />
                    <KVRow label="R:R" value={p.risk.long.rr} valueColor={C.bull} />
                  </div>
                  <div>
                    <div style={{ fontSize: '11px', fontWeight: 700, color: C.bear, marginBottom: '6px' }}>SHORT 셋업</div>
                    <KVRow label="Entry" value={'$' + p.risk.short.entry.toLocaleString()} />
                    <KVRow label="TP1" value={'$' + p.risk.short.tp1.toLocaleString()} />
                    <KVRow label="TP2" value={'$' + p.risk.short.tp2.toLocaleString()} />
                    <KVRow label="SL" value={'$' + p.risk.short.sl.toLocaleString()} />
                    <KVRow label="R:R" value={p.risk.short.rr} valueColor={C.bear} />
                  </div>
                </div>
              </Card>
            ))}
          </div>
        </div>
      );
    }

    // ─── MAIN ────────────────────────────────────────────────────────────────────

    function useIsMobile() {
      const [m, setM] = React.useState(() => window.matchMedia('(max-width: 767px)').matches);
      React.useEffect(() => {
        const mql = window.matchMedia('(max-width: 767px)');
        const h = e => setM(e.matches);
        mql.addEventListener('change', h);
        return () => mql.removeEventListener('change', h);
      }, []);
      return m;
    }

    function Dashboard() {
      const isMobile = useIsMobile();
      const tabBarRef = React.useRef(null);
      const TABS = ['Overview', 'Macro', '분석', 'Orderflow', 'Scenarios', 'Risk'];
      const [activeTab, setActiveTab] = React.useState('Overview');
      const [selectedPair, setSelectedPair] = React.useState('BTCUSDT');

      React.useEffect(() => {
        if (!isMobile || !tabBarRef.current) return;
        const activeBtn = tabBarRef.current.querySelector('[data-active="true"]');
        if (activeBtn) activeBtn.scrollIntoView({ inline: 'center', behavior: 'smooth' });
      }, [activeTab, isMobile]);

      const contentPadding = isMobile ? '14px 12px 18px' : '22px 24px 24px';
      const headerPadding = isMobile ? '14px 12px' : '18px 24px';

      let tabContent;
      if (activeTab === 'Overview')     tabContent = <OverviewTab pairs={PAIRS} isMobile={isMobile} />;
      else if (activeTab === 'Macro')   tabContent = <MacroTab events={MACRO_EVENTS} isMobile={isMobile} />;
      else if (activeTab === '분석')    tabContent = <AnalysisTab pairs={PAIRS} selectedPair={selectedPair} onSelectPair={setSelectedPair} isMobile={isMobile} />;
      else if (activeTab === 'Orderflow') tabContent = <OrderflowTab pairs={PAIRS} isMobile={isMobile} />;
      else if (activeTab === 'Scenarios') tabContent = <ScenariosTab pairs={PAIRS} isMobile={isMobile} />;
      else if (activeTab === 'Risk')    tabContent = <RiskTab pairs={PAIRS} isMobile={isMobile} />;

      return (
        <div style={{ minHeight: '100vh', background: C.bg }}>
          <div style={{
            background: 'linear-gradient(180deg, rgba(16,21,34,0.98) 0%, rgba(16,21,34,0.92) 100%)',
            borderBottom: '1px solid ' + C.borderStrong,
            padding: headerPadding,
          }}>
            {isMobile ? (
              <div style={{ display: 'flex', flexDirection: 'column', gap: '10px' }}>
                <div>
                  <div style={{ fontSize: '18px', fontWeight: 700, color: C.text, letterSpacing: '-0.3px', fontFamily: "'IBM Plex Sans', sans-serif" }}>Crypto Futures Analysis</div>
                  <div style={{ fontSize: '11px', color: C.dim, marginTop: '2px' }}>2026-04-18 · EW + ICT/SMC + Orderflow</div>
                </div>
                <div style={{ display: 'flex', gap: '6px', flexWrap: 'wrap' }}>
                  {PAIRS.map(p => <Badge key={p.symbol} color={biasColor(p.bias)} small>{p.short}: {p.biasLabel}</Badge>)}
                </div>
              </div>
            ) : (
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                <div>
                  <div style={{ fontSize: '22px', fontWeight: 700, color: C.text, letterSpacing: '-0.5px', fontFamily: "'IBM Plex Sans', sans-serif" }}>Crypto Futures Analysis</div>
                  <div style={{ fontSize: '12px', color: C.dim, marginTop: '3px', fontFamily: "'IBM Plex Mono', monospace" }}>2026-04-18 · EW + ICT/SMC + Orderflow · BTC $77,054 / ETH $2,421 / SOL $88.9 / HYPE $44.5</div>
                </div>
                <div style={{ display: 'flex', gap: '8px', alignItems: 'center' }}>
                  {PAIRS.map(p => <Badge key={p.symbol} color={biasColor(p.bias)}>{p.short}: {p.biasLabel}</Badge>)}
                </div>
              </div>
            )}
          </div>

          <div ref={tabBarRef} style={{
            background: C.panel,
            borderBottom: '1px solid ' + C.border,
            display: 'flex',
            gap: '4px',
            overflowX: 'auto',
            padding: isMobile ? '8px 12px' : '8px 24px',
            scrollbarWidth: 'none',
            msOverflowStyle: 'none',
          }}>
            {TABS.map(tab => (
              <button
                key={tab}
                data-active={activeTab === tab ? 'true' : 'false'}
                onClick={() => setActiveTab(tab)}
                style={{
                  padding: isMobile ? '10px 14px' : '9px 16px',
                  background: activeTab === tab ? C.cardAlt : 'transparent',
                  border: '1px solid ' + (activeTab === tab ? C.borderStrong : 'transparent'),
                  borderRadius: '999px',
                  cursor: 'pointer',
                  fontSize: '13px',
                  fontWeight: activeTab === tab ? 700 : 500,
                  color: activeTab === tab ? C.text : C.sub,
                  whiteSpace: 'nowrap',
                  flexShrink: 0,
                  transition: 'background 0.15s, border-color 0.15s, color 0.15s',
                }}
              >{tab}</button>
            ))}
          </div>

          <div style={{ padding: contentPadding }}>
            {tabContent}
          </div>

          <div style={{
            padding: '12px 24px', borderTop: '1px solid ' + C.border,
            display: 'flex', flexDirection: isMobile ? 'column' : 'row',
            justifyContent: 'space-between', gap: isMobile ? '4px' : '0',
            alignItems: isMobile ? 'flex-start' : 'center',
            fontSize: '11px', color: C.dim,
          }}>
            <span>데이터 기준: 2026-04-18 00:00 UTC · TradingView + Coinalyze API + Coinglass</span>
            <span>본 분석은 투자 참고용이며 투자 손익에 대한 책임은 본인에게 있습니다</span>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<Dashboard />);
  </script>
</body>
</html>
