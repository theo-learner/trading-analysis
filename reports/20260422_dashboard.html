function biasColor(bias) {
  if (bias === 'bull') return C.bull;
  if (bias === 'bear') return C.bear;
  return C.neutral;
}
function biasTextColor(bias) {
  if (bias === 'bull') return C.bullText;
  if (bias === 'bear') return C.bearText;
  return C.neutralText;
}
function changeColor(ch) {
  if (!ch) return C.sub;
  return ch.startsWith('-') ? C.bear : C.bull;
}
function fundingColor(fr) {
  if (!fr) return C.sub;
  return fr.startsWith('-') ? C.bear : C.bull;
}
function cvdColor(dir) {
  return dir === 'positive' ? C.cvdPos : C.cvdNeg;
}

// ─── STRATEGY UTILS ──────────────────────────────────────────────────────────
function asNumber(value) {
  if (typeof value === 'number' && Number.isFinite(value)) return value;
  if (typeof value === 'string' && value.trim() !== '') {
    const parsed = Number(value);
    return Number.isFinite(parsed) ? parsed : null;
  }
  return null;
}
function dedupeLevels(levels) {
  return [...new Set((levels || []).map(asNumber).filter(v => v != null))].sort((a, b) => a - b);
}
function pickNearest(levels, predicate, sortFn) {
  const filtered = dedupeLevels(levels).filter(predicate || (() => true));
  if (filtered.length === 0) return null;
  return [...filtered].sort(sortFn || ((a, b) => a - b))[0];
}
function formatStrategyPrice(value) {
  const n = asNumber(value);
  return n != null ? `$${n.toLocaleString(undefined, { maximumFractionDigits: 2 })}` : '—';
}
function sortScenariosByProbability(pair) {
  const order = ['bull', 'bear', 'neutral'];
  return order
    .map(key => ({ key, ...(pair.scenarios?.[key] || {}) }))
    .sort((l, r) => {
      const lp = asNumber(l.prob) ?? -Infinity;
      const rp = asNumber(r.prob) ?? -Infinity;
      if (rp !== lp) return rp - lp;
      return order.indexOf(l.key) - order.indexOf(r.key);
    });
}
function collectStrategyLevels(pair) {
  const price = asNumber(pair.price);
  const lv4H = pair.levels?.['4H'] || {};
  const lv1D = pair.levels?.['1D'] || {};
  const ict4H = pair.ict?.['4H'] || {};
  const ict1D = pair.ict?.['1D'] || {};
  const ew4H = pair.ew?.['4H'] || {};
  const ew1D = pair.ew?.['1D'] || {};
  const support = dedupeLevels([...(lv4H.ssl || []), ...(lv4H.swing_lows || []), ...(lv1D.ssl || []), ...(lv1D.swing_lows || [])]);
  const resistance = dedupeLevels([...(lv4H.bsl || []), ...(lv4H.swing_highs || []), ...(lv1D.bsl || []), ...(lv1D.swing_highs || [])]);
  const poi = asNumber(ict4H.poi_level) ?? asNumber(ict1D.poi_level);
  const poiAsBull = poi != null && price != null ? poi <= price * 1.02 : poi != null;
  const poiAsBear = poi != null && price != null ? poi >= price * 0.98 : poi != null;
  const longEntries = dedupeLevels([...support, ...(poiAsBull ? [poi] : [])]);
  const shortEntries = dedupeLevels([...resistance, ...(poiAsBear ? [poi] : [])]);
  const longTargets = dedupeLevels([...resistance.filter(v => price == null || v > price), ew4H.target, ew1D.target]);
  const shortTargets = dedupeLevels([...support.filter(v => price == null || v < price)]);
  const longStops = dedupeLevels([...support, ...(poi != null ? [poi] : [])]);
  const shortStops = dedupeLevels([...resistance, ...(poi != null ? [poi] : [])]);
  return { price, support, resistance, longEntries, shortEntries, longTargets, shortTargets, longStops, shortStops };
}
function buildStrategyRecommendation(pair, rankedScenario, variant) {
  const { price, support, resistance, longEntries, shortEntries, longTargets, shortTargets, longStops, shortStops } = collectStrategyLevels(pair);
  const scenarioKey = rankedScenario?.key || 'neutral';
  const prob = asNumber(rankedScenario?.prob) ?? 0;
  const confluence = Array.isArray(pair.confluence) ? pair.confluence.slice(0, 2).join(' + ') : '';
  const label = variant || 'Primary';
  const nearestSupport = pickNearest(support, v => price == null || v < price, (a, b) => Math.abs(a - price) - Math.abs(b - price));
  const nearestResistance = pickNearest(resistance, v => price == null || v > price, (a, b) => Math.abs(a - price) - Math.abs(b - price));
  const nearResistance = price != null && nearestResistance != null ? Math.abs(nearestResistance - price) / price <= 0.01 : false;
  const nearSupportBreakdown = price != null && nearestSupport != null ? Math.abs(price - nearestSupport) / price <= 0.01 : false;
  if (scenarioKey === 'neutral') {
    return { label, scenarioKey, prob, action: 'Wait', entry: null, tp: null, sl: null, rationale: `${rankedScenario?.title || 'Neutral bias'} — 대기 모드.` };
  }
  if (scenarioKey === 'bull') {
    const entry = pickNearest(longEntries, v => price == null || v <= price * 1.02, (a, b) => price == null ? a - b : Math.abs(a - price) - Math.abs(b - price));
    const tp = pickNearest(longTargets, v => price == null || v > price, (a, b) => a - b);
    const sl = entry != null ? pickNearest(longStops, v => v < entry, (a, b) => b - a) : null;
    if (entry == null || tp == null || sl == null) return { label, scenarioKey, prob, action: 'Wait', entry: null, tp: null, sl: null, rationale: '강세 방향 확인, 구조적 레벨 부족 — 대기.' };
    return { label, scenarioKey, prob, action: nearResistance ? 'Breakout Long' : 'Pullback Long', entry, tp, sl, rationale: `Bull ${prob}% + ${pair.biasLabel || pair.bias || 'neutral'}${confluence ? ` + ${confluence.slice(0, 40)}` : ''}.` };
  }
  const entry = pickNearest(shortEntries, v => price == null || v >= price * 0.98, (a, b) => price == null ? a - b : Math.abs(a - price) - Math.abs(b - price));
  const tp = pickNearest(shortTargets, v => price == null || v < price, (a, b) => b - a);
  const sl = entry != null ? pickNearest(shortStops, v => v > entry, (a, b) => a - b) : null;
  if (entry == null || tp == null || sl == null) return { label, scenarioKey: 'bear', prob, action: 'Wait', entry: null, tp: null, sl: null, rationale: '약세 방향 확인, 구조적 레벨 부족 — 대기.' };
  return { label, scenarioKey: 'bear', prob, action: nearSupportBreakdown ? 'Breakdown Short' : 'Rejection Short', entry, tp, sl, rationale: `Bear ${prob}% + ${pair.biasLabel || pair.bias || 'neutral'}${confluence ? ` + ${confluence.slice(0, 40)}` : ''}.` };
}

function StrategyKVRow({ label, value }) {

function strategyTone(strategy) {
  if (strategy.action.includes('Long')) return { color: C.bull, bg: C.bull + '18', border: C.bull + '40' };
  if (strategy.action.includes('Short')) return { color: C.bear, bg: C.bear + '18', border: C.bear + '40' };
  return { color: C.neutral, bg: C.neutral + '18', border: C.neutral + '40' };
}
function StrategyBlock({ title, strategy, muted }) {
  const tone = strategyTone(strategy);
  return (
    <div style={{ background: muted ? C.bg : tone.bg, border: `1px solid ${muted ? C.border : tone.border}`, borderRadius: '8px', padding: '12px' }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', gap: '8px', marginBottom: '8px' }}>
        <span style={{ color: muted ? C.sub : tone.color, fontSize: '11px', fontWeight: 700 }}>{title}</span>
        <span style={{ color: muted ? C.sub : tone.color, fontSize: '11px', fontWeight: 700 }}>{strategy.prob}%</span>
      </div>
      <StrategyKVRow label="Action" value={strategy.action} />
      <StrategyKVRow label="Entry" value={formatStrategyPrice(strategy.entry)} />
      <StrategyKVRow label="TP" value={formatStrategyPrice(strategy.tp)} />
      <StrategyKVRow label="SL" value={formatStrategyPrice(strategy.sl)} />
      <div style={{ marginTop: '8px', fontSize: '11px', color: C.sub, lineHeight: '1.5' }}>{strategy.rationale}</div>
    </div>
  );
}

  return (
    <Card>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '12px' }}>
        <div>
          <div style={{ fontSize: '14px', fontWeight: 800, color: C.text }}>{pair.short}</div>
          <div style={{ fontSize: '11px', color: C.sub }}>${pair.price.toLocaleString()}</div>

      </div>
      <div style={{ display: 'grid', gridTemplateColumns: '1fr', gap: '10px' }}>

        <StrategyBlock title="Alternate" strategy={alternate} muted />

  );
}

// ─── MOBILE HOOK ─────────────────────────────────────────────────────────────
function useIsMobile() {
  const [m, setM] = React.useState(() => window.matchMedia('(max-width: 767px)').matches);
  React.useEffect(() => {
    const mql = window.matchMedia('(max-width: 767px)');
    const h = e => setM(e.matches);
    mql.addEventListener('change', h);
    return () => mql.removeEventListener('change', h);
  }, []);
  return m;
}

              background: 'none',
              border: 'none',
              borderBottom: `2px solid ${activeTab === tab ? C.primary : 'transparent'}`,
              color: activeTab === tab ? C.primary : C.sub,
              fontWeight: activeTab === tab ? 700 : 400,
              fontSize: '13px',
              padding: isMobile ? '14px 14px' : '12px 16px',
              whiteSpace: 'nowrap',
              cursor: 'pointer',
              transition: 'color 0.15s',
            }}
          >
            {tab}
          </button>
        ))}
      </div>

      {/* Content */}
      <div style={{ padding: contentPadding, maxWidth: '1400px', margin: '0 auto' }}>
        {tabContent}
      </div>

      {/* Footer */}
      <div style={{
        display: 'flex', flexDirection: isMobile ? 'column' : 'row',
        justifyContent: 'space-between', gap: isMobile ? '4px' : '0',
        alignItems: isMobile ? 'flex-start' : 'center',
        fontSize: '11px', color: C.dim,
        padding: isMobile ? '12px' : '12px 24px',
        borderTop: `1px solid ${C.border}`, background: C.surface, marginTop: '24px'
      }}>
        <span>데이터 기준: 2026-04-22 03:54 UTC (Coinalyze) · 분석: EW + ICT/SMC + Orderflow</span>
        <span>투자 참고용 — 투자 결정의 책임은 본인에게 있습니다</span>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Dashboard />);

  </script>
</body>
</html>
