  function biasColor(b) { return b === 'bull' ? C.bull : b === 'bear' ? C.bear : C.neutral; }
  function formatKST(s) {
    try { return new Date(s).toLocaleString('ko-KR', { timeZone: 'Asia/Seoul', month: 'numeric', day: 'numeric', hour: '2-digit', minute: '2-digit' }); }
    catch { return s; }
  }

  // ─── STRATEGY UTILS ───────────────────────────────────────────────────────────
  function asNumber(v) {
    if (typeof v === 'number' && Number.isFinite(v)) return v;
    if (typeof v === 'string' && v.trim() !== '') { const p = Number(v); return Number.isFinite(p) ? p : null; }
    return null;
  }
  function dedupeLevels(lvls) {
    return [...new Set((lvls || []).map(asNumber).filter(v => v != null))].sort((a, b) => a - b);
  }
  function pickNearest(lvls, pred, sortFn) {
    const f = dedupeLevels(lvls).filter(pred || (() => true));
    return f.length === 0 ? null : [...f].sort(sortFn || ((a, b) => a - b))[0];
  }
  function fmt$(v) { const n = asNumber(v); return n != null ? `$${n.toLocaleString(undefined, { maximumFractionDigits: 2 })}` : '—'; }

  function sortScenarios(pair) {
    return ['bull','bear','neutral'].map(k => ({ key: k, ...(pair.scenarios?.[k] || {}) }))
      .sort((a, b) => (asNumber(b.prob) ?? -Infinity) - (asNumber(a.prob) ?? -Infinity));
  }

  function collectLevels(pair) {
    const price = asNumber(pair.price);
    const l4 = pair.levels?.['4H'] || {};
    const ict4 = pair.ict?.['4H'] || {};
    const ew4 = pair.ew?.['4H'] || {};
    const support = dedupeLevels([...(l4.ssl || []), ...(l4.swing_lows || [])]);
    const resistance = dedupeLevels([...(l4.bsl || []), ...(l4.swing_highs || [])]);
    const poi = asNumber(ict4.poi_level);
    const longEntries = dedupeLevels([...support, ...(poi != null && price != null && poi <= price * 1.01 ? [poi] : [])]);
    const shortEntries = dedupeLevels([...resistance, ...(poi != null && price != null && poi > price ? [poi] : [])]);
    const longTargets = dedupeLevels([...resistance.filter(v => price == null || v > price), ew4.target]);
    const shortTargets = dedupeLevels([...support.filter(v => price == null || v < price)]);
    const longStops = dedupeLevels([...support, ...(poi != null ? [poi] : [])]);
    const shortStops = dedupeLevels([...resistance, ...(poi != null ? [poi] : [])]);
    return { price, support, resistance, longEntries, shortEntries, longTargets, shortTargets, longStops, shortStops };
  }

  function buildStrategy(pair, ranked, variant) {
    const { price, support, resistance, longEntries, shortEntries, longTargets, shortTargets, longStops, shortStops } = collectLevels(pair);
    const sc = ranked || {};
    const k = sc.key || 'neutral';
    const prob = asNumber(sc.prob) ?? 0;
    if (k === 'neutral') return { label: variant, scenarioKey: k, prob, action: 'Wait', entry: null, tp: null, sl: null, rationale: sc.title || 'Neutral bias.' };
    if (k === 'bull') {
      const entry = pickNearest(longEntries, v => price == null || v <= price * 1.02, (a, b) => Math.abs(a - price) - Math.abs(b - price));
      const tp = pickNearest(longTargets, v => price == null || v > price, (a, b) => a - b);
      const sl = entry != null ? pickNearest(longStops, v => v < entry, (a, b) => b - a) : null;
      if (!entry || !tp || !sl) return { label: variant, scenarioKey: k, prob, action: 'Wait', entry: null, tp: null, sl: null, rationale: 'Bullish — levels incomplete.' };
      const nearRes = price != null && resistance.length > 0 && Math.abs(Math.min(...resistance.filter(v => v > price)) - price) / price <= 0.01;
      return { label: variant, scenarioKey: k, prob, action: nearRes ? 'Breakout Long' : 'Pullback Long', entry, tp, sl, rationale: `Bull ${prob}% — ${pair.biasLabel}` };
    }
    const entry = pickNearest(shortEntries, v => price == null || v >= price * 0.98, (a, b) => Math.abs(a - price) - Math.abs(b - price));
    const tp = pickNearest(shortTargets, v => price == null || v < price, (a, b) => b - a);
    const sl = entry != null ? pickNearest(shortStops, v => v > entry, (a, b) => a - b) : null;
    if (!entry || !tp || !sl) return { label: variant, scenarioKey: k, prob, action: 'Wait', entry: null, tp: null, sl: null, rationale: 'Bearish — levels incomplete.' };
    return { label: variant, scenarioKey: k, prob, action: 'Rejection Short', entry, tp, sl, rationale: `Bear ${prob}% — ${pair.biasLabel}` };
  }

  // ─── STRATEGY COMPONENTS ──────────────────────────────────────────────────────
  function strategyTone(s) {
    if (s.action.includes('Long'))  return { color: C.bull,    bg: '#0ECB8110', border: '#0ECB8130' };
    if (s.action.includes('Short')) return { color: C.bear,    bg: '#F6465D10', border: '#F6465D30' };

  // ─── useLivePrices ───────────────────────────────────────────────────────────
  // HYPEUSDT is not listed on Binance — fetch it from Bybit separately
  const BYBIT_SYMS = new Set(['HYPEUSDT']);
  function useLivePrices(symbols) {
    const [prices, setPrices] = React.useState({});
    const [lastUpdated, setLastUpdated] = React.useState(null);
    React.useEffect(() => {
      const binanceSym = symbols.filter(s => !BYBIT_SYMS.has(s));
      const bybitSym   = symbols.filter(s =>  BYBIT_SYMS.has(s));
      const fetches = [];
      if (binanceSym.length) {
        const url = 'https://api.binance.com/api/v3/ticker/price?symbols=[' +
          binanceSym.map(s => '"' + s + '"').join(',') + ']';
        fetches.push(
          fetch(url).then(r => r.json())
            .then(data => { const m = {}; data.forEach(({ symbol, price }) => { m[symbol] = parseFloat(price); }); return m; })
            .catch(() => ({}))
        );
      }
      bybitSym.forEach(sym => {
        fetches.push(
          fetch(`https://api.bybit.com/v5/market/tickers?category=spot&symbol=${sym}`)
            .then(r => r.json())
            .then(d => { const p = d?.result?.list?.[0]?.lastPrice; return p ? { [sym]: parseFloat(p) } : {}; })
            .catch(() => ({}))
        );
      });
      const fetch_ = () =>
        Promise.all(fetches).then(results => {
          const merged = Object.assign({}, ...results);
          if (Object.keys(merged).length > 0) { setPrices(merged); setLastUpdated(new Date()); }
        });
      fetch_();
      const id = setInterval(fetch_, 30000);
      return () => clearInterval(id);
    }, []);
    return { prices, lastUpdated };
  }

                <Badge color={C.primary}>{ev.region}</Badge>
                <Badge color={C.dim}>{ev.category}</Badge>
                <Badge color={borderColor[ev.importance]}>{ev.importance}</Badge>
              </div>
              <div style={{ fontSize: '13px', fontWeight: 700, color: C.text, marginBottom: '6px' }}>{ev.title}</div>
              {(ev.actual || ev.forecast || ev.previous) && (
                <div style={{ display: 'flex', gap: '14px', marginBottom: '6px' }}>
                  {ev.actual   && <span style={{ fontSize: '11px' }}><span style={{ color: C.dim }}>실제: </span><span style={{ color: C.bull, fontWeight: 600 }}>{ev.actual}</span></span>}
                  {ev.forecast && <span style={{ fontSize: '11px' }}><span style={{ color: C.dim }}>예상: </span><span style={{ color: C.sub }}>{ev.forecast}</span></span>}
                  {ev.previous && <span style={{ fontSize: '11px' }}><span style={{ color: C.dim }}>이전: </span><span style={{ color: C.sub }}>{ev.previous}</span></span>}
                </div>
              )}
              <div style={{ fontSize: '12px', color: C.sub, lineHeight: '1.6', marginBottom: '8px' }}>{ev.summary}</div>
              <div style={{ display: 'flex', gap: '6px', flexWrap: 'wrap', alignItems: 'center' }}>
                {ev.impact_assets.map(a => <Badge key={a} color={C.bull} outline>{a.replace('USDT','')}</Badge>)}
                <a href={ev.source_url} target="_blank" rel="noopener noreferrer" style={{ fontSize: '10px', color: C.primary, marginLeft: 'auto' }}>{ev.source} ↗</a>
              </div>
            </div>
          ))}
        </div>
      </div>
    );
  }

  // ─── TAB: 분석 ────────────────────────────────────────────────────────────────
  function TFAlignmentBar({ pair, tf }) {
    const ew = pair.ew[tf];
    const ict = pair.ict[tf];
    const dir = ew?.direction || 'neutral';
    const tag = ict?.structure_tag || '—';
    const sdir = ict?.structure_direction || 'neutral';
    return (
      <div style={{ display: 'flex', gap: '8px', alignItems: 'center', padding: '6px 10px', background: C.panel, borderRadius: '6px' }}>
        <span style={{ fontFamily: 'Inter', fontWeight: 700, fontSize: '11px', color: C.sub, minWidth: '24px' }}>{tf}</span>
        <Badge color={dir === 'long' ? C.bull : dir === 'short' ? C.bear : C.neutral}>{ew?.current_wave || '—'}</Badge>
        <Badge color={sdir === 'bullish' ? C.bull : sdir === 'bearish' ? C.bear : C.neutral}>{tag}</Badge>
      </div>
    );
  }
  function EWWaveStep({ pair, tf }) {
    const ew = pair.ew[tf];
    if (!ew) return <div style={{ color: C.dim, fontSize: '12px' }}>—</div>;
    const dirColor = ew.direction === 'long' ? C.bull : ew.direction === 'short' ? C.bear : C.neutral;
    return (
      <div>
        <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: '6px' }}>
          <span style={{ fontSize: '12px', fontWeight: 700, color: dirColor }}>{ew.current_wave}</span>
          {ew.target && <span style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: '11px', color: C.primary }}>목표 ${Number(ew.target).toLocaleString()}</span>}
        </div>
        {ew.completed_waves?.length > 0 && <div style={{ fontSize: '10px', color: C.dim, marginBottom: '6px' }}>완료: {ew.completed_waves.join(' → ')}</div>}
        <div style={{ fontSize: '11px', color: C.sub, lineHeight: '1.6', marginBottom: '4px' }}>{ew.count}</div>
        <div style={{ fontSize: '11px', color: C.dim, lineHeight: '1.6' }}>{ew.detail}</div>
      </div>
    );
  }
  function ICTGrid({ pair, tf }) {
    const ict = pair.ict[tf];
    if (!ict) return <div style={{ color: C.dim, fontSize: '12px' }}>—</div>;
    const dir = ict.structure_direction;
    const dirColor = dir === 'bullish' ? C.bull : dir === 'bearish' ? C.bear : C.neutral;
    return (
      <div style={{ display: 'flex', flexDirection: 'column', gap: '4px' }}>
        <KVRow label="구조" value={`${ict.structure_tag || '—'} (${dir})`} valueColor={dirColor} />
        <KVRow label="POI" value={ict.poi_level != null ? `$${Number(ict.poi_level).toLocaleString()}` : '—'} />
        <KVRow label="BSL" value={ict.bsl != null ? `$${Number(ict.bsl).toLocaleString()}` : '—'} valueColor={C.bull} />
        <KVRow label="SSL" value={ict.ssl != null ? `$${Number(ict.ssl).toLocaleString()}` : '—'} valueColor={C.bear} />
        <div style={{ fontSize: '11px', color: C.sub, lineHeight: '1.6', marginTop: '6px' }}>{ict.structure}</div>
        <div style={{ fontSize: '11px', color: C.dim, lineHeight: '1.6' }}>{ict.poi}</div>
        <div style={{ fontSize: '11px', color: C.dim, lineHeight: '1.6' }}>{ict.killzone}</div>
        {ict.smt && <div style={{ fontSize: '11px', color: C.convergence, lineHeight: '1.6', marginTop: '2px' }}>SMT: {ict.smt}</div>}
      </div>
    );
  }
  function AnalysisCard({ p, isMobile }) {
    const [tf, setTF] = React.useState('4H');
    const lv = p.levels[tf] || {};
    return (
      <div>
        <div style={{ display: 'flex', gap: '6px', marginBottom: '12px' }}>
          {TFS.map(t => (
            <button key={t} onClick={() => setTF(t)} style={{ padding: '5px 14px', borderRadius: '6px', border: 'none', cursor: 'pointer', fontSize: '12px', fontWeight: tf === t ? 700 : 400, background: tf === t ? C.primary + '22' : C.panel, color: tf === t ? C.primary : C.sub }}>
              {t}
            </button>
          ))}
        </div>
        <div style={{ display: 'flex', flexDirection: 'column', gap: '6px', marginBottom: '14px' }}>
          {TFS.map(t => <TFAlignmentBar key={t} pair={p} tf={t} />)}
        </div>
        <div style={{ display: 'grid', gridTemplateColumns: isMobile ? '1fr' : '1fr 1fr', gap: '12px', marginBottom: '12px' }}>
          <Card><SectionTitle>Elliott Wave — {tf}</SectionTitle><EWWaveStep pair={p} tf={tf} /></Card>
          <Card><SectionTitle>ICT / SMC — {tf}</SectionTitle><ICTGrid pair={p} tf={tf} /></Card>
        </div>
        {p.confluence?.length > 0 && (
          <div style={{ marginBottom: '12px' }}>
            <SectionTitle>Confluence</SectionTitle>
            <div style={{ display: 'flex', flexWrap: 'wrap', gap: '6px' }}>
              {p.confluence.map((c, i) => <Badge key={i} color={C.convergence}>{c}</Badge>)}
            </div>
          </div>
        )}
        <Card>
          <SectionTitle>Key Levels — {tf}</SectionTitle>
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '10px', fontSize: '11px' }}>
            <div>
              {[['Bull OB', lv.ob?.bull, C.bull], ['Bull FVG', lv.fvg?.bull, C.bull], ['BSL', lv.bsl, C.bull]].map(([label, arr, color]) => arr?.length > 0 && (
                <div key={label} style={{ marginBottom: '8px' }}>
                  <div style={{ color, fontWeight: 700, marginBottom: '3px' }}>{label}</div>
                  {arr.map((v, i) => <div key={i} style={{ color: C.sub, fontFamily: "'JetBrains Mono', monospace" }}>${v.toLocaleString()}</div>)}
                </div>
              ))}
            </div>
            <div>
              {[['Bear OB', lv.ob?.bear, C.bear], ['Bear FVG', lv.fvg?.bear, C.bear], ['SSL', lv.ssl, C.bear]].map(([label, arr, color]) => arr?.length > 0 && (
                <div key={label} style={{ marginBottom: '8px' }}>
                  <div style={{ color, fontWeight: 700, marginBottom: '3px' }}>{label}</div>
                  {arr.map((v, i) => <div key={i} style={{ color: C.sub, fontFamily: "'JetBrains Mono', monospace" }}>${v.toLocaleString()}</div>)}
                </div>
              ))}
            </div>
          </div>
        </Card>
      </div>
    );
  }
  function AnalysisTab({ pairs, selectedPair, onSelectPair, isMobile }) {
    const pair = pairs.find(p => p.symbol === selectedPair) || pairs[0];
    return (
      <div>
        <div style={{ display: 'flex', gap: '8px', marginBottom: '16px', flexWrap: 'wrap' }}>
          {pairs.map(p => (
            <button key={p.symbol} onClick={() => onSelectPair(p.symbol)} style={{ background: selectedPair === p.symbol ? C.primary + '22' : C.panel, color: selectedPair === p.symbol ? C.primary : C.sub, border: 'none', borderRadius: '6px', padding: isMobile ? '8px 14px' : '6px 16px', fontSize: '12px', fontWeight: selectedPair === p.symbol ? 700 : 400, cursor: 'pointer' }}>
              {p.short}
            </button>
          ))}
        </div>
        <AnalysisCard p={pair} isMobile={isMobile} />
      </div>
    );
  }

  // ─── TAB: ORDERFLOW ───────────────────────────────────────────────────────────
  function OrderflowTab({ pairs, isMobile, livePrices = {} }) {
    const syms = ['BTCUSDT','ETHUSDT','SOLUSDT','HYPEUSDT'];
    return (
      <div>
        <SectionTitle>Orderflow — Coinalyze Data ({DATA_TIMESTAMP}){Object.keys(livePrices).length > 0 && <span style={{color:C.bull}}> · 가격: 실시간</span>}</SectionTitle>
        <div style={{ overflowX: 'auto', marginBottom: '20px' }}>
          <table style={{ width: '100%', minWidth: isMobile ? '480px' : 'auto', borderCollapse: 'collapse', fontSize: '12px' }}>
            <thead>
              <tr style={{ background: C.panel }}>
                {['페어','가격','OI','OI 24h','펀딩비 (예측)','CVD'].map(h => (
                  <th key={h} style={{ padding: '10px 12px', textAlign: 'left', color: C.sub, fontWeight: 600, borderBottom: `1px solid ${C.border}` }}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {syms.map((sym, idx) => {
                const d = ORDERFLOW_DATA.pairs[sym];
                const p = pairs.find(x => x.symbol === sym);
                const fval = parseFloat(d.funding_rate);
                return (
                  <tr key={sym} style={{ background: idx % 2 === 0 ? C.card : C.panel }}>
                    <td style={{ padding: '10px 12px', color: C.text, fontWeight: 700, fontFamily: 'Inter' }}>{p?.short || sym}</td>
                    <td style={{ padding: '10px 12px', color: C.text, fontFamily: "'JetBrains Mono', monospace" }}>${(livePrices[sym] ?? d.price_usd).toLocaleString()}</td>
                    <td style={{ padding: '10px 12px', color: C.text, fontFamily: "'JetBrains Mono', monospace" }}>{d.oi_usd_str}</td>
                    <td style={{ padding: '10px 12px', color: d.oi_change_24h.startsWith('+') ? C.bull : C.bear, fontFamily: "'JetBrains Mono', monospace" }}>{d.oi_change_24h}</td>
                    <td style={{ padding: '10px 12px', color: fval > 0 ? C.bull : C.bear, fontFamily: "'JetBrains Mono', monospace" }}>
                      {d.funding_rate} <span style={{ color: C.dim, fontSize: '10px' }}>({d.funding_rate_predicted})</span>
                    </td>
                    <td style={{ padding: '10px 12px', color: d.cvd_direction === 'positive' ? C.cvdPos : C.cvdNeg, fontFamily: "'JetBrains Mono', monospace", fontWeight: 600 }}>
                      {d.cvd_direction}/{d.cvd_trend}
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
        <SectionTitle>오더플로우 해석</SectionTitle>
        <div style={{ display: 'grid', gridTemplateColumns: isMobile ? '1fr' : 'repeat(2, 1fr)', gap: '12px' }}>
          {ORDERFLOW_INSIGHTS.map(it => (
            <Card key={it.sym} style={{ borderLeft: `3px solid ${it.color}` }}>
              <div style={{ fontWeight: 700, fontSize: '13px', color: it.color, marginBottom: '6px' }}>{it.title}</div>
              <div style={{ fontSize: '12px', color: C.sub, lineHeight: '1.6' }}>{it.body}</div>
            </Card>
          ))}
        </div>
      </div>
    );
  }

  // ─── TAB: SCENARIOS ───────────────────────────────────────────────────────────
  function ScenariosTab({ pairs, isMobile }) {
    const keyColor = { bull: C.bull, bear: C.bear, neutral: C.neutral };
    const keyLabel = { bull: '강세', bear: '약세', neutral: '중립' };
    return (
      <div>
        {pairs.map(p => (
          <div key={p.symbol} style={{ marginBottom: '24px' }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: '10px', marginBottom: '10px' }}>
              <div style={{ fontFamily: 'Inter', fontWeight: 800, fontSize: '15px', color: C.text }}>{p.short}</div>
              <Badge color={biasColor(p.bias)}>{p.biasLabel}</Badge>
              <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: '12px', color: C.sub }}>${p.price.toLocaleString()} · {p.change24h}</div>
            </div>
            <div style={{ display: 'grid', gridTemplateColumns: isMobile ? '1fr' : 'repeat(3, 1fr)', gap: '10px' }}>
              {['bull','bear','neutral'].map(k => {
                const sc = p.scenarios[k];
                return (
                  <Card key={k} style={{ borderLeft: `3px solid ${keyColor[k]}` }}>
                    <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: '10px' }}>
                      <span style={{ color: keyColor[k], fontWeight: 700, fontSize: '12px' }}>{keyLabel[k]}</span>
                      <span style={{ color: keyColor[k], fontWeight: 800, fontFamily: "'JetBrains Mono', monospace", fontSize: '16px' }}>{sc.prob}%</span>
                    </div>
                    <div style={{ fontSize: '12px', fontWeight: 600, color: C.text, marginBottom: '8px' }}>{sc.title}</div>
                    <KVRow label="트리거" value={sc.trigger} />
                    <KVRow label="목표" value={sc.target} valueColor={keyColor[k]} />
                    <KVRow label="무효화" value={sc.invalidate} valueColor={C.bear} />
                  </Card>
                );
              })}
            </div>
          </div>
        ))}
      </div>
    );
  }

  // ─── TAB: RISK ────────────────────────────────────────────────────────────────
  function RiskCard({ p }) {
    return (
      <Card>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '14px' }}>
          <div style={{ fontFamily: 'Inter', fontWeight: 800, fontSize: '14px', color: C.text }}>{p.short}</div>
          <Badge color={biasColor(p.bias)}>{p.biasLabel}</Badge>
        </div>
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '10px' }}>
          {[['long', C.bull, 'LONG'], ['short', C.bear, 'SHORT']].map(([side, color, label]) => (
            <div key={side} style={{ background: color + '08', border: `1px solid ${color}30`, borderRadius: '8px', padding: '12px' }}>
              <div style={{ color, fontWeight: 700, fontSize: '12px', marginBottom: '8px' }}>{label} Setup</div>
              {[['Entry', p.risk[side].entry, C.text], ['SL', p.risk[side].sl, C.bear], ['TP1', p.risk[side].tp1, C.bull], ['TP2', p.risk[side].tp2, C.bull], ['R:R', p.risk[side].rr, C.primary]].map(([l, v, vc]) => (
                <div key={l} style={{ display: 'flex', justifyContent: 'space-between', fontSize: '11px', marginBottom: '3px' }}>
                  <span style={{ color: C.dim }}>{l}</span>
                  <span style={{ color: vc, fontFamily: "'JetBrains Mono', monospace", fontWeight: 600 }}>{v}</span>
                </div>
              ))}
              <div style={{ marginTop: '8px', fontSize: '10px', color: C.dim, lineHeight: '1.4' }}>{p.risk[side].note}</div>
            </div>
          ))}
        </div>
      </Card>
    );
  }
  function RiskTab({ pairs, selectedPair, onSelectPair, isMobile }) {
    if (!isMobile) {
      return <div style={{ display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)', gap: '12px' }}>{pairs.map(p => <RiskCard key={p.symbol} p={p} />)}</div>;
    }
    const pair = pairs.find(p => p.symbol === selectedPair) || pairs[0];
    return (
      <div>
        <div style={{ display: 'flex', gap: '8px', marginBottom: '16px', flexWrap: 'wrap' }}>
          {pairs.map(p => (
            <button key={p.symbol} onClick={() => onSelectPair(p.symbol)} style={{ background: selectedPair === p.symbol ? C.primary + '22' : C.panel, color: selectedPair === p.symbol ? C.primary : C.sub, border: 'none', borderRadius: '6px', padding: '8px 14px', fontSize: '12px', fontWeight: selectedPair === p.symbol ? 700 : 400, cursor: 'pointer' }}>
              {p.short}
            </button>
          ))}
        </div>
        <RiskCard p={pair} />
      </div>
    );
  }

  // ─── DASHBOARD ────────────────────────────────────────────────────────────────
  function Dashboard() {
    const isMobile = useIsMobile();
    const { prices: livePrices, lastUpdated } = useLivePrices(pairs.map(p => p.symbol));
    const livePairs = pairs.map(p => ({ ...p, price: livePrices[p.symbol] ?? p.price }));
    const tabBarRef = React.useRef(null);
    const [activeTab, setActiveTab] = React.useState('Overview');
    const [selectedPair, setSelectedPair] = React.useState('BTCUSDT');

    React.useEffect(() => {
      document.title = `Crypto Futures Analysis — ${ANALYSIS_DATE}`;
    }, []);

    React.useEffect(() => {
      if (!isMobile || !tabBarRef.current) return;
      const btn = tabBarRef.current.querySelector('[data-active="true"]');
      if (btn) btn.scrollIntoView({ inline: 'center', behavior: 'smooth' });
    }, [activeTab, isMobile]);

    const contentPadding = isMobile ? '14px 12px' : '20px 24px';

    let tabContent;
    if (activeTab === 'Overview')   tabContent = <OverviewTab  pairs={livePairs} selectedPair={selectedPair} onSelectPair={setSelectedPair} isMobile={isMobile} />;
    if (activeTab === 'Macro')      tabContent = <MacroTab />;
    if (activeTab === '분석')       tabContent = <AnalysisTab  pairs={livePairs} selectedPair={selectedPair} onSelectPair={setSelectedPair} isMobile={isMobile} />;
    if (activeTab === 'Orderflow')  tabContent = <OrderflowTab pairs={livePairs} isMobile={isMobile} livePrices={livePrices} />;
    if (activeTab === 'Scenarios')  tabContent = <ScenariosTab pairs={livePairs} isMobile={isMobile} />;
    if (activeTab === 'Risk')       tabContent = <RiskTab      pairs={livePairs} selectedPair={selectedPair} onSelectPair={setSelectedPair} isMobile={isMobile} />;

    return (
      <div style={{ minHeight: '100vh', background: C.bg }}>
        {/* HEADER */}
        <div style={{ background: C.panel, borderBottom: `1px solid ${C.border}`, padding: isMobile ? '12px' : '14px 24px', position: 'sticky', top: 0, zIndex: 100 }}>
          {isMobile ? (
            <div style={{ display: 'flex', flexDirection: 'column', gap: '10px' }}>
              <div>
                <div style={{ fontSize: '15px', fontWeight: 700, color: C.text, fontFamily: 'Inter' }}>Crypto Futures Analysis</div>
                <div style={{ fontSize: '11px', color: C.dim, display: 'flex', alignItems: 'center', gap: '6px' }}>
                  <span>{ANALYSIS_DATE} · EW + ICT/SMC + Orderflow</span>
                  {lastUpdated && <span style={{ color: C.bull, fontWeight: 700 }}>● LIVE</span>}
                </div>
              </div>
              <div style={{ display: 'flex', gap: '6px', flexWrap: 'wrap' }}>
                {pairs.map(p => <Badge key={p.symbol} color={biasColor(p.bias)}>{p.short} {p.change24h}</Badge>)}
              </div>
            </div>
          ) : (
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
              <div>
                <div style={{ fontSize: '20px', fontWeight: 700, color: C.text, fontFamily: 'Inter' }}>Crypto Futures Analysis</div>
                <div style={{ fontSize: '12px', color: C.dim, display: 'flex', alignItems: 'center', gap: '8px' }}>
                  <span>{ANALYSIS_DATE} · Elliott Wave + ICT/SMC + Orderflow Integration</span>
                  {lastUpdated && <span style={{ color: C.bull, fontWeight: 700, fontSize: '10px' }}>● LIVE</span>}
                </div>
              </div>
              <div style={{ display: 'flex', gap: '16px' }}>
                {pairs.map(p => (
                  <div key={p.symbol} style={{ textAlign: 'right' }}>
                    <div style={{ fontSize: '10px', color: C.dim }}>{p.short}</div>
                    <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: '13px', fontWeight: 700, color: biasColor(p.bias) }}>{p.change24h}</div>
                    <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: '11px', color: C.sub }}>${p.price.toLocaleString()}</div>
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>

        {/* TAB BAR */}
        <div ref={tabBarRef} style={{ background: C.panel, borderBottom: `1px solid ${C.border}`, display: 'flex', overflowX: 'auto', WebkitOverflowScrolling: 'touch' }}>
          {TABS.map(tab => (
            <button key={tab} data-active={activeTab === tab ? 'true' : 'false'} onClick={() => setActiveTab(tab)} style={{
              background: 'none', border: 'none', cursor: 'pointer',
              padding: isMobile ? '14px 14px' : '12px 20px',
              fontSize: '13px', fontWeight: activeTab === tab ? 700 : 400,
              color: activeTab === tab ? C.primary : C.sub,
              borderBottom: `3px solid ${activeTab === tab ? C.primary : 'transparent'}`,
              whiteSpace: 'nowrap',
            }}>
              {tab}
            </button>
          ))}
        </div>

        {/* CONTENT */}
        <div style={{ padding: contentPadding, maxWidth: '1400px', margin: '0 auto' }}>
          {tabContent}
        </div>

        {/* FOOTER */}
        <div style={{ borderTop: `1px solid ${C.border}`, padding: isMobile ? '12px' : '12px 24px', display: 'flex', flexDirection: isMobile ? 'column' : 'row', justifyContent: 'space-between', gap: isMobile ? '4px' : 0, alignItems: isMobile ? 'flex-start' : 'center', fontSize: '11px', color: C.dim }}>
          <span>분석 기준: {DATA_TIMESTAMP} · Coinalyze / Coinglass / TradingView · EW + ICT/SMC{lastUpdated && ` · 가격 ${lastUpdated.toLocaleTimeString('ko-KR',{timeZone:'Asia/Seoul',hour:'2-digit',minute:'2-digit'})} KST`}</span>
          <span>투자 참고용 · 투자 결과에 대한 책임은 본인에게 있습니다</span>
        </div>
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<Dashboard />);
  </script>
</body>
</html>
