function biasColor(bias) {

  if (bias === 'bear') return C.bear;
  return C.neutral;
}
function ewColor(dir) {
  if (dir === 'long') return C.bull;
  if (dir === 'short') return C.bear;
  return C.neutral;
}
function fmtP(n) {
  if (n == null) return '—';
  if (n >= 1000) return '$' + n.toLocaleString(undefined, { maximumFractionDigits: 0 });
  return '$' + n.toLocaleString(undefined, { maximumFractionDigits: 2 });
}
function importanceBorder(imp) {
  if (imp === 'high') return C.bear;
  if (imp === 'medium') return C.neutral;
  return C.sub;
}
function kstLabel(iso) {
  try {
    const d = new Date(iso);
    return d.toLocaleString('ko-KR', { timeZone: 'Asia/Seoul', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit', hour12: false });
  } catch { return iso; }
}
function fmtFunding(v) {
  const n = parseFloat(v);
  return isNaN(n) ? v : (n >= 0 ? '+' : '') + n.toFixed(4) + '%';
}

// ─── STRATEGY UTILS ───────────────────────────────────────────────────────────
function asNumber(value) {
  if (typeof value === 'number' && Number.isFinite(value)) return value;
  if (typeof value === 'string' && value.trim() !== '') {
    const parsed = Number(value);
    return Number.isFinite(parsed) ? parsed : null;
  }
  return null;
}
function dedupeLevels(levels) {
  return [...new Set((levels || []).map(asNumber).filter(v => v != null))].sort((a, b) => a - b);
}
function pickNearest(levels, predicate, sortFn) {
  const filtered = dedupeLevels(levels).filter(predicate || (() => true));
  if (filtered.length === 0) return null;
  return [...filtered].sort(sortFn || ((a, b) => a - b))[0];
}
function formatStrategyPrice(value) {
  const n = asNumber(value);
  return n != null ? `$${n.toLocaleString(undefined, { maximumFractionDigits: 2 })}` : '—';
}
function sortScenariosByProbability(pair) {
  const order = ['bull', 'bear', 'neutral'];
  return order
    .map(key => ({ key, ...(pair.scenarios?.[key] || {}) }))
    .sort((l, r) => {
      const lp = asNumber(l.prob) ?? -Infinity;
      const rp = asNumber(r.prob) ?? -Infinity;
      if (rp !== lp) return rp - lp;
      return order.indexOf(l.key) - order.indexOf(r.key);
    });
}
function collectStrategyLevels(pair) {
  const price = asNumber(pair.price);
  const levels4H = pair.levels?.['4H'] || {};
  const ict4H = pair.ict?.['4H'] || {};
  const ew4H = pair.ew?.['4H'] || {};
  const support = dedupeLevels([...(levels4H.ssl || []), ...(levels4H.swing_lows || [])]);
  const resistance = dedupeLevels([...(levels4H.bsl || []), ...(levels4H.swing_highs || [])]);
  const poi = asNumber(ict4H.poi_level);
  const poiAsBull = poi != null && price != null ? poi <= price * 1.01 : poi != null;
  const poiAsBear = poi != null && price != null ? poi > price : poi != null;
  const longEntries = dedupeLevels([...support, ...(poiAsBull ? [poi] : [])]);
  const shortEntries = dedupeLevels([...resistance, ...(poiAsBear ? [poi] : [])]);
  const longTargets = dedupeLevels([...resistance.filter(v => price == null || v > price), ew4H.target]);
  const shortTargets = dedupeLevels([...support.filter(v => price == null || v < price)]);
  const longStops = dedupeLevels([...support, ...(poi != null ? [poi] : [])]);
  const shortStops = dedupeLevels([...resistance, ...(poi != null ? [poi] : [])]);
  return { price, support, resistance, longEntries, shortEntries, longTargets, shortTargets, longStops, shortStops };
}
function buildStrategyRecommendation(pair, rankedScenario, variant) {
  const { price, support, resistance, longEntries, shortEntries, longTargets, shortTargets, longStops, shortStops } = collectStrategyLevels(pair);
  const scenarioKey = rankedScenario?.key || 'neutral';
  const prob = asNumber(rankedScenario?.prob) ?? 0;
  const confluence = Array.isArray(pair.confluence) ? pair.confluence.slice(0, 2).join(' + ') : '';
  const label = variant || 'Primary';
  const nearestSupport = pickNearest(support, v => price == null || v < price, (a, b) => Math.abs(a - price) - Math.abs(b - price));
  const nearestResistance = pickNearest(resistance, v => price == null || v > price, (a, b) => Math.abs(a - price) - Math.abs(b - price));
  const nearRes = price != null && nearestResistance != null ? Math.abs(nearestResistance - price) / price <= 0.01 : false;
  const nearSup = price != null && nearestSupport != null ? Math.abs(price - nearestSupport) / price <= 0.01 : false;
  if (scenarioKey === 'neutral') {
    return { label, scenarioKey, prob, action: 'Wait', entry: null, tp: null, sl: null, rationale: `${rankedScenario?.title || 'Neutral bias'} — 방향성 확인 후 진입.` };
  }
  if (scenarioKey === 'bull') {
    const entry = pickNearest(longEntries, v => price == null || v <= price * 1.02, (a, b) => price == null ? a - b : Math.abs(a - price) - Math.abs(b - price));
    const tp = pickNearest(longTargets, v => price == null || v > price, (a, b) => a - b);
    const sl = entry != null ? pickNearest(longStops, v => v < entry, (a, b) => b - a) : null;
    if (entry == null || tp == null || sl == null) return { label, scenarioKey, prob, action: 'Wait', entry: null, tp: null, sl: null, rationale: '강세 방향이나 구조적 레벨 불완전.' };
    return { label, scenarioKey, prob, action: nearRes ? 'Breakout Long' : 'Pullback Long', entry, tp, sl, rationale: `Bull ${prob}% + ${pair.biasLabel} bias.` };
  }
  const entry = pickNearest(shortEntries, v => price == null || v >= price * 0.98, (a, b) => price == null ? a - b : Math.abs(a - price) - Math.abs(b - price));
  const tp = pickNearest(shortTargets, v => price == null || v < price, (a, b) => b - a);
  const sl = entry != null ? pickNearest(shortStops, v => v > entry, (a, b) => a - b) : null;
  if (entry == null || tp == null || sl == null) return { label, scenarioKey: 'bear', prob, action: 'Wait', entry: null, tp: null, sl: null, rationale: '약세 방향이나 구조적 레벨 불완전.' };
  return { label, scenarioKey: 'bear', prob, action: nearSup ? 'Breakdown Short' : 'Rejection Short', entry, tp, sl, rationale: `Bear ${prob}% + ${pair.biasLabel} bias.` };
}

function StrategyBlock({ title, strategy, muted }) {
  const tone = strategyTone(strategy);
  const rr = (strategy.entry && strategy.tp && strategy.sl) ? Math.abs((strategy.tp - strategy.entry) / (strategy.entry - strategy.sl)).toFixed(1) : null;
  return (
    <div style={{ background: muted ? C.bg : tone.bg, border: `1px solid ${muted ? C.border : tone.border}`, borderRadius: '8px', padding: '10px', marginBottom: '8px' }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: '8px' }}>
        <span style={{ color: muted ? C.sub : tone.color, fontSize: '11px', fontWeight: 700 }}>{title}</span>
        <span style={{ color: muted ? C.sub : tone.color, fontSize: '11px', fontWeight: 700 }}>{strategy.prob}%</span>
      </div>
      <StrategyKVRow label="Action" value={strategy.action} />
      <StrategyKVRow label="Entry" value={formatStrategyPrice(strategy.entry)} />
      <StrategyKVRow label="TP" value={formatStrategyPrice(strategy.tp)} />
      <StrategyKVRow label="SL" value={formatStrategyPrice(strategy.sl)} />
      {rr && <StrategyKVRow label="R:R" value={`1:${rr}`} />}
      <div style={{ marginTop: '8px', fontSize: '10px', color: C.sub, lineHeight: '1.5' }}>{strategy.rationale}</div>
    </div>
  );
}
function OverviewStrategyCard({ pair }) {
  const ranked = sortScenariosByProbability(pair);
  const primary = buildStrategyRecommendation(pair, ranked[0], 'Primary');

    </div>
  );
}

function RiskCard({ p }) {
  const r = p.risk || {};
  return (
    <Card>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '14px' }}>
        <div style={{ fontSize: '14px', fontWeight: 800, color: C.text, fontFamily: 'Poppins, sans-serif' }}>{p.short}</div>
        <Badge color={biasColor(p.bias)}>{p.biasLabel}</Badge>
      </div>
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '10px', marginBottom: '12px' }}>
        <div style={{ background: C.bull + '10', border: `1px solid ${C.bull}33`, borderRadius: '8px', padding: '10px' }}>
          <div style={{ fontSize: '11px', fontWeight: 700, color: C.bull, marginBottom: '6px' }}>LONG 세업</div>
          <KVRow label="Entry" value={r.long?.entry ? fmtP(r.long.entry) : '—'} />
          <KVRow label="SL" value={r.long?.sl ? fmtP(r.long.sl) : '—'} valueColor={C.bear} />
          <KVRow label="TP" value={r.long?.tp ? fmtP(r.long.tp) : '—'} valueColor={C.bull} />
          <KVRow label="R:R" value={r.long?.rr ? `1:${r.long.rr}` : '—'} valueColor={C.neutral} />
        </div>
        <div style={{ background: C.bear + '10', border: `1px solid ${C.bear}33`, borderRadius: '8px', padding: '10px' }}>
          <div style={{ fontSize: '11px', fontWeight: 700, color: C.bear, marginBottom: '6px' }}>SHORT 세업</div>
          <KVRow label="Entry" value={r.short?.entry ? fmtP(r.short.entry) : '—'} />
          <KVRow label="SL" value={r.short?.sl ? fmtP(r.short.sl) : '—'} valueColor={C.bear} />
          <KVRow label="TP" value={r.short?.tp ? fmtP(r.short.tp) : '—'} valueColor={C.bull} />
          <KVRow label="R:R" value={r.short?.rr ? `1:${r.short.rr}` : '—'} valueColor={C.neutral} />
        </div>
      </div>
      {r.noEntryZone && (
        <div style={{ background: C.bear + '10', border: `1px solid ${C.bear}33`, borderRadius: '6px', padding: '8px', fontSize: '11px', color: C.bear }}>
          ⛔ {r.noEntryZone}
        </div>
      )}
    </Card>
  );
}

function RiskTab({ pairs, selectedPair, onSelectPair, isMobile }) {
  if (!isMobile) {
    return (
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)', gap: '12px' }}>
        {pairs.map(p => <RiskCard key={p.symbol} p={p} />)}
      </div>
    );
  }
  const pair = pairs.find(p => p.symbol === selectedPair) || pairs[0];
  return (
    <div>
      <div style={{ display: 'flex', gap: '8px', marginBottom: '16px', flexWrap: 'wrap' }}>
        {pairs.map(p => (
          <button key={p.symbol} onClick={() => onSelectPair(p.symbol)} style={{ background: selectedPair === p.symbol ? biasColor(p.bias) + '22' : C.card, color: selectedPair === p.symbol ? biasColor(p.bias) : C.sub, border: `1px solid ${selectedPair === p.symbol ? biasColor(p.bias) + '66' : C.border}`, borderRadius: '6px', padding: '8px 14px', fontSize: '12px', fontWeight: selectedPair === p.symbol ? 700 : 400, cursor: 'pointer' }}>{p.short}</button>
        ))}
      </div>
      <RiskCard p={pair} />
    </div>
  );
}

// ─── MOBILE HOOK ──────────────────────────────────────────────────────────────
function useIsMobile() {
  const [m, setM] = React.useState(() => window.matchMedia('(max-width: 767px)').matches);
  React.useEffect(() => {
    const mql = window.matchMedia('(max-width: 767px)');
    const h = e => setM(e.matches);
    mql.addEventListener('change', h);
    return () => mql.removeEventListener('change', h);
  }, []);
  return m;
}

// ─── DASHBOARD ───────────────────────────────────────────────────────────────
function Dashboard() {
  const isMobile = useIsMobile();
  const tabBarRef = React.useRef(null);
  const [activeTab, setActiveTab] = React.useState('Overview');
  const [selectedPair, setSelectedPair] = React.useState('BTCUSDT');

  React.useEffect(() => {
    if (!isMobile || !tabBarRef.current) return;
    const activeBtn = tabBarRef.current.querySelector('[data-active="true"]');
    if (activeBtn) activeBtn.scrollIntoView({ inline: 'center', behavior: 'smooth' });
  }, [activeTab, isMobile]);

  const tabs = ['Overview', 'Macro', '분석', 'Orderflow', 'Scenarios', 'Risk'];
  const contentPadding = isMobile ? '14px 12px' : '20px 24px';
  const headerPadding = isMobile ? '12px' : '14px 24px';

  const highEvents = MACRO_EVENTS.filter(e => e.importance === 'high');

  let tabContent;
  if (activeTab === 'Overview') {
    tabContent = <OverviewTab pairs={PAIRS} selectedPair={selectedPair} onSelectPair={setSelectedPair} isMobile={isMobile} />;
  } else if (activeTab === 'Macro') {
    tabContent = <MacroTab isMobile={isMobile} />;
  } else if (activeTab === '분석') {
    tabContent = <AnalysisTab pairs={PAIRS} selectedPair={selectedPair} onSelectPair={setSelectedPair} isMobile={isMobile} />;
  } else if (activeTab === 'Orderflow') {
    tabContent = <OrderflowTab pairs={PAIRS} isMobile={isMobile} />;
  } else if (activeTab === 'Scenarios') {
    tabContent = <ScenariosTab pairs={PAIRS} isMobile={isMobile} />;
  } else if (activeTab === 'Risk') {
    tabContent = <RiskTab pairs={PAIRS} selectedPair={selectedPair} onSelectPair={setSelectedPair} isMobile={isMobile} />;
  }

  return (
    <div style={{ minHeight: '100vh', background: C.bg }}>
      {/* Header */}
      <div style={{ background: C.panel, borderBottom: `1px solid ${C.border}`, padding: headerPadding }}>
        {isMobile ? (
          <div style={{ display: 'flex', flexDirection: 'column', gap: '10px' }}>
            <div>
              <div style={{ fontSize: '16px', fontWeight: 700, color: C.text, fontFamily: 'Poppins, sans-serif', marginBottom: '2px' }}>Crypto Futures Analysis</div>
              <div style={{ fontSize: '11px', color: C.dim }}>2026-05-01 · EW + ICT/SMC + Orderflow</div>
            </div>
            <div style={{ display: 'flex', gap: '6px', flexWrap: 'wrap' }}>
              {PAIRS.map(p => <Badge key={p.symbol} color={biasColor(p.bias)}>{p.short} {p.biasLabel}</Badge>)}
              {highEvents.length > 0 && <Badge color={C.bear}>⚠️ High-Impact Events: {highEvents.length}</Badge>}
            </div>
          </div>
        ) : (
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
            <div>
              <div style={{ fontSize: '18px', fontWeight: 700, color: C.text, fontFamily: 'Poppins, sans-serif' }}>Crypto Futures Analysis</div>
              <div style={{ fontSize: '12px', color: C.dim, marginTop: '2px' }}>2026-05-01 · EW + ICT/SMC + Orderflow · Data: 2026-04-30T23:00Z</div>
            </div>
            <div style={{ display: 'flex', gap: '8px', alignItems: 'center', flexWrap: 'wrap' }}>
              {PAIRS.map(p => <Badge key={p.symbol} color={biasColor(p.bias)}>{p.short} {p.biasLabel}</Badge>)}
              {highEvents.length > 0 && <Badge color={C.bear}>⚠️ High-Impact ×{highEvents.length}</Badge>}
            </div>
          </div>
        )}
      </div>

      {/* Tab Bar */}
      <div ref={tabBarRef} style={{ background: C.panel, borderBottom: `1px solid ${C.border}`, display: 'flex', overflowX: 'auto', WebkitOverflowScrolling: 'touch' }}>
        {tabs.map(tab => (
          <button key={tab} data-active={activeTab === tab ? 'true' : 'false'} onClick={() => setActiveTab(tab)} style={{ background: 'transparent', border: 'none', borderBottom: activeTab === tab ? `2px solid ${C.primary}` : '2px solid transparent', color: activeTab === tab ? C.primary : C.sub, padding: isMobile ? '14px 14px' : '12px 20px', fontSize: '13px', fontWeight: activeTab === tab ? 700 : 400, cursor: 'pointer', whiteSpace: 'nowrap', transition: 'color 0.15s' }}>{tab}</button>
        ))}
      </div>

      {/* Content */}
      <div style={{ padding: contentPadding, maxWidth: '1400px', margin: '0 auto' }}>
        {/* High-impact event warning banner */}
        {highEvents.length > 0 && (
          <div style={{ background: C.bear + '10', border: `1px solid ${C.bear}33`, borderRadius: '8px', padding: '10px 14px', marginBottom: '16px', fontSize: '12px', color: C.bear, display: 'flex', gap: '10px', alignItems: 'flex-start' }}>
            <span>⚠️</span>
            <div>
              <div style={{ fontWeight: 700, marginBottom: '2px' }}>HIGH-IMPACT EVENTS 활성화</div>
              {highEvents.map(e => <div key={e.id} style={{ color: C.sub, fontSize: '11px' }}>{kstLabel(e.time_kst)} KST — {e.title}</div>)}
            </div>
          </div>
        )}
        {tabContent}
      </div>

      {/* Footer */}
      <div style={{ background: C.panel, borderTop: `1px solid ${C.border}`, padding: '12px 24px', marginTop: '20px' }}>
        <div style={{ display: 'flex', flexDirection: isMobile ? 'column' : 'row', justifyContent: 'space-between', gap: isMobile ? '6px' : '0', alignItems: isMobile ? 'flex-start' : 'center', fontSize: '11px', color: C.dim }}>
          <span>데이터 기준: 2026-04-30T23:00 UTC · Binance OHLCV · Coinalyze API · Investing.com</span>
          <span>투자 참고용 — 손실 책임은 본인에게 있습니다</span>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Dashboard />);
</script>
</body>
</html>
