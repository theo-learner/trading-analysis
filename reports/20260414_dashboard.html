// ─── Utilities ────────────────────────────────────────────────────────────────
function rsiColor(v) {
  if (v >= 70) return "#f87171";
  if (v >= 55) return "#4ade80";
  if (v >= 45) return "#e8eaed";
  if (v >= 30) return "#fbbf24";
  return "#fb923c";
}

function importanceColor(imp) {
  if (imp === "high") return "#f87171";
  if (imp === "medium") return "#fbbf24";
  return "#9ca3af";
}

function fmt(n, decimals = 0) {
  if (n >= 1000) return n.toLocaleString("en-US", { maximumFractionDigits: decimals });
  return Number(n).toFixed(decimals > 0 ? decimals : (n < 10 ? 3 : n < 100 ? 2 : 1));
}

// ─── useIsMobile ──────────────────────────────────────────────────────────────
function useIsMobile() {
  const [isMobile, setIsMobile] = React.useState(
    () => window.matchMedia("(max-width: 767px)").matches
  );
  React.useEffect(() => {
    const mq = window.matchMedia("(max-width: 767px)");
    const handler = (e) => setIsMobile(e.matches);
    mq.addEventListener("change", handler);
    return () => mq.removeEventListener("change", handler);
  }, []);
  return isMobile;
}

// ─── Base Components ──────────────────────────────────────────────────────────
function Card({ children, style = {} }) {
  return (
    <div style={{ background: "#1a1f2e", borderRadius: 10, padding: 16, ...style }}>
      {children}
    </div>
  );
}

function SectionTitle({ children }) {
  return (
    <div style={{ fontSize: 11, fontWeight: 700, color: "#9ca3af", textTransform: "uppercase",
      letterSpacing: "0.08em", marginBottom: 10 }}>
      {children}
    </div>
  );
}

function KVRow({ k, v, vColor }) {
  return (
    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center",
      padding: "5px 0", borderBottom: "1px solid #1e2535" }}>
      <span style={{ fontSize: 12, color: "#9ca3af" }}>{k}</span>
      <span style={{ fontSize: 12, fontWeight: 600, color: vColor || "#e8eaed" }}>{v}</span>
    </div>
  );
}

function Badge({ label, color }) {
  return (
    <span style={{ background: color + "22", color, border: `1px solid ${color}44`,
      borderRadius: 4, padding: "2px 8px", fontSize: 11, fontWeight: 600 }}>

}

                  <KVRow k="TP2" v={p.risk.long.tp2} vColor="#4ade80" />
                  <KVRow k="R:R" v={p.risk.long.rr} vColor="#22d3ee" />
                </div>
                <div style={{ background: "#1a0f0f", borderRadius: 8, padding: 12 }}>
                  <div style={{ fontSize: 11, fontWeight: 700, color: "#f87171", marginBottom: 8 }}>▼ SHORT 셋업</div>
                  <KVRow k="진입" v={p.risk.short.entry} vColor="#e8eaed" />
                  <KVRow k="SL" v={p.risk.short.sl} vColor="#f87171" />
                  <KVRow k="TP1" v={p.risk.short.tp1} vColor="#4ade80" />
                  <KVRow k="TP2" v={p.risk.short.tp2 || "–"} vColor="#4ade80" />
                  <KVRow k="R:R" v={p.risk.short.rr} vColor="#22d3ee" />
                </div>
              </div>
              <div style={{ background: "#1a1208", borderRadius: 6, padding: 10, marginBottom: 8 }}>
                <div style={{ fontSize: 10, color: "#fbbf24", fontWeight: 700, marginBottom: 4 }}>⛔ 진입 금지 구간</div>
                <div style={{ fontSize: 12, color: "#9ca3af" }}>{p.risk.forbidden}</div>
              </div>
              <div style={{ fontSize: 12, color: "#9ca3af", lineHeight: 1.6 }}>{p.risk.notes}</div>
            </div>
          )}
        </div>
      ))}
    </div>
  );
}

// ─── Dashboard ────────────────────────────────────────────────────────────────
function Dashboard() {
  const isMobile = useIsMobile();
  const [activeTab, setActiveTab] = React.useState("Overview");
  const tabBarRef = React.useRef(null);

  const TABS = ["Overview", "Macro", "Elliott Wave", "ICT", "Orderflow", "Scenarios", "Risk"];

  React.useEffect(() => {
    if (tabBarRef.current) {
      const btn = tabBarRef.current.querySelector(`[data-tab="${activeTab}"]`);
      if (btn) btn.scrollIntoView({ inline: "center", behavior: "smooth" });
    }
  }, [activeTab]);

  let tabContent;
  if (activeTab === "Overview") {
    tabContent = <OverviewTab pairs={PAIRS_DATA} isMobile={isMobile} />;
  } else if (activeTab === "Macro") {
    tabContent = <MacroTab events={MACRO_EVENTS} isMobile={isMobile} />;
  } else if (activeTab === "Elliott Wave") {
    tabContent = <EWTab pairs={PAIRS_DATA} isMobile={isMobile} />;
  } else if (activeTab === "ICT") {
    tabContent = <ICTTab pairs={PAIRS_DATA} isMobile={isMobile} />;
  } else if (activeTab === "Orderflow") {
    tabContent = <OrderflowTab isMobile={isMobile} />;
  } else if (activeTab === "Scenarios") {
    tabContent = <ScenariosTab pairs={PAIRS_DATA} isMobile={isMobile} />;
  } else if (activeTab === "Risk") {
    tabContent = <RiskTab pairs={PAIRS_DATA} isMobile={isMobile} />;
  }

  const mktBias = { label: "중립-약세", color: "#fbbf24" };

  return (
    <div style={{ minHeight: "100vh", background: "#0b0e14" }}>
      {/* Header */}
      <div style={{ background: "#131720", borderBottom: "1px solid #1e2535", padding: isMobile ? "12px 16px" : "14px 24px" }}>
        <div style={{ display: "flex", flexDirection: isMobile ? "column" : "row",
          justifyContent: "space-between", alignItems: isMobile ? "flex-start" : "center", gap: 8 }}>
          <div>
            <div style={{ fontSize: isMobile ? 16 : 20, fontWeight: 800, color: "#e8eaed" }}>
              Trading Analysis Dashboard
            </div>
            <div style={{ fontSize: 12, color: "#9ca3af" }}>{ANALYSIS_DATE} · BTC ETH SOL HYPE</div>
          </div>
          <div style={{ display: "flex", flexWrap: "wrap", gap: 8, alignItems: "center" }}>
            <Badge label={`시장 바이어스: ${mktBias.label}`} color={mktBias.color} />
            {PAIRS_DATA.map(p => (
              <Badge key={p.short}
                label={`${p.short} $${fmt(p.price)} ${p.change24h >= 0 ? "+" : ""}${p.change24h.toFixed(2)}%`}
                color={p.change24h >= 0 ? "#4ade80" : "#f87171"} />
            ))}
          </div>
        </div>
      </div>

      {/* Tab Bar */}
      <div ref={tabBarRef} style={{ background: "#131720", borderBottom: "1px solid #1e2535",
        display: "flex", overflowX: "auto", scrollbarWidth: "none" }}>
        {TABS.map(tab => (
          <button key={tab} data-tab={tab} onClick={() => setActiveTab(tab)}
            style={{
              padding: isMobile ? "14px 14px" : "12px 16px",
              fontSize: 13, fontWeight: activeTab === tab ? 700 : 400,
              color: activeTab === tab ? "#e8eaed" : "#9ca3af",
              background: "none", border: "none", cursor: "pointer", whiteSpace: "nowrap",
              borderBottom: activeTab === tab ? "2px solid #4ade80" : "2px solid transparent",
              transition: "color 0.15s"
            }}>
            {tab}
          </button>
        ))}
      </div>

      {/* Content */}
      <div style={{ padding: isMobile ? 12 : 20 }}>
        {tabContent}
      </div>

      {/* Footer */}
      <div style={{ borderTop: "1px solid #1e2535", padding: "12px 24px", textAlign: "center",
        fontSize: 11, color: "#6b7280" }}>
        Generated {ANALYSIS_DATE} · Elliott Wave + ICT/SMC + Orderflow · For educational purposes only
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<Dashboard />);
</script>
</body>
</html>
