function useIsMobile() {
  const [m, setM] = React.useState(() => window.matchMedia('(max-width: 767px)').matches);
  React.useEffect(() => {
    const mql = window.matchMedia('(max-width: 767px)');
    const h = e => setM(e.matches);
    mql.addEventListener('change', h);
    return () => mql.removeEventListener('change', h);
  }, []);
  return m;
}

function Badge({ color, children }) {
  return <span style={{ background: color + '22', color, border: `1px solid ${color}44`, borderRadius: '4px', padding: '2px 8px', fontSize: '11px', fontWeight: 600 }}>{children}</span>;
}

function Card({ children, style }) {
  return <div style={{ background: C.card, borderRadius: '8px', padding: '16px', border: `1px solid ${C.border}`, ...style }}>{children}</div>;
}

function SectionTitle({ children }) {
  return <div style={{ fontSize: '11px', fontWeight: 700, color: C.dim, textTransform: 'uppercase', letterSpacing: '0.08em', marginBottom: '10px' }}>{children}</div>;
}

function TrendBadge({ value }) {
  const v = parseFloat(value);
  const color = v > 0 ? C.bull : v < 0 ? C.bear : C.neutral;
  return <span style={{ color, fontWeight: 700 }}>{value}</span>;
}

    { id: 'macro', label: 'Macro' },
    { id: 'ew', label: 'Elliott Wave' },
    { id: 'ict', label: 'ICT/SMC' },
    { id: 'orderflow', label: 'Orderflow' },
    { id: 'scenarios', label: 'Scenarios' },
    { id: 'risk', label: 'Risk' }
  ];

  let tabContent;
  if (activeTab === 'overview') tabContent = <OverviewTab isMobile={isMobile} />;
  else if (activeTab === 'macro') tabContent = <MacroTab isMobile={isMobile} />;
  else if (activeTab === 'ew') tabContent = <EWTab isMobile={isMobile} />;
  else if (activeTab === 'ict') tabContent = <ICTTab isMobile={isMobile} />;
  else if (activeTab === 'orderflow') tabContent = <OrderflowTab isMobile={isMobile} />;
  else if (activeTab === 'scenarios') tabContent = <ScenariosTab isMobile={isMobile} />;
  else if (activeTab === 'risk') tabContent = <RiskTab isMobile={isMobile} />;

  return (
    <div style={{ minHeight: '100vh', background: C.bg }}>
      {/* Header */}
      <div style={{ background: C.panel, borderBottom: `1px solid ${C.border}`, padding: isMobile ? '12px' : '14px 24px' }}>
        {isMobile ? (
          <div style={{ display: 'flex', flexDirection: 'column', gap: '8px' }}>
            <div>
              <div style={{ fontSize: '16px', fontWeight: 700, color: C.text }}>Crypto Futures Analysis</div>
              <div style={{ fontSize: '11px', color: C.dim }}>2026-04-14 · EW + ICT/SMC + Orderflow</div>
            </div>
            <div style={{ display: 'flex', gap: '6px', flexWrap: 'wrap' }}>
              <Badge color={C.bull}>BTC +4.99%</Badge>
              <Badge color={C.bull}>ETH +8.21%</Badge>
              <Badge color={C.bull}>SOL +4.96%</Badge>
              <Badge color={C.bull}>HYPE +9.14%</Badge>
            </div>
          </div>
        ) : (
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
            <div>
              <div style={{ fontSize: '18px', fontWeight: 700, color: C.text }}>Crypto Futures Analysis</div>
              <div style={{ fontSize: '12px', color: C.dim }}>2026-04-14 · Elliott Wave + ICT/SMC + Orderflow</div>
            </div>
            <div style={{ display: 'flex', gap: '8px', alignItems: 'center' }}>
              <Badge color={C.bull}>BTC +4.99%</Badge>
              <Badge color={C.bull}>ETH +8.21%</Badge>
              <Badge color={C.bull}>SOL +4.96%</Badge>
              <Badge color={C.bull}>HYPE +9.14%</Badge>
            </div>
          </div>
        )}
      </div>

      {/* Tab Bar */}
      <div ref={tabBarRef} style={{ background: C.panel, borderBottom: `1px solid ${C.border}`, display: 'flex', overflowX: 'auto', scrollbarWidth: 'none' }}>
        {tabs.map(tab => (
          <button
            key={tab.id}
            data-active={activeTab === tab.id ? 'true' : 'false'}
            onClick={() => setActiveTab(tab.id)}
            style={{
              background: 'none', border: 'none', cursor: 'pointer', whiteSpace: 'nowrap',
              padding: isMobile ? '14px 14px' : '12px 16px',
              fontSize: isMobile ? '13px' : '13px',
              fontWeight: activeTab === tab.id ? 600 : 400,
              color: activeTab === tab.id ? C.tabActive : C.sub,
              borderBottom: activeTab === tab.id ? `2px solid ${C.tabActive}` : '2px solid transparent'
            }}
          >
            {tab.label}
          </button>
        ))}
      </div>

      {/* Content */}
      <div style={{ padding: isMobile ? '14px 12px' : '20px 24px', maxWidth: '1400px', margin: '0 auto' }}>
        {tabContent}
      </div>

      {/* Footer */}
      <div style={{ padding: isMobile ? '12px' : '12px 24px', borderTop: `1px solid ${C.border}`, display: 'flex', flexDirection: isMobile ? 'column' : 'row', justifyContent: 'space-between', gap: isMobile ? '4px' : '0', alignItems: isMobile ? 'flex-start' : 'center', fontSize: '11px', color: C.dim }}>
        <span>데이터 기준: 2026-04-14 05:23 UTC · Coinalyze API + TradingView + Binance</span>
        <span>투자 참고용 · 본 분석은 투자 조언이 아닙니다</span>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Dashboard />);
</script>
</body>
</html>
