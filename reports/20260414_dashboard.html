};

  monetary_policy: '#a78bfa',
  macro_data: '#22d3ee',

};
const NUM_FMT = v => v >= 1000 ? v.toLocaleString() : v < 1 ? v.toFixed(4) : v.toFixed(2);

// ── useIsMobile ───────────────────────────────────────────────────────────────
function useIsMobile() {
  const [m, setM] = React.useState(() => window.matchMedia('(max-width: 767px)').matches);
  React.useEffect(() => {
    const mql = window.matchMedia('(max-width: 767px)');
    const h = e => setM(e.matches);
    mql.addEventListener('change', h);
    return () => mql.removeEventListener('change', h);
  }, []);
  return m;
}

// ── Card ──────────────────────────────────────────────────────────────────────
function Card({ children, style = {} }) {
  return (
    <div style={{
      background: '#1a1f2e', borderRadius: '10px',
      padding: '14px 16px', ...style
    }}>
      {children}
    </div>
  );
}

function SectionTitle({ children }) {
  return (
    <div style={{ fontSize: '11px', fontWeight: 700, color: '#6b7280', textTransform: 'uppercase', letterSpacing: '0.08em', marginBottom: '8px' }}>
      {children}
    </div>
  );
}

function Badge({ children, color = '#9ca3af', bg }) {
  return (
    <span style={{
      display: 'inline-block', padding: '2px 7px', borderRadius: '4px', fontSize: '11px',
      fontWeight: 600, color: color,
      background: bg || (color + '1a'),
      border: '1px solid ' + color + '55',
    }}>
      {children}
    </span>
  );
}

// ── Dashboard ─────────────────────────────────────────────────────────────────
const TABS = ['Overview', 'Macro', 'Elliott Wave', 'ICT', 'Orderflow', 'Scenarios', 'Risk'];

function useIsMobile() {
  const [m, setM] = React.useState(() => window.matchMedia('(max-width: 767px)').matches);
  React.useEffect(() => {
    const mql = window.matchMedia('(max-width: 767px)');
    const h = e => setM(e.matches);
    mql.addEventListener('change', h);
    return () => mql.removeEventListener('change', h);
  }, []);
  return m;
}

  const isMobile = useIsMobile();
  const [activeTab, setActiveTab] = React.useState('Overview');
  const tabBarRef = React.useRef(null);

  React.useEffect(() => {
    if (!isMobile || !tabBarRef.current) return;
    const activeBtn = tabBarRef.current.querySelector('[data-active="true"]');
    if (activeBtn) activeBtn.scrollIntoView({ inline: 'center', behavior: 'smooth' });
  }, [activeTab, isMobile]);

  const contentPadding = isMobile ? '14px 12px' : '20px 24px';
  const headerPadding = isMobile ? '12px' : '14px 24px';

  // Tab content
  let tabContent;
  if (activeTab === 'Overview') tabContent = <OverviewTab pairs={PAIRS_DATA} isMobile={isMobile} />;
  else if (activeTab === 'Macro') tabContent = <MacroTab isMobile={isMobile} />;

  else if (activeTab === 'ICT') tabContent = <ICTTab pairs={PAIRS_DATA} isMobile={isMobile} />;
  else if (activeTab === 'Orderflow') tabContent = <OrderflowTab pairs={PAIRS_DATA} isMobile={isMobile} />;
  else if (activeTab === 'Scenarios') tabContent = <ScenariosTab pairs={PAIRS_DATA} isMobile={isMobile} />;
  else if (activeTab === 'Risk') tabContent = <RiskTab pairs={PAIRS_DATA} isMobile={isMobile} />;

  return (
    <div style={{ minHeight: '100vh', background: '#0b0e14' }}>
      {/* Header */}
      <div style={{ background: '#131720', borderBottom: '1px solid #1e2a3a', padding: headerPadding }}>
        {isMobile ? (
          <div style={{ display: 'flex', flexDirection: 'column', gap: '10px' }}>
            <div>
              <div style={{ fontSize: '16px', fontWeight: 700, color: '#e8eaed', marginBottom: '2px' }}>Crypto Futures Analysis</div>
              <div style={{ fontSize: '11px', color: '#6b7280' }}>2026-04-14 · EW + ICT/SMC + Orderflow</div>
            </div>
            <div style={{ display: 'flex', gap: '6px', flexWrap: 'wrap' }}>
              {PAIRS_DATA.map(p => (
                <span key={p.symbol} style={{
                  padding: '3px 8px', borderRadius: '5px', fontSize: '12px', fontWeight: 600,

                  {p.short} {p.change24h}

            </div>
          </div>
        ) : (
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
            <div>
              <div style={{ fontSize: '18px', fontWeight: 700, color: '#e8eaed', marginBottom: '2px' }}>Crypto Futures Analysis</div>
              <div style={{ fontSize: '12px', color: '#6b7280' }}>2026-04-14 · Elliott Wave + ICT/SMC + Orderflow</div>
            </div>
            <div style={{ display: 'flex', gap: '8px', flexWrap: 'wrap' }}>
              {PAIRS_DATA.map(p => (
                <div key={p.symbol} style={{ textAlign: 'right' }}>
                  <div style={{ fontSize: '11px', color: '#6b7280' }}>{p.short}</div>

      </div>
    </div>
  );
}
