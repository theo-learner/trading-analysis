// ─── STRATEGY UTILS ───────────────────────────────────────────────────────────
function asNumber(value) {
  if (typeof value === 'number' && Number.isFinite(value)) return value;
  if (typeof value === 'string' && value.trim() !== '') { const p=Number(value); return Number.isFinite(p) ? p : null; }
  return null;
}
function dedupeLevels(levels) {
  return [...new Set((levels||[]).map(asNumber).filter(v=>v!=null))].sort((a,b)=>a-b);
}
function pickNearest(levels, predicate, sortFn) {
  const filtered = dedupeLevels(levels).filter(predicate||(()=>true));
  if (!filtered.length) return null;
  return [...filtered].sort(sortFn||((a,b)=>a-b))[0];
}
function formatStrategyPrice(value) {
  const n = asNumber(value);
  return n!=null ? `$${n.toLocaleString(undefined,{maximumFractionDigits:2})}` : '—';
}
function sortScenariosByProbability(pair) {
  const order = ['bull','bear','neutral'];
  return order.map(key=>({ key, ...(pair.scenarios?.[key]||{}) }))
    .sort((l,r) => { const lp=asNumber(l.prob)??-Infinity, rp=asNumber(r.prob)??-Infinity; return rp!==lp ? rp-lp : order.indexOf(l.key)-order.indexOf(r.key); });
}
function collectStrategyLevels(pair) {
  const price = asNumber(pair.price);
  const l4 = pair.levels?.['4H']||{};
  const i4 = pair.ict?.['4H']||{};
  const e4 = pair.ew?.['4H']||{};
  const support = dedupeLevels([...(l4.ssl||[]),...(l4.swing_lows||[])]);
  const resistance = dedupeLevels([...(l4.bsl||[]),...(l4.swing_highs||[])]);
  const poi = asNumber(i4.poi_level);
  const poiBC = poi!=null && price!=null ? poi<=price*1.01 : poi!=null;
  const poiBear = poi!=null && price!=null ? poi>price : poi!=null;
  const longEntries = dedupeLevels([...support,...(poiBC?[poi]:[])]);
  const shortEntries = dedupeLevels([...resistance,...(poiBear?[poi]:[])]);
  const longTargets = dedupeLevels([...resistance.filter(v=>price==null||v>price), e4.target]);
  const shortTargets = dedupeLevels([...support.filter(v=>price==null||v<price)]);
  const longStops = dedupeLevels([...support,...(poi!=null?[poi]:[])]);
  const shortStops = dedupeLevels([...resistance,...(poi!=null?[poi]:[])]);
  return { price, support, resistance, longEntries, shortEntries, longTargets, shortTargets, longStops, shortStops };
}
function buildStrategyRecommendation(pair, rankedScenario, variant) {
  const { price, support, resistance, longEntries, shortEntries, longTargets, shortTargets, longStops, shortStops } = collectStrategyLevels(pair);
  const scenarioKey = rankedScenario?.key||'neutral';
  const prob = asNumber(rankedScenario?.prob)??0;
  const confluence = Array.isArray(pair.confluence) ? pair.confluence.slice(0,2).join(' + ') : '';
  const label = variant||'Primary';
  const nearR = pickNearest(resistance, v=>price==null||v>price, (a,b)=>Math.abs(a-price)-Math.abs(b-price));
  const nearS = pickNearest(support, v=>price==null||v<price, (a,b)=>Math.abs(a-price)-Math.abs(b-price));
  const nearResistance = price!=null&&nearR!=null ? Math.abs(nearR-price)/price<=0.01 : false;
  const nearSupport = price!=null&&nearS!=null ? Math.abs(price-nearS)/price<=0.01 : false;
  if (scenarioKey==='neutral') return { label, scenarioKey, prob, action:'Wait', entry:null, tp:null, sl:null, rationale:`${rankedScenario?.title||'Neutral bias'} — wait for clearer signal.` };
  if (scenarioKey==='bull') {
    const entry = pickNearest(longEntries, v=>price==null||v<=price*1.02, (a,b)=>price==null?a-b:Math.abs(a-price)-Math.abs(b-price));
    const tp = pickNearest(longTargets, v=>price==null||v>price, (a,b)=>a-b);
    const sl = entry!=null ? pickNearest(longStops, v=>v<entry, (a,b)=>b-a) : null;
    if (!entry||!tp||!sl) return { label, scenarioKey, prob, action:'Wait', entry:null, tp:null, sl:null, rationale:'Bullish bias but structured levels incomplete.' };
    return { label, scenarioKey, prob, action: nearResistance?'Breakout Long':'Pullback Long', entry, tp, sl, rationale:`Bull ${prob}% + ${pair.biasLabel||'neutral'} bias${confluence?` + ${confluence}`:''}.` };
  }
  const entry = pickNearest(shortEntries, v=>price==null||v>=price*0.98, (a,b)=>price==null?a-b:Math.abs(a-price)-Math.abs(b-price));
  const tp = pickNearest(shortTargets, v=>price==null||v<price, (a,b)=>b-a);
  const sl = entry!=null ? pickNearest(shortStops, v=>v>entry, (a,b)=>a-b) : null;
  if (!entry||!tp||!sl) return { label, scenarioKey:'bear', prob, action:'Wait', entry:null, tp:null, sl:null, rationale:'Bearish bias but structured levels incomplete.' };
  return { label, scenarioKey:'bear', prob, action: nearSupport?'Breakdown Short':'Rejection Short', entry, tp, sl, rationale:`Bear ${prob}% + ${pair.biasLabel||'neutral'} bias${confluence?` + ${confluence}`:''}.` };
}

        <div style={{ fontSize:'12px', color:C.dim, marginTop:'2px' }}>2026-05-04 · Elliott Wave + ICT/SMC + Orderflow</div>
      </div>
      <div style={{ display:'flex', gap:'20px', alignItems:'center' }}>
        {PAIRS.map(p => (
          <div key={p.symbol} style={{ textAlign:'center' }}>
            <div style={{ fontSize:'10px', color:C.dim, marginBottom:'2px' }}>{p.short}</div>
            <div style={{ fontSize:'13px', color:C.text, fontWeight:700, fontFamily:'Inconsolata' }}>{fmtP(p.price)}</div>
            <Badge color={biasColor(p.bias)} s={{ marginTop:'4px', display:'block' }}>{p.biasLabel}</Badge>
          </div>
        ))}
      </div>
    </div>
  );

  return (
    <div style={{ minHeight:'100vh', background:C.bg }}>
      <div style={{ background:C.surface, borderBottom:`1px solid ${C.border}`, padding:isMobile?'12px':'16px 28px' }}>
        {headerContent}
      </div>
      <div ref={tabBarRef} style={{ background:C.surface, borderBottom:`1px solid ${C.border}`, display:'flex', overflowX:'auto', whiteSpace:'nowrap', scrollbarWidth:'none' }}>
        {tabs.map(tab => (
          <button
            key={tab}
            data-active={activeTab===tab?'true':'false'}
            onClick={()=>setActiveTab(tab)}
            style={{ background:'transparent', color:activeTab===tab?C.primary:C.sub, border:'none', borderBottom:`2px solid ${activeTab===tab?C.primary:'transparent'}`, padding:isMobile?'14px 14px':'12px 18px', fontSize:'13px', fontWeight:activeTab===tab?700:400, cursor:'pointer', whiteSpace:'nowrap', transition:'color 0.15s, border-color 0.15s', flexShrink:0 }}
          >{tab}</button>
        ))}
      </div>
      <div style={{ padding:isMobile?'14px 12px':'20px 28px', maxWidth:'1400px', margin:'0 auto' }}>
        {tabContent}
      </div>
      <div style={{ padding:'12px 28px', borderTop:`1px solid ${C.border}`, display:'flex', flexDirection:isMobile?'column':'row', justifyContent:'space-between', gap:isMobile?'4px':'0', alignItems:isMobile?'flex-start':'center', fontSize:'11px', color:C.dim }}>
        <span>데이터 기준: 2026-05-03 23:00 UTC | Binance OHLCV + Coinalyze OI/CVD/Funding</span>
        <span>투자 참고용 정보입니다. 매매 결정은 본인 책임으로 합니다.</span>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Dashboard />);

  </script>
</body>
</html>
