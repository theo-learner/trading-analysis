function Badge({ children, color, bg }) {
  return (
    <span style={{ display: "inline-block", padding: "2px 8px", borderRadius: 4, fontSize: 11, fontWeight: 600, color: color || "#e8eaed", background: bg || "#2d3748", marginRight: 4 }}>
      {children}
    </span>
  );
}

function PairCard({ p, onClick, selected }) {
  return (
    <div onClick={() => onClick(p.pair)} style={{ background: selected ? "#1e2535" : "#1a1f2e", border: "1px solid " + (selected ? "#4a6fa5" : "#2d3748"), borderRadius: 8, padding: "12px 16px", cursor: "pointer" }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <span style={{ fontWeight: 700, fontSize: 15 }}>{p.pair}</span>
        <span style={{ color: "#f87171", fontWeight: 600, fontSize: 13 }}>{p.change24h}</span>
      </div>
      <div style={{ fontSize: 20, fontWeight: 700, margin: "4px 0" }}>${p.price.toLocaleString()}</div>
      <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginTop: 4 }}>
        <Badge color={sentimentColor(p.sentiment)} bg={sentimentColor(p.sentiment) + "22"}>{p.sentiment === "bearish" ? "약세" : p.sentiment === "bullish" ? "강세" : "중립"}</Badge>
        {Object.entries(p.tf).map(([tf, v]) => (
          <span key={tf} style={{ fontSize: 11, color: "#9ca3af" }}>RSI {tf} {v.rsi}</span>
        ))}
      </div>
    </div>
  );
}

function Section({ title, children }) {
  return (
    <div style={{ marginBottom: 20 }}>
      <div style={{ fontSize: 12, fontWeight: 700, color: "#9ca3af", textTransform: "uppercase", letterSpacing: 1, marginBottom: 8, borderBottom: "1px solid #2d3748", paddingBottom: 4 }}>{title}</div>
      {children}
    </div>
  );
}

function RsiBar({ label, value }) {
  const color = value > 70 ? "#f87171" : value < 30 ? "#4ade80" : "#fbbf24";
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 6 }}>
      <span style={{ color: "#9ca3af", width: 24, fontSize: 11 }}>{label}</span>
      <div style={{ flex: 1, background: "#2d3748", borderRadius: 4, height: 8, overflow: "hidden" }}>
        <div style={{ width: Math.min(100, Math.max(0, value)) + "%", height: "100%", background: color, borderRadius: 4 }} />
      </div>
      <span style={{ color, fontWeight: 600, fontSize: 12, width: 40, textAlign: "right" }}>{value.toFixed(1)}</span>
    </div>
  );
}

function PairSelector({ selected, onChange }) {
  return (
    <div style={{ display: "flex", gap: 8, marginBottom: 16 }}>
      {PAIRS.map(p => (
        <button key={p.pair} onClick={() => onChange(p.pair)}

            background: selected === p.pair ? "#4a6fa5" : "#2d3748", color: "#e8eaed" }}>
          {p.pair.replace("USDT", "")}
        </button>
      ))}
    </div>
  );
}

              <div style={{ color: "#e8eaed", fontSize: 13, marginBottom: 8 }}>{pair.risk.longEntry}</div>
              <div style={{ fontSize: 12, color: "#9ca3af", marginBottom: 4 }}>SL</div>
              <div style={{ color: "#f87171", fontWeight: 600, fontSize: 13, marginBottom: 8 }}>{pair.risk.sl}</div>
              <div style={{ fontSize: 12, color: "#9ca3af", marginBottom: 4 }}>TP</div>
              {pair.risk.tp.map((t, i) => <div key={i} style={{ color: "#4ade80", fontSize: 13 }}>{i + 1}차: {t}</div>)}
              <div style={{ marginTop: 8, fontSize: 12, color: "#9ca3af" }}>R:R — <span style={{ color: "#fbbf24", fontWeight: 700 }}>{pair.risk.rr}</span></div>
            </div>
            <div style={{ background: "#f8717111", border: "1px solid #f8717133", borderRadius: 8, padding: 12 }}>
              <div style={{ color: "#f87171", fontWeight: 700, marginBottom: 8 }}>▼ 숏 전략</div>
              <div style={{ fontSize: 12, color: "#9ca3af", marginBottom: 4 }}>진입</div>
              <div style={{ color: "#e8eaed", fontSize: 13, marginBottom: 8 }}>{pair.risk.shortEntry}</div>
              <div style={{ fontSize: 12, color: "#9ca3af", marginBottom: 4 }}>SL</div>
              <div style={{ color: "#4ade80", fontWeight: 600, fontSize: 13, marginBottom: 8 }}>{pair.risk.shortSl}</div>
              <div style={{ fontSize: 12, color: "#9ca3af", marginBottom: 4 }}>TP</div>
              {pair.risk.shortTp.map((t, i) => <div key={i} style={{ color: "#f87171", fontSize: 13 }}>{i + 1}차: {t}</div>)}
            </div>
          </div>
          <div style={{ padding: "10px 14px", background: "#1a1f2e", borderRadius: 6, fontSize: 12 }}>
            <span style={{ color: "#9ca3af" }}>Entry 금지 구간: </span>
            <span style={{ color: pair.risk.entryForbid.startsWith("없음") ? "#4ade80" : "#f87171" }}>{pair.risk.entryForbid}</span>
          </div>
        </div>
        <div style={{ marginTop: 16, background: "#1a1f2e", borderRadius: 8, padding: "12px 16px" }}>
          <div style={{ fontSize: 12, color: "#9ca3af", fontWeight: 700, marginBottom: 8 }}>전체 리스크 요약</div>
          <div style={{ color: "#e8eaed", fontSize: 13, lineHeight: 1.8 }}>
            • 이슬라마바드 회담 결렬 → 지정학 불확실성 고조 → 포지션 사이즈 축소 권장<br />
            • ETH·SOL 1D RSI 극단 과매도 → 반등 트리거 주의, 숏 신규진입 리스크 높음<br />
            • BTC $71K 지지선 붕괴 여부가 전체 시장 방향 결정 핵심 변수<br />
            • HYPE: 차트 표기 SL $37.9 이하 일봉 종가 시 포지션 정리 필수<br />
            • high-impact 예정 이벤트 없음 → 지정학 헤드라인 리스크 상시 모니터링
          </div>
        </div>
      </div>
    );
  }

  return (
    <div style={{ minHeight: "100vh", background: "#0b0e14" }}>
      <div style={{ background: "#131720", borderBottom: "1px solid #2d3748", padding: "12px 20px" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <div>
            <div style={{ fontWeight: 700, fontSize: 18, color: "#e8eaed" }}>Crypto Futures Analysis</div>
            <div style={{ color: "#9ca3af", fontSize: 12 }}>2026-04-12 | EW + ICT/SMC + Orderflow</div>
          </div>
          <div style={{ display: "flex", gap: 16 }}>
            {PAIRS.map(p => (
              <div key={p.pair} style={{ textAlign: "right" }}>
                <div style={{ fontSize: 11, color: "#9ca3af" }}>{p.pair.replace("USDT", "")}</div>
                <div style={{ fontWeight: 600, fontSize: 13, color: "#f87171" }}>{p.change24h}</div>
              </div>
            ))}
          </div>
        </div>
      </div>
      <div style={{ display: "flex", borderBottom: "1px solid #2d3748", background: "#131720", overflowX: "auto" }}>
        {TABS.map(tab => (
          <button key={tab} onClick={() => setActiveTab(tab)}
            style={{ padding: "10px 18px", border: "none", cursor: "pointer", fontWeight: 600, fontSize: 13, whiteSpace: "nowrap",
              background: "transparent", color: activeTab === tab ? "#e8eaed" : "#9ca3af",
              borderBottom: "2px solid " + (activeTab === tab ? "#4a6fa5" : "transparent") }}>
            {tab}
            {tab === "Macro" && (
              <span style={{ marginLeft: 4, background: "#f87171", color: "#fff", borderRadius: 10, padding: "1px 5px", fontSize: 10 }}>
                {MACRO_EVENTS.filter(e => e.importance === "high").length}
              </span>
            )}
          </button>
        ))}
      </div>
      <div style={{ maxWidth: 900, margin: "0 auto", padding: "20px 16px" }}>
        {tabContent}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Dashboard />);
</script>
</body>
</html>
