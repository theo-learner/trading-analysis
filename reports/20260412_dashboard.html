const TABS = ['Overview', 'Elliott Wave', 'ICT/SMC', 'Orderflow', 'Scenarios', 'Risk'];

const biasLabel = (b) => ({ bullish: '강세', oversold_bounce: '과매도반등', neutral_bearish: '중립/약세', bearish: '약세' }[b] || b);
const biasColor = (b) => ({ bullish: C.bull, oversold_bounce: C.cvdP, neutral_bearish: C.neutral, bearish: C.bear }[b] || C.sub);

function Badge({ label, color }) {
  return <span style={{ display: 'inline-block', padding: '2px 7px', borderRadius: 4, fontSize: 11, fontWeight: 700, background: color + '22', color, border: `1px solid ${color}44` }}>{label}</span>;
}

function Card({ children, style }) {
  return <div style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 8, padding: '12px 14px', ...style }}>{children}</div>;
}

function RSIBar({ value, label }) {
  const color = value < 30 ? C.bull : value > 70 ? C.bear : value > 55 ? C.cvdP : C.sub;
  return (
    <div style={{ marginBottom: 5 }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 2 }}>
        <span style={{ color: C.sub, fontSize: 11 }}>RSI {label}</span>
        <span style={{ color, fontWeight: 700, fontSize: 12 }}>{value}</span>
      </div>
      <div style={{ height: 4, background: C.border, borderRadius: 2 }}>
        <div style={{ width: Math.min(value, 100) + '%', height: '100%', background: color, borderRadius: 2 }} />
      </div>
    </div>
  );
}

function PairHeader({ pair }) {

      <span style={{ fontSize: 12, color: C.bear }}>{d.chg}%</span>
      <Badge label={biasLabel(d.bias)} color={biasColor(d.bias)} />

  );
}
