function useIsMobile() {
  const [m, setM] = React.useState(() => window.matchMedia('(max-width: 767px)').matches);
  React.useEffect(() => {
    const mql = window.matchMedia('(max-width: 767px)');
    const h = e => setM(e.matches);
    mql.addEventListener('change', h);
    return () => mql.removeEventListener('change', h);
  }, []);
  return m;
}

const C = {
  bull: '#4ade80', bear: '#f87171', neutral: '#fbbf24',
  text: '#e8eaed', sub: '#9ca3af', dim: '#6b7280',
  bg: '#0b0e14', panel: '#131720', card: '#1a1f2e',
  border: '#1f2937',
  heatHigh: '#f59e0b', cvdPos: '#22d3ee', cvdNeg: '#fb923c', conv: '#a78bfa'

const biasColor = b => b === 'bullish' ? C.bull : b === 'bearish' ? C.bear : C.neutral;
const importanceBorder = i => i === 'high' ? C.bear : i === 'medium' ? C.neutral : C.sub;
const fmtKST = iso => {
  try {
    const d = new Date(iso);
    return d.toLocaleString('ko-KR', { timeZone: 'Asia/Seoul', month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit', hour12: false });
  } catch { return iso; }
};

function Card({ children, style = {} }) {
  return <div style={{ background: C.card, borderRadius: '10px', padding: '16px', ...style }}>{children}</div>;
}
function Badge({ color = C.sub, bg, children, style = {} }) {
  return <span style={{ background: bg || color + '22', color, border: `1px solid ${color}44`, borderRadius: '4px', padding: '2px 7px', fontSize: '11px', fontWeight: 600, ...style }}>{children}</span>;
}
function SectionTitle({ children }) {
  return <div style={{ fontSize: '11px', fontWeight: 700, color: C.dim, textTransform: 'uppercase', letterSpacing: '0.08em', marginBottom: '10px' }}>{children}</div>;
}
function Divider() {
  return <div style={{ height: '1px', background: C.border, margin: '12px 0' }} />;
}

function LevelPill({ value, color, label }) {
  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: '6px', marginBottom: '4px' }}>
      <div style={{ width: '8px', height: '8px', borderRadius: '2px', background: color, flexShrink: 0 }} />
      <span style={{ fontSize: '11px', color: C.sub }}>{label}</span>
      <span style={{ fontSize: '12px', color: C.text, fontFamily: 'monospace', marginLeft: 'auto' }}>{typeof value === 'number' ? value.toLocaleString(undefined, { maximumFractionDigits: 2 }) : value}</span>

  );
}

            </div>
            <div style={{ display: 'flex', gap: '6px', flexWrap: 'wrap' }}>
              {PAIRS.map(p => <Badge key={p.symbol} color={biasColor(p.bias)}>{p.short} {p.biasLabel}</Badge>)}
            </div>
          </div>
        ) : (
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
            <div>
              <div style={{ fontSize: '20px', fontWeight: 800, color: C.text }}>Crypto Futures Analysis</div>
              <div style={{ fontSize: '12px', color: C.dim }}>{ANALYSIS_DATE} · Elliott Wave + ICT/SMC + Orderflow</div>
            </div>
            <div style={{ display: 'flex', gap: '8px', flexWrap: 'wrap' }}>
              {PAIRS.map(p => (
                <div key={p.symbol} style={{ textAlign: 'center' }}>
                  <div style={{ fontSize: '11px', color: C.sub }}>{p.short}</div>
                  <Badge color={biasColor(p.bias)} style={{ fontSize: '11px' }}>{p.biasLabel}</Badge>
                </div>
              ))}
            </div>
          </div>
        )}
      </div>

      {/* Tabs */}
      <div ref={tabBarRef} style={{ background: C.panel, borderBottom: `1px solid ${C.border}`, overflowX: 'auto', display: 'flex', WebkitOverflowScrolling: 'touch' }}>
        {tabs.map(tab => (
          <button
            key={tab}
            data-active={activeTab === tab ? 'true' : 'false'}
            onClick={() => setActiveTab(tab)}
            style={{
              padding: isMobile ? '14px 14px' : '12px 16px',
              background: 'none',
              border: 'none',
              borderBottom: activeTab === tab ? `2px solid ${C.bull}` : '2px solid transparent',
              color: activeTab === tab ? C.bull : C.sub,
              fontSize: '13px',
              fontWeight: activeTab === tab ? 700 : 400,
              cursor: 'pointer',
              whiteSpace: 'nowrap',
              transition: 'color 0.2s'
            }}
          >{tab}</button>
        ))}
      </div>

      {/* Content */}
      <div style={{ padding: contentPadding, maxWidth: '1400px', margin: '0 auto' }}>
        {tabContent}
      </div>

      {/* Footer */}
      <div style={{ borderTop: `1px solid ${C.border}`, padding: '16px 24px', marginTop: '20px' }}>
        <div style={{ display: 'flex', flexDirection: isMobile ? 'column' : 'row', justifyContent: 'space-between', gap: isMobile ? '6px' : '0', alignItems: isMobile ? 'flex-start' : 'center', fontSize: '11px', color: C.dim }}>
          <span>데이터 기준: {ANALYSIS_DATE} · TradingView (OHLCV/EMA) · Coinalyze API · Coinglass 히트맵</span>
          <span>⚠ 투자 참고용 분석. 투자 결정의 책임은 본인에게 있습니다.</span>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Dashboard />);
  </script>
</body>
</html>
