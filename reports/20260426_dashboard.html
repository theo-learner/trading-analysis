function biasColor(bias) {
  if (bias === 'bull') return C.bull;
  if (bias === 'bear') return C.bear;
  return C.neutral;
}
function biasTextColor(bias) {
  if (bias === 'bull') return C.bullText;
  if (bias === 'bear') return C.bearText;
  return C.neutralText;
}
function biasLabel(bias) {
  if (bias === 'bull') return 'Bullish';
  if (bias === 'bear') return 'Bearish';
  return 'Neutral';
}
function changeColor(ch) {
  if (!ch) return C.sub;
  return ch.startsWith('-') ? C.bear : C.bull;
}
function fundingColor(fr) {
  if (!fr) return C.sub;
  return fr.startsWith('-') ? C.bear : C.bull;
}
function cvdColor(dir) {
  return dir === 'positive' ? C.cvdPos : C.cvdNeg;
}
function importanceBorder(imp) {
  if (imp === 'high') return C.bear;
  if (imp === 'medium') return C.neutral;
  return C.dim;
}
function directionColor(dir) {
  if (dir === 'long' || dir === 'bullish') return C.bull;
  if (dir === 'short' || dir === 'bearish') return C.bear;
  return C.neutral;
}

// ─── STRATEGY UTILS ──────────────────────────────────────────────────────────
function asNumber(value) {
  if (typeof value === 'number' && Number.isFinite(value)) return value;
  if (typeof value === 'string' && value.trim() !== '') {
    const parsed = Number(value);
    return Number.isFinite(parsed) ? parsed : null;
  }
  return null;
}
function dedupeLevels(levels) {
  return [...new Set((levels || []).map(asNumber).filter(v => v != null))].sort((a, b) => a - b);
}
function pickNearest(levels, predicate, sortFn) {
  const filtered = dedupeLevels(levels).filter(predicate || (() => true));
  if (filtered.length === 0) return null;
  return [...filtered].sort(sortFn || ((a, b) => a - b))[0];
}
function formatStrategyPrice(value) {
  const n = asNumber(value);
  return n != null ? `$${n.toLocaleString(undefined, { maximumFractionDigits: 2 })}` : '—';
}
function sortScenariosByProbability(pair) {
  const order = ['bull', 'bear', 'neutral'];
  return order
    .map(key => ({ key, ...(pair.scenarios?.[key] || {}) }))
    .sort((l, r) => {
      const lp = asNumber(l.prob) ?? -Infinity;
      const rp = asNumber(r.prob) ?? -Infinity;
      if (rp !== lp) return rp - lp;
      return order.indexOf(l.key) - order.indexOf(r.key);
    });
}
function collectStrategyLevels(pair) {
  const price = asNumber(pair.price);
  const levels4H = pair.levels?.['4H'] || {};
  const ict4H = pair.ict?.['4H'] || {};
  const ew4H = pair.ew?.['4H'] || {};
  const support = dedupeLevels([...(levels4H.ssl || []), ...(levels4H.swing_lows || [])]);
  const resistance = dedupeLevels([...(levels4H.bsl || []), ...(levels4H.swing_highs || [])]);
  const poi = asNumber(ict4H.poi_level);
  const poiAsBullCandidate = poi != null && price != null ? poi <= price * 1.01 : poi != null;
  const poiAsBearCandidate = poi != null && price != null ? poi > price : poi != null;
  const longEntries = dedupeLevels([...support, ...(poiAsBullCandidate ? [poi] : [])]);
  const shortEntries = dedupeLevels([...resistance, ...(poiAsBearCandidate ? [poi] : [])]);
  const longTargets = dedupeLevels([...resistance.filter(v => price == null || v > price), ew4H.target]);
  const shortTargets = dedupeLevels([...support.filter(v => price == null || v < price)]);
  const longStops = dedupeLevels([...support, ...(poi != null ? [poi] : [])]);
  const shortStops = dedupeLevels([...resistance, ...(poi != null ? [poi] : [])]);
  return { price, support, resistance, longEntries, shortEntries, longTargets, shortTargets, longStops, shortStops };
}
function buildStrategyRecommendation(pair, rankedScenario, variant) {
  const { price, support, resistance, longEntries, shortEntries, longTargets, shortTargets, longStops, shortStops } = collectStrategyLevels(pair);
  const scenarioKey = rankedScenario?.key || 'neutral';
  const prob = asNumber(rankedScenario?.prob) ?? 0;
  const confluence = Array.isArray(pair.confluence) ? pair.confluence.slice(0, 2).join(' + ') : '';
  const label = variant || 'Primary';
  const nearestSupport = pickNearest(support, v => price == null || v < price, (a, b) => Math.abs(a - price) - Math.abs(b - price));
  const nearestResistance = pickNearest(resistance, v => price == null || v > price, (a, b) => Math.abs(a - price) - Math.abs(b - price));
  const nearResistance = price != null && nearestResistance != null ? Math.abs(nearestResistance - price) / price <= 0.01 : false;
  const nearSupportBreakdown = price != null && nearestSupport != null ? Math.abs(price - nearestSupport) / price <= 0.01 : false;
  if (scenarioKey === 'neutral') {
    return { label, scenarioKey, prob, action: 'Wait', entry: null, tp: null, sl: null, rationale: `${rankedScenario?.title || 'Neutral bias'} — 방향성 대기.` };
  }
  if (scenarioKey === 'bull') {
    const entry = pickNearest(longEntries, v => price == null || v <= price * 1.02, (a, b) => price == null ? a - b : Math.abs(a - price) - Math.abs(b - price));
    const tp = pickNearest(longTargets, v => price == null || v > price, (a, b) => a - b);
    const sl = entry != null ? pickNearest(longStops, v => v < entry, (a, b) => b - a) : null;
    if (entry == null || tp == null || sl == null) return { label, scenarioKey, prob, action: 'Wait', entry: null, tp: null, sl: null, rationale: '불리시 방향 확인됐으나 레벨 구조 불완전.' };
    return { label, scenarioKey, prob, action: nearResistance ? 'Breakout Long' : 'Pullback Long', entry, tp, sl, rationale: `Bull ${prob}% + ${pair.biasLabel || pair.bias || 'neutral'} 바이어스.` };
  }
  const entry = pickNearest(shortEntries, v => price == null || v >= price * 0.98, (a, b) => price == null ? a - b : Math.abs(a - price) - Math.abs(b - price));
  const tp = pickNearest(shortTargets, v => price == null || v < price, (a, b) => b - a);
  const sl = entry != null ? pickNearest(shortStops, v => v > entry, (a, b) => a - b) : null;
  if (entry == null || tp == null || sl == null) return { label, scenarioKey: 'bear', prob, action: 'Wait', entry: null, tp: null, sl: null, rationale: '베어리시 방향 확인됐으나 레벨 구조 불완전.' };
  return { label, scenarioKey: 'bear', prob, action: nearSupportBreakdown ? 'Breakdown Short' : 'Rejection Short', entry, tp, sl, rationale: `Bear ${prob}% + ${pair.biasLabel || pair.bias || 'neutral'} 바이어스.` };
}

function useIsMobile() {
  const [m, setM] = React.useState(() => window.matchMedia('(max-width: 767px)').matches);
  React.useEffect(() => {
    const mql = window.matchMedia('(max-width: 767px)');
    const h = e => setM(e.matches);
    mql.addEventListener('change', h);
    return () => mql.removeEventListener('change', h);
  }, []);
  return m;
}

  React.useEffect(() => {
    if (!isMobile || !tabBarRef.current) return;
    const activeBtn = tabBarRef.current.querySelector('[data-active="true"]');
    if (activeBtn) activeBtn.scrollIntoView({ inline: 'center', behavior: 'smooth' });
  }, [activeTab, isMobile]);

  const tabs = [
    { key: 'overview', label: 'Overview' },
    { key: 'macro', label: 'Macro' },
    { key: 'analysis', label: '분석' },
    { key: 'orderflow', label: 'Orderflow' },
    { key: 'scenarios', label: 'Scenarios' },
    { key: 'risk', label: 'Risk' },
  ];

  let tabContent;
  if (activeTab === 'overview') tabContent = <OverviewTab pairs={PAIRS} selectedPair={selectedPair} onSelectPair={setSelectedPair} isMobile={isMobile} />;
  else if (activeTab === 'macro') tabContent = <MacroTab isMobile={isMobile} />;
  else if (activeTab === 'analysis') tabContent = <AnalysisTab pairs={PAIRS} selectedPair={selectedPair} onSelectPair={setSelectedPair} isMobile={isMobile} />;
  else if (activeTab === 'orderflow') tabContent = <OrderflowTab isMobile={isMobile} />;
  else if (activeTab === 'scenarios') tabContent = <ScenariosTab pairs={PAIRS} isMobile={isMobile} />;
  else if (activeTab === 'risk') tabContent = <RiskTab pairs={PAIRS} selectedPair={selectedPair} onSelectPair={setSelectedPair} isMobile={isMobile} />;

  const headerPadding = isMobile ? '12px' : '14px 24px';
  const contentPadding = isMobile ? '14px 12px' : '20px 24px';

  return (
    <div style={{ minHeight: '100vh', background: C.bg }}>
      {/* Header */}
      <div style={{ background: C.surface, borderBottom: `1px solid ${C.border}`, padding: headerPadding, position: 'sticky', top: 0, zIndex: 100 }}>
        {isMobile ? (
          <div style={{ display: 'flex', flexDirection: 'column', gap: '8px' }}>
            <div>
              <div style={{ fontSize: '15px', fontWeight: 800, color: C.text }}>Crypto Futures Analysis</div>
              <div style={{ fontSize: '11px', color: C.sub }}>2026-04-26 · EW + ICT/SMC + Orderflow</div>
            </div>
            <div style={{ display: 'flex', gap: '6px', flexWrap: 'wrap' }}>
              <Badge color={C.primary}>BTC {PAIRS[0].change}</Badge>
              <Badge color={changeColor(PAIRS[1].change)}>ETH {PAIRS[1].change}</Badge>
              <Badge color={changeColor(PAIRS[2].change)}>SOL {PAIRS[2].change}</Badge>
              <Badge color={C.bull}>HYPE {PAIRS[3].change}</Badge>
            </div>
          </div>
        ) : (
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
            <div>
              <div style={{ fontWeight: 800, fontSize: '17px', color: C.text }}>Crypto Futures Analysis</div>
              <div style={{ fontSize: '11px', color: C.sub }}>2026-04-26 · Elliott Wave + ICT/SMC + Orderflow</div>
            </div>
            <div style={{ display: 'flex', gap: '8px', alignItems: 'center' }}>
              {PAIRS.map(p => (
                <div key={p.symbol} style={{ textAlign: 'right' }}>
                  <div style={{ fontSize: '11px', fontWeight: 700, color: C.text }}>{p.short}</div>
                  <div style={{ fontSize: '10px', color: changeColor(p.change) }}>{p.change}</div>
                </div>
              ))}
            </div>
          </div>
        )}
      </div>

      {/* Tab Bar */}
      <div ref={tabBarRef} style={{ background: C.surface, borderBottom: `1px solid ${C.border}`, padding: '0 16px', display: 'flex', overflowX: 'auto', WebkitOverflowScrolling: 'touch' }}>
        {tabs.map(t => (
          <button
            key={t.key}
            data-active={activeTab === t.key ? 'true' : 'false'}
            onClick={() => setActiveTab(t.key)}
            style={{
              background: 'none',
              border: 'none',
              borderBottom: `2px solid ${activeTab === t.key ? C.primary : 'transparent'}`,
              color: activeTab === t.key ? C.primary : C.sub,
              fontWeight: activeTab === t.key ? 700 : 400,
              padding: isMobile ? '14px 14px' : '12px 16px',
              fontSize: '12px',
              whiteSpace: 'nowrap',
              cursor: 'pointer',
              transition: 'all 0.15s',
            }}
          >{t.label}</button>
        ))}
      </div>

      {/* Content */}
      <div style={{ padding: contentPadding, maxWidth: '1400px', margin: '0 auto' }}>
        {tabContent}
      </div>

      {/* Footer */}
      <div style={{ padding: '12px 24px', borderTop: `1px solid ${C.border}`, background: C.surface, marginTop: '32px' }}>
        <div style={{ display: 'flex', flexDirection: isMobile ? 'column' : 'row', justifyContent: 'space-between', gap: isMobile ? '4px' : '0', alignItems: isMobile ? 'flex-start' : 'center', fontSize: '11px', color: C.dim }}>
          <span>데이터 기준: 2026-04-26 09:00 KST · Binance OHLCV + Coinalyze API</span>
          <span>투자 참고용 분석 — 투자 판단 및 손익에 대한 책임은 본인에게 있습니다.</span>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Dashboard />);

  </script>
</body>
</html>
