<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wireframe — TypeUI Clean · Dashboard Redesign</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Roboto:wght@400;500&family=Inconsolata:wght@400;500;600&display=swap" rel="stylesheet">
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #f5f7fa;
      color: #111827;
      font-family: 'Roboto', sans-serif;
      font-size: 14px;
    }
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: #f0f0f0; }
    ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 999px; }
    button { cursor: pointer; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">

    // ─── TOKENS — TypeUI Clean (Light) ───────────────────────────────────────────
    const C = {
      bg:       '#f5f7fa',
      surface:  '#ffffff',
      panel:    '#f9fafb',
      border:   '#e5e7eb',
      borderStrong: '#d1d5db',

      text:     '#111827',
      sub:      '#6b7280',
      dim:      '#9ca3af',

      primary:  '#3B82F6',
      primaryBg:'#eff6ff',
      primaryBorder: '#bfdbfe',

      // Trading semantics
      bull:     '#16a34a',
      bullBg:   '#f0fdf4',
      bullBorder:'#bbf7d0',
      bear:     '#dc2626',
      bearBg:   '#fef2f2',
      bearBorder:'#fecaca',
      neutral:  '#d97706',
      neutralBg:'#fffbeb',
      neutralBorder:'#fde68a',

      cvdPos:   '#0891b2',
      cvdNeg:   '#ea580c',
      convergence: '#7c3aed',
    };

    const S = { 1: 8, 2: 16, 3: 24, 4: 32 };

    // ─── PRIMITIVES ───────────────────────────────────────────────────────────────

    function Ann({ children, color }) {
      return (
        <span style={{
          fontSize: 9, fontFamily: 'Inconsolata', fontWeight: 500,
          color: color || C.dim, whiteSpace: 'nowrap',
        }}>{children}</span>
      );
    }

    function Card({ children, style: x, accent }) {
      return (
        <div style={{
          background: C.surface,
          borderRadius: 10,
          border: `1px solid ${accent ? accent + '50' : C.border}`,
          borderLeft: accent ? `3px solid ${accent}` : `1px solid ${C.border}`,
          padding: S[2],
          ...x,
        }}>{children}</div>
      );
    }

    function Pill({ label, color, bg, border }) {
      return (
        <span style={{
          display: 'inline-flex', alignItems: 'center',
          padding: '2px 8px', borderRadius: 999,
          background: bg || C.primaryBg,
          border: `1px solid ${border || C.primaryBorder}`,
          fontSize: 10, fontFamily: 'Inconsolata', fontWeight: 600,
          color: color || C.primary,
        }}>{label}</span>
      );
    }

    function Block({ h, label, note, style: x }) {
      return (
        <div style={{
          height: h || 28, width: '100%',
          background: C.panel,
          borderRadius: 5,
          border: `1px solid ${C.border}`,
          display: 'flex', alignItems: 'center', justifyContent: 'space-between',
          padding: '0 10px', gap: 8,
          ...x,
        }}>
          {label && <span style={{ fontSize: 10, fontFamily: 'Inconsolata', color: C.sub }}>{label}</span>}
          {note && <span style={{ fontSize: 9, fontFamily: 'Inconsolata', color: C.dim }}>{note}</span>}
        </div>
      );
    }

    function Divider() {
      return <div style={{ height: 1, background: C.border, margin: `${S[1]}px 0` }} />;
    }

    function SectionTitle({ children }) {
      return (
        <div style={{
          fontFamily: 'Roboto', fontWeight: 500, fontSize: 10,
          textTransform: 'uppercase', letterSpacing: '0.08em',
          color: C.dim, marginBottom: S[1],
        }}>{children}</div>
      );
    }

    // ─── WIREFRAME ────────────────────────────────────────────────────────────────
    function Wireframe() {
      const [tab, setTab] = React.useState('overview');
      const tabs = ['Overview', 'Macro', '분석', 'Orderflow', 'Scenarios', 'Risk'];

      return (
        <div style={{ minHeight: '100vh', background: C.bg }}>

          {/* Banner */}
          <div style={{
            background: C.primaryBg, borderBottom: `1px solid ${C.primaryBorder}`,
            padding: '6px 24px', display: 'flex', alignItems: 'center', gap: 12,
          }}>
            <span style={{ fontSize: 10, fontFamily: 'Inconsolata', color: C.primary, fontWeight: 700 }}>WIREFRAME</span>
            <span style={{ fontSize: 10, fontFamily: 'Inconsolata', color: C.sub }}>TypeUI Clean (light) · Dashboard Redesign · 2026-04-18</span>
          </div>

          {/* Header */}
          <div style={{
            background: C.surface,
            borderBottom: `1px solid ${C.border}`,
            padding: `${S[2]}px ${S[3]}px`,
          }}>
            <div style={{ maxWidth: 1400, margin: '0 auto', display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
              <div>
                <div style={{ fontFamily: 'Poppins', fontWeight: 700, fontSize: 20, color: C.text, letterSpacing: '-0.02em' }}>
                  Trading Analysis
                </div>
                <div style={{ fontFamily: 'Inconsolata', fontSize: 11, color: C.dim, marginTop: 2 }}>
                  BTCUSDT · ETHUSDT · SOLUSDT · HYPEUSDT · 2026-04-18
                </div>
              </div>
              <div style={{ display: 'flex', gap: 8 }}>
                {[['BTC', C.bull, C.bullBg, C.bullBorder, 'BULL'],
                  ['ETH', C.neutral, C.neutralBg, C.neutralBorder, 'NEUTRAL'],
                  ['SOL', C.bear, C.bearBg, C.bearBorder, 'BEAR'],
                  ['HYPE', C.bull, C.bullBg, C.bullBorder, 'BULL'],
                ].map(([pair, color, bg, border, bias]) => (
                  <div key={pair} style={{
                    display: 'flex', alignItems: 'center', gap: 7,
                    background: C.panel, border: `1px solid ${C.border}`,
                    borderRadius: 8, padding: '6px 12px',
                  }}>
                    <span style={{ fontFamily: 'Poppins', fontWeight: 600, fontSize: 12, color: C.text }}>{pair}</span>
                    <Pill label={bias} color={color} bg={bg} border={border} />
                  </div>
                ))}
              </div>
            </div>
          </div>

          {/* Tab bar */}
          <div style={{ background: C.surface, borderBottom: `1px solid ${C.border}` }}>
            <div style={{ maxWidth: 1400, margin: '0 auto', paddingLeft: S[3], display: 'flex' }}>
              {tabs.map(t => {
                const key = t.toLowerCase();
                const active = tab === key;
                return (
                  <button key={t} onClick={() => setTab(key)} style={{
                    padding: `${S[1] + 4}px ${S[2]}px`,
                    fontFamily: 'Poppins', fontWeight: active ? 600 : 400,
                    fontSize: 13,
                    color: active ? C.primary : C.sub,
                    background: 'none', border: 'none',
                    borderBottom: `2px solid ${active ? C.primary : 'transparent'}`,
                    marginBottom: -1,
                    transition: 'color 0.15s, border-color 0.15s',
                  }}>{t}</button>
                );
              })}
            </div>
          </div>

          {/* Content */}
          <div style={{ maxWidth: 1400, margin: '0 auto', padding: `${S[3]}px` }}>
            {tab === 'overview'   && <OverviewTab />}
            {tab === 'macro'      && <MacroTab />}
            {tab === '분석'        && <AnalysisTab />}
            {tab === 'orderflow'  && <OrderflowTab />}
            {tab === 'scenarios'  && <ScenariosTab />}
            {tab === 'risk'       && <RiskTab />}
          </div>

          {/* Token legend */}
          <Legend />
        </div>
      );
    }

    // ─── OVERVIEW ─────────────────────────────────────────────────────────────────
    function OverviewTab() {
      return (
        <div>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: S[2] }}>
            {[['BTC', C.bull, C.bullBg, C.bullBorder, '$84,210', '+2.4%'],
              ['ETH', C.neutral, C.neutralBg, C.neutralBorder, '$1,590', '+0.3%'],
              ['SOL', C.bear, C.bearBg, C.bearBorder, '$130.4', '-1.8%'],
              ['HYPE', C.bull, C.bullBg, C.bullBorder, '$18.2', '+5.1%'],
            ].map(([pair, color, bg, border, price, chg]) => (
              <div key={pair} style={{
                background: C.surface, borderRadius: 10,
                border: `1px solid ${C.border}`, borderTop: `3px solid ${color}`,
                padding: S[2],
              }}>
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 6 }}>
                  <span style={{ fontFamily: 'Poppins', fontWeight: 700, fontSize: 14, color: C.text }}>{pair}USDT</span>
                  <Pill label={pair === 'ETH' ? 'NEUTRAL' : pair === 'SOL' ? 'BEAR' : 'BULL'} color={color} bg={bg} border={border} />
                </div>
                <div style={{ fontFamily: 'Inconsolata', fontWeight: 600, fontSize: 22, color: C.text }}>{price}</div>
                <div style={{ fontFamily: 'Inconsolata', fontSize: 12, color, marginTop: 2 }}>
                  {chg.startsWith('+') ? '▲' : '▼'} {chg} 24h
                </div>
                <Divider />
                <Block h={26} label="EMA 7 / 50 / 200" note="Inconsolata 12" />
                <div style={{ marginTop: 5 }} />
                <Block h={26} label="RSI · Funding" />
              </div>
            ))}
          </div>

          <div style={{ marginTop: S[3] }}>
            <SectionTitle>Strategy Recommendation</SectionTitle>
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: S[2] }}>
              {[['BTC', C.bull, C.bullBg, C.bullBorder],
                ['ETH', C.neutral, C.neutralBg, C.neutralBorder],
                ['SOL', C.bear, C.bearBg, C.bearBorder],
                ['HYPE', C.bull, C.bullBg, C.bullBorder],
              ].map(([pair, color, bg, border]) => (
                <Card key={pair}>
                  <div style={{ fontFamily: 'Poppins', fontWeight: 600, fontSize: 12, color: C.sub, marginBottom: S[1] }}>{pair}</div>
                  <div style={{
                    background: bg, borderRadius: 6, border: `1px solid ${border}`,
                    borderLeft: `3px solid ${color}`,
                    padding: '7px 10px', marginBottom: 6,
                  }}>
                    <div style={{ fontFamily: 'Roboto', fontSize: 10, color: C.dim, textTransform: 'uppercase', letterSpacing: '0.06em' }}>Primary</div>
                    <Block h={20} label="Setup description" style={{ background: 'transparent', border: 'none', padding: 0, marginTop: 3 }} />
                  </div>
                  <div style={{ background: C.panel, borderRadius: 6, border: `1px solid ${C.border}`, padding: '7px 10px' }}>
                    <div style={{ fontFamily: 'Roboto', fontSize: 10, color: C.dim, textTransform: 'uppercase', letterSpacing: '0.06em' }}>Alternate</div>
                    <Block h={20} label="Setup description" style={{ background: 'transparent', border: 'none', padding: 0, marginTop: 3 }} />
                  </div>
                </Card>
              ))}
            </div>
          </div>
        </div>
      );
    }

    // ─── MACRO ────────────────────────────────────────────────────────────────────
    function MacroTab() {
      return (
        <div>
          <SectionTitle>Upcoming Events</SectionTitle>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
            {[['HIGH', C.bear, C.bearBg, C.bearBorder, 'FOMC Statement', 'Apr 18 · 03:00 KST', 'Fed rates decision — expect volatility window ±2h. Entry 금지 구간.'],
              ['MEDIUM', C.neutral, C.neutralBg, C.neutralBorder, 'CPI Data Release', 'Apr 19 · 21:30 KST', 'US inflation print — likely BTC/ETH correlation event.'],
              ['LOW', C.dim, C.panel, C.border, 'Options Expiry', 'Apr 18 · 09:00 KST', 'Weekly expiry — minor liquidity shift expected.'],
            ].map(([imp, color, bg, border, title, time, desc]) => (
              <div key={title} style={{
                background: C.surface, borderRadius: 10,
                border: `1px solid ${C.border}`,
                borderLeft: `3px solid ${color}`,
                padding: S[2],
                display: 'grid', gridTemplateColumns: '88px 1fr', gap: S[2],
              }}>
                <div>
                  <Pill label={imp} color={color} bg={bg} border={border} />
                  <div style={{ marginTop: 6, fontFamily: 'Inconsolata', fontSize: 10, color: C.dim }}>{time}</div>
                </div>
                <div>
                  <div style={{ fontFamily: 'Poppins', fontWeight: 600, fontSize: 13, color: C.text, marginBottom: 4 }}>{title}</div>
                  <div style={{ fontFamily: 'Roboto', fontSize: 12, color: C.sub }}>{desc}</div>
                </div>
              </div>
            ))}
          </div>
        </div>
      );
    }

    // ─── 분석 ─────────────────────────────────────────────────────────────────────
    function AnalysisTab() {
      const [pair, setPair] = React.useState('BTC');
      const [tf, setTF] = React.useState('4H');

      return (
        <div>
          {/* Controls */}
          <div style={{ display: 'flex', alignItems: 'center', gap: S[2], marginBottom: S[3] }}>
            <div style={{ display: 'flex', gap: 6 }}>
              {['BTC', 'ETH', 'SOL', 'HYPE'].map(p => (
                <button key={p} onClick={() => setPair(p)} style={{
                  padding: '6px 14px', borderRadius: 6,
                  fontFamily: 'Poppins', fontWeight: 600, fontSize: 12,
                  background: pair === p ? C.primaryBg : C.surface,
                  border: `1px solid ${pair === p ? C.primary : C.border}`,
                  color: pair === p ? C.primary : C.sub,
                  transition: 'all 0.15s',
                }}>{p}</button>
              ))}
            </div>
            <div style={{ width: 1, height: 20, background: C.border }} />
            <div style={{ display: 'flex', gap: 4 }}>
              {['1D', '4H', '1H'].map(t => (
                <button key={t} onClick={() => setTF(t)} style={{
                  padding: '5px 12px', borderRadius: 999,
                  fontFamily: 'Inconsolata', fontWeight: 600, fontSize: 11,
                  background: tf === t ? C.primary : C.surface,
                  border: `1px solid ${tf === t ? C.primary : C.border}`,
                  color: tf === t ? '#fff' : C.sub,
                  transition: 'all 0.15s',
                }}>{t}</button>
              ))}
            </div>
          </div>

          {/* TF Alignment */}
          <div style={{
            background: C.surface, borderRadius: 8, border: `1px solid ${C.border}`,
            padding: '10px 16px', marginBottom: S[2],
            display: 'flex', alignItems: 'center', gap: S[3],
          }}>
            <SectionTitle>TF Alignment</SectionTitle>
            {['1D', '4H', '1H'].map(t => (
              <div key={t} style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
                <span style={{ fontFamily: 'Inconsolata', fontSize: 11, color: C.sub }}>{t}</span>
                <Pill label="BULL" color={C.bull} bg={C.bullBg} border={C.bullBorder} />
              </div>
            ))}
          </div>

          {/* EW + ICT */}
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: S[2] }}>
            {[['Elliott Wave', 'Wave 3 Up', C.bull, C.bullBg, C.bullBorder],
              ['ICT / SMC', 'Bullish BOS', C.bull, C.bullBg, C.bullBorder],
            ].map(([title, badge, color, bg, border]) => (
              <div key={title} style={{
                background: C.surface, borderRadius: 10, border: `1px solid ${C.border}`, padding: S[2],
              }}>
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: S[1] }}>
                  <span style={{ fontFamily: 'Poppins', fontWeight: 600, fontSize: 13, color: C.text }}>{title} · {pair} {tf}</span>
                  <Pill label={badge} color={color} bg={bg} border={border} />
                </div>
                <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
                  <Block h={26} label="Current wave / structure" />
                  <Block h={26} label="Key levels (OB / FVG / BSL)" />
                  <Block h={26} label="Invalidation" />
                </div>
              </div>
            ))}
          </div>

          {/* Confluence */}
          <div style={{ marginTop: S[2], background: C.surface, borderRadius: 10, border: `1px solid ${C.border}`, padding: S[2] }}>
            <SectionTitle>Confluence</SectionTitle>
            <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap' }}>
              {['EW W3 Target', 'ICT OB align', '4H BOS ↑', 'CVD positive', 'Kill zone'].map(s => (
                <Pill key={s} label={s} color={C.convergence} bg={'#f5f3ff'} border={'#ddd6fe'} />
              ))}
            </div>
          </div>
        </div>
      );
    }

    // ─── ORDERFLOW ────────────────────────────────────────────────────────────────
    function OrderflowTab() {
      return (
        <div>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: S[2], marginBottom: S[3] }}>
            {[['BTC', C.bull, '$84.2B', '+2.1%', 'positive/rising'],
              ['ETH', C.neutral, '$6.4B', '-0.3%', 'negative/flat'],
              ['SOL', C.bear, '$1.9B', '-1.8%', 'negative/falling'],
              ['HYPE', C.bull, '$0.3B', '+4.2%', 'positive/rising'],
            ].map(([pair, color]) => (
              <div key={pair} style={{
                background: C.surface, borderRadius: 10,
                border: `1px solid ${C.border}`, borderTop: `3px solid ${color}`,
                padding: S[2],
              }}>
                <div style={{ fontFamily: 'Poppins', fontWeight: 700, fontSize: 13, color: C.text, marginBottom: S[1] }}>{pair}</div>
                {[['OI', '—'], ['OI 24h', '—'], ['CVD', '—'], ['Funding', '—']].map(([k, v]) => (
                  <div key={k} style={{ display: 'flex', justifyContent: 'space-between', padding: '3px 0', borderBottom: `1px solid ${C.border}` }}>
                    <span style={{ fontFamily: 'Roboto', fontSize: 11, color: C.dim }}>{k}</span>
                    <span style={{ fontFamily: 'Inconsolata', fontSize: 12, color: C.text }}>{v}</span>
                  </div>
                ))}
              </div>
            ))}
          </div>

          {/* Table */}
          <div style={{ background: C.surface, borderRadius: 10, border: `1px solid ${C.border}`, overflow: 'hidden' }}>
            <div style={{ padding: '12px 16px', borderBottom: `1px solid ${C.border}` }}>
              <SectionTitle>Orderflow Table</SectionTitle>
            </div>
            <div style={{ overflowX: 'auto' }}>
              <table style={{ width: '100%', borderCollapse: 'collapse', fontFamily: 'Inconsolata', fontSize: 12 }}>
                <thead>
                  <tr style={{ background: C.panel }}>
                    {['Pair', 'OI', 'OI 24h', 'Funding', 'Funding (pred)', 'CVD'].map(h => (
                      <th key={h} style={{ padding: '8px 16px', textAlign: 'left', color: C.dim, fontWeight: 600, fontSize: 10, textTransform: 'uppercase', letterSpacing: '0.06em', borderBottom: `1px solid ${C.border}` }}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {['BTC', 'ETH', 'SOL', 'HYPE'].map((pair, i) => (
                    <tr key={pair} style={{ borderBottom: `1px solid ${C.border}`, background: i % 2 === 0 ? C.surface : C.panel }}>
                      <td style={{ padding: '10px 16px', fontFamily: 'Poppins', fontWeight: 600, fontSize: 13, color: C.text }}>{pair}</td>
                      {['—', '—', '—', '—', '—'].map((v, j) => (
                        <td key={j} style={{ padding: '10px 16px', color: C.sub }}>—</td>
                      ))}
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        </div>
      );
    }

    // ─── SCENARIOS ────────────────────────────────────────────────────────────────
    function ScenariosTab() {
      return (
        <div>
          {['BTC', 'ETH'].map(pair => (
            <div key={pair} style={{ marginBottom: S[3] }}>
              <div style={{ fontFamily: 'Poppins', fontWeight: 600, fontSize: 13, color: C.sub, marginBottom: S[1] }}>{pair}USDT</div>
              <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: S[2] }}>
                {[['Bull', C.bull, C.bullBg, C.bullBorder, 55],
                  ['Bear', C.bear, C.bearBg, C.bearBorder, 30],
                  ['Neutral', C.neutral, C.neutralBg, C.neutralBorder, 15],
                ].map(([label, color, bg, border, prob]) => (
                  <div key={label} style={{
                    background: C.surface, borderRadius: 10,
                    border: `1px solid ${border}`,
                    borderTop: `3px solid ${color}`,
                    padding: S[2],
                  }}>
                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: S[1] }}>
                      <span style={{ fontFamily: 'Poppins', fontWeight: 700, fontSize: 13, color }}>{label}</span>
                      <span style={{ fontFamily: 'Inconsolata', fontWeight: 700, fontSize: 20, color }}>{prob}%</span>
                    </div>
                    {/* Probability bar */}
                    <div style={{ height: 4, background: C.border, borderRadius: 999, marginBottom: S[1] }}>
                      <div style={{ width: `${prob}%`, height: '100%', background: color, borderRadius: 999 }} />
                    </div>
                    <Block h={24} label="Trigger condition" />
                    <div style={{ marginTop: 5 }} />
                    <Block h={24} label="Invalidation level" />
                    <div style={{ marginTop: 5 }} />
                    <Block h={24} label="Target levels" />
                  </div>
                ))}
              </div>
            </div>
          ))}
        </div>
      );
    }

    // ─── RISK ─────────────────────────────────────────────────────────────────────
    function RiskTab() {
      return (
        <div>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)', gap: S[2] }}>
            {[['BTC', C.bull, C.bullBg, C.bullBorder, 'BULL'],
              ['ETH', C.neutral, C.neutralBg, C.neutralBorder, 'NEUTRAL'],
              ['SOL', C.bear, C.bearBg, C.bearBorder, 'BEAR'],
              ['HYPE', C.bull, C.bullBg, C.bullBorder, 'BULL'],
            ].map(([pair, color, bg, border, bias]) => (
              <div key={pair} style={{
                background: C.surface, borderRadius: 10,
                border: `1px solid ${C.border}`, borderTop: `3px solid ${color}`,
                padding: S[2],
              }}>
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: S[2] }}>
                  <span style={{ fontFamily: 'Poppins', fontWeight: 700, fontSize: 15, color: C.text }}>{pair}USDT</span>
                  <Pill label={bias} color={color} bg={bg} border={border} />
                </div>
                <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 8 }}>
                  {[['Entry', C.primary], ['Stop Loss', C.bear], ['TP1', C.bull], ['R:R', C.neutral]].map(([k, c]) => (
                    <div key={k} style={{
                      background: C.panel, borderRadius: 7, padding: '10px 12px',
                      border: `1px solid ${C.border}`,
                    }}>
                      <div style={{ fontFamily: 'Roboto', fontSize: 10, color: C.dim, textTransform: 'uppercase', letterSpacing: '0.06em', marginBottom: 4 }}>{k}</div>
                      <div style={{ fontFamily: 'Inconsolata', fontSize: 18, fontWeight: 600, color: c }}>—</div>
                    </div>
                  ))}
                </div>
              </div>
            ))}
          </div>
        </div>
      );
    }
