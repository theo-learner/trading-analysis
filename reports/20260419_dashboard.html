      return m;

    // ─── UTILITY COMPONENTS ──────────────────────────────────────────────────────
    function Card({ children, style = {} }) {
      return (
        <div style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: '10px', padding: '16px', ...style }}>

    function Badge({ color = C.neutral, children }) {
      return (
        <span style={{ display: 'inline-block', background: color + '18', color: color, fontSize: '11px', fontWeight: 700, padding: '6px 10px', borderRadius: '6px', textTransform: 'uppercase', letterSpacing: '0.5px' }}>
          {children}
        </span>
      );
    }

    function biasColor(bias) {
      if (bias === 'bull') return C.bull;
      if (bias === 'bear') return C.bear;
      return C.neutral;
    }

    // ─── STRATEGY UTILS ──────────────────────────────────────────────────────────
    function asNumber(value) {
      if (typeof value === 'number' && Number.isFinite(value)) return value;
      if (typeof value === 'string' && value.trim() !== '') {
        const parsed = Number(value);
        return Number.isFinite(parsed) ? parsed : null;
      }
      return null;
    }

    function dedupeLevels(levels) {
      return [...new Set((levels || []).map(asNumber).filter(value => value != null))].sort((a, b) => a - b);
    }

    function pickNearest(levels, predicate, sortFn) {
      const filtered = dedupeLevels(levels).filter(predicate || (() => true));
      if (filtered.length === 0) return null;
      return [...filtered].sort(sortFn || ((a, b) => a - b))[0];
    }

    function formatStrategyPrice(value) {
      const n = asNumber(value);
      return n != null ? `$${n.toLocaleString(undefined, { maximumFractionDigits: 2 })}` : '—';
    }

    function sortScenariosByProbability(pair) {
      const order = ['bull', 'bear', 'neutral'];
      return order
        .map(key => ({ key, ...(pair.scenarios?.[key] || {}) }))
        .sort((left, right) => {
          const leftProb = asNumber(left.prob) ?? -Infinity;
          const rightProb = asNumber(right.prob) ?? -Infinity;
          if (rightProb !== leftProb) return rightProb - leftProb;
          return order.indexOf(left.key) - order.indexOf(right.key);
        });
    }

    function collectStrategyLevels(pair) {
      const price = asNumber(pair.price);
      const levels4H = pair.levels?.['4H'] || {};
      const ict4H = pair.ict?.['4H'] || {};
      const ew4H = pair.ew?.['4H'] || {};
      const support = dedupeLevels([...(levels4H.ssl || []), ...(levels4H.swing_lows || [])]);
      const resistance = dedupeLevels([...(levels4H.bsl || []), ...(levels4H.swing_highs || [])]);
      const poi = asNumber(ict4H.poi_level);
      const poiAsBullCandidate = poi != null && price != null ? poi <= price * 1.01 : poi != null;
      const poiAsBearCandidate = poi != null && price != null ? poi > price : poi != null;
      const longEntries = dedupeLevels([...support, ...(poiAsBullCandidate ? [poi] : [])]);
      const shortEntries = dedupeLevels([...resistance, ...(poiAsBearCandidate ? [poi] : [])]);
      const longTargets = dedupeLevels([...resistance.filter(value => price == null || value > price), ew4H.target]);
      const shortTargets = dedupeLevels([...support.filter(value => price == null || value < price)]);
      const longStops = dedupeLevels([...support, ...(poi != null ? [poi] : [])]);
      const shortStops = dedupeLevels([...resistance, ...(poi != null ? [poi] : [])]);
      return { price, support, resistance, longEntries, shortEntries, longTargets, shortTargets, longStops, shortStops };
    }

    function buildStrategyRecommendation(pair, rankedScenario, variant) {
      const { price, support, resistance, longEntries, shortEntries, longTargets, shortTargets, longStops, shortStops } = collectStrategyLevels(pair);
      const scenarioKey = rankedScenario?.key || 'neutral';
      const prob = asNumber(rankedScenario?.prob) ?? 0;
      const confluence = Array.isArray(pair.confluence) ? pair.confluence.slice(0, 2).join(' + ') : '';
      const label = variant || 'Primary';
      const nearestSupport = pickNearest(support, value => price == null || value < price, (a, b) => Math.abs(a - price) - Math.abs(b - price));
      const nearestResistance = pickNearest(resistance, value => price == null || value > price, (a, b) => Math.abs(a - price) - Math.abs(b - price));
      const nearResistance = price != null && nearestResistance != null ? Math.abs(nearestResistance - price) / price <= 0.01 : false;
      const nearSupportBreakdown = price != null && nearestSupport != null ? Math.abs(price - nearestSupport) / price <= 0.01 : false;

      if (scenarioKey === 'neutral') {
        return { label, scenarioKey, prob, action: 'Wait', entry: null, tp: null, sl: null, rationale: `${rankedScenario?.title || 'Neutral bias'} keeps the setup in wait mode.` };
      }

      if (scenarioKey === 'bull') {
        const entry = pickNearest(longEntries, value => price == null || value <= price * 1.02, (a, b) => price == null ? a - b : Math.abs(a - price) - Math.abs(b - price));
        const tp = pickNearest(longTargets, value => price == null || value > price, (a, b) => a - b);
        const sl = entry != null ? pickNearest(longStops, value => value < entry, (a, b) => b - a) : null;
        if (entry == null || tp == null || sl == null) return { label, scenarioKey, prob, action: 'Wait', entry: null, tp: null, sl: null, rationale: 'Bullish direction exists, but structured levels are incomplete.' };
        return { label, scenarioKey, prob, action: nearResistance ? 'Breakout Long' : 'Pullback Long', entry, tp, sl, rationale: `Bull ${prob}% + ${pair.biasLabel || pair.bias || 'neutral'} bias${confluence ? ` + ${confluence}` : ''}.` };
      }

      const entry = pickNearest(shortEntries, value => price == null || value >= price * 0.98, (a, b) => price == null ? a - b : Math.abs(a - price) - Math.abs(b - price));
      const tp = pickNearest(shortTargets, value => price == null || value < price, (a, b) => b - a);
      const sl = entry != null ? pickNearest(shortStops, value => value > entry, (a, b) => a - b) : null;
      if (entry == null || tp == null || sl == null) return { label, scenarioKey: 'bear', prob, action: 'Wait', entry: null, tp: null, sl: null, rationale: 'Bearish direction exists, but structured levels are incomplete.' };
      return { label, scenarioKey: 'bear', prob, action: nearSupportBreakdown ? 'Breakdown Short' : 'Rejection Short', entry, tp, sl, rationale: `Bear ${prob}% + ${pair.biasLabel || pair.bias || 'neutral'} bias${confluence ? ` + ${confluence}` : ''}.` };
    }

    // ─── STRATEGY COMPONENTS ─────────────────────────────────────────────────────
    function StrategyKVRow({ label, value }) {
      return (
        <div style={{ display: 'flex', justifyContent: 'space-between', gap: '10px', fontSize: '11px' }}>
          <span style={{ color: C.dim }}>{label}</span>
          <span style={{ color: C.text, fontWeight: 600 }}>{value}</span>
        </div>
      );
    }

    function strategyTone(strategy) {
      if (strategy.action.includes('Long')) return { color: C.bull, bg: C.bull + '10', border: C.bull + '30' };
      if (strategy.action.includes('Short')) return { color: C.bear, bg: C.bear + '10', border: C.bear + '30' };
      return { color: C.neutral, bg: C.neutral + '10', border: C.neutral + '30' };
    }

    function StrategyBlock({ title, strategy, muted }) {
      const tone = strategyTone(strategy);
      return (
        <div style={{ background: muted ? C.bg : tone.bg, border: `1px solid ${muted ? C.border : tone.border}`, borderRadius: '8px', padding: '12px' }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', gap: '8px', marginBottom: '10px' }}>
            <span style={{ color: muted ? C.sub : tone.color, fontSize: '11px', fontWeight: 700 }}>{title}</span>
            <span style={{ color: muted ? C.sub : tone.color, fontSize: '11px', fontWeight: 700 }}>{strategy.prob}%</span>
          </div>
          <StrategyKVRow label="Action" value={strategy.action} />
          <StrategyKVRow label="Entry" value={formatStrategyPrice(strategy.entry)} />
          <StrategyKVRow label="TP" value={formatStrategyPrice(strategy.tp)} />
          <StrategyKVRow label="SL" value={formatStrategyPrice(strategy.sl)} />
          <div style={{ marginTop: '10px', fontSize: '11px', color: C.sub, lineHeight: '1.5' }}>{strategy.rationale}</div>
        </div>
      );
    }

    function OverviewStrategyCard({ pair }) {
      const ranked = sortScenariosByProbability(pair);
      const primary = buildStrategyRecommendation(pair, ranked[0], 'Primary');
      const alternate = buildStrategyRecommendation(pair, ranked[1], 'Alternate');
      return (
        <Card>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '12px' }}>
            <div>

            <Badge color={biasColor(pair.bias)}>{pair.biasLabel}</Badge>

            <StrategyBlock title="Primary" strategy={primary} />
            <StrategyBlock title="Alternate" strategy={alternate} muted />
          </div>
        </Card>
      );
    }

          <Card style={{ marginBottom: '16px', background: C.neutral + '08', borderLeft: `3px solid ${C.neutral}` }}>
            <div style={{ fontSize: '12px', color: C.neutralText, lineHeight: '1.6' }}>
              <strong>Orderflow 핵심 관찰:</strong> BTC/ETH/SOL 모두 OI 급락 (-4.8%~-7.9%) + 극도 음수 펀딩. ETH 펀딩 -1.51%는 시장 내 최고 숏 과밀집. CVD negative/rising = 매도압 감소 중. HYPE만 OI 상승 + 양수 펀딩 = 유일한 진짜 롱 수요.
            </div>
          </Card>
          <div style={{ overflowX: 'auto' }}>
            <table style={{ width: '100%', minWidth: isMobile ? '480px' : 'auto', borderCollapse: 'collapse', fontSize: '12px' }}>
              <thead>
                <tr style={{ borderBottom: `2px solid ${C.border}` }}>
                  <th style={{ padding: '10px 8px', textAlign: 'left', color: C.sub, fontWeight: 600 }}>Pair</th>
                  <th style={{ padding: '10px 8px', textAlign: 'right', color: C.sub, fontWeight: 600 }}>OI</th>
                  <th style={{ padding: '10px 8px', textAlign: 'right', color: C.sub, fontWeight: 600 }}>OI 24h</th>
                  <th style={{ padding: '10px 8px', textAlign: 'right', color: C.sub, fontWeight: 600 }}>Funding</th>
                  <th style={{ padding: '10px 8px', textAlign: 'center', color: C.sub, fontWeight: 600 }}>CVD</th>
                </tr>
              </thead>
              <tbody>
                {Object.entries(ORDERFLOW_DATA).map(([symbol, data]) => (
                  <tr key={symbol} style={{ borderBottom: `1px solid ${C.border}` }}>
                    <td style={{ padding: '12px 8px', color: C.text, fontWeight: 700 }}>{symbol.replace('USDT', '')}</td>
                    <td style={{ padding: '12px 8px', textAlign: 'right', color: C.text }}>{data.oi_usd_str}</td>
                    <td style={{ padding: '12px 8px', textAlign: 'right', color: data.oi_change_24h.startsWith('+') ? C.bull : C.bear, fontWeight: 700 }}>{data.oi_change_24h}</td>
                    <td style={{ padding: '12px 8px', textAlign: 'right', color: data.funding_rate.startsWith('+') ? C.bull : C.bear, fontWeight: 700 }}>{data.funding_rate}</td>
                    <td style={{ padding: '12px 8px', textAlign: 'center' }}>
                      <Badge color={data.cvd_direction === 'positive' ? C.cvdPos : C.cvdNeg}>
                        {data.cvd_direction}/{data.cvd_trend}
                      </Badge>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>

          <div style={{ marginTop: '16px', display: 'grid', gridTemplateColumns: isMobile ? 'repeat(2, 1fr)' : 'repeat(4, 1fr)', gap: '12px' }}>
            {Object.entries(ORDERFLOW_DATA).map(([symbol, data]) => {
              const fundingNum = parseFloat(data.funding_rate);
              const isExtreme = Math.abs(fundingNum) > 0.5;
              return (
                <Card key={symbol} style={{ textAlign: 'center' }}>
                  <div style={{ fontSize: '12px', fontWeight: 700, color: C.text, marginBottom: '8px' }}>{symbol.replace('USDT', '')}</div>
                  <div style={{ fontSize: '18px', fontWeight: 800, color: Math.sign(fundingNum) > 0 ? C.bull : C.bear, marginBottom: '4px' }}>{data.funding_rate}</div>
                  <div style={{ fontSize: '10px', color: isExtreme ? C.bear : C.dim }}>
                    {isExtreme ? (fundingNum < 0 ? '⚠ Extreme Short Bias' : '⚠ Extreme Long Bias') : 'Funding Rate'}
                  </div>
                  <div style={{ marginTop: '8px', fontSize: '10px', color: data.oi_trend === 'rising' ? C.bull : C.bear }}>
                    OI {data.oi_change_24h} ({data.oi_trend})
                  </div>
                </Card>
              );
            })}
          </div>
        </div>
      );
    }

    function ScenariosTab({ pairs, selectedPair, onSelectPair, isMobile }) {
      const pair = pairs.find(item => item.symbol === selectedPair) || pairs[0];

      return (
        <div>
          <div style={{ display: 'flex', gap: '8px', marginBottom: '16px', flexWrap: 'wrap' }}>
            {pairs.map(item => (
              <button
                key={item.symbol}
                onClick={() => onSelectPair(item.symbol)}
                style={{
                  background: selectedPair === item.symbol ? C.primary + '18' : '#f3f4f6',
                  color: selectedPair === item.symbol ? C.primary : C.text,
                  border: 'none',
                  borderRadius: '6px',
                  padding: isMobile ? '8px 14px' : '6px 16px',
                  fontSize: '12px',
                  fontWeight: selectedPair === item.symbol ? 700 : 400,
                  cursor: 'pointer',
                }}
              >
                {item.short}
              </button>
            ))}
          </div>

          <div style={{ display: 'grid', gridTemplateColumns: isMobile ? '1fr' : 'repeat(3, 1fr)', gap: '12px' }}>
            {Object.entries(pair.scenarios || {}).map(([key, scenario]) => {
              const color = key === 'bull' ? C.bull : key === 'bear' ? C.bear : C.neutral;
              return (
                <Card key={key} style={{ borderTop: `3px solid ${color}` }}>
                  <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '8px' }}>
                    <div style={{ fontSize: '13px', fontWeight: 700, color: C.text }}>{scenario.title}</div>
                    <span style={{ fontSize: '14px', fontWeight: 800, color }}>{scenario.prob}%</span>
                  </div>
                  <div style={{ fontSize: '12px', color: C.sub, marginBottom: '12px', lineHeight: '1.6' }}>{scenario.desc}</div>
                  <div style={{ height: '6px', background: C.border, borderRadius: '3px', overflow: 'hidden' }}>
                    <div style={{ height: '100%', background: color, width: `${scenario.prob}%`, borderRadius: '3px' }} />
                  </div>
                </Card>
              );
            })}
          </div>
        </div>
      );
    }

    function RiskTab({ pairs, selectedPair, onSelectPair, isMobile }) {
      const pair = pairs.find(item => item.symbol === selectedPair) || pairs[0];
      const ranked = sortScenariosByProbability(pair);
      const primary = buildStrategyRecommendation(pair, ranked[0]);
      const alternate = buildStrategyRecommendation(pair, ranked[1]);

      return (
        <div>
          <div style={{ display: 'flex', gap: '8px', marginBottom: '16px', flexWrap: 'wrap' }}>
            {pairs.map(item => (
              <button
                key={item.symbol}
                onClick={() => onSelectPair(item.symbol)}
                style={{
                  background: selectedPair === item.symbol ? C.primary + '18' : '#f3f4f6',
                  color: selectedPair === item.symbol ? C.primary : C.text,
                  border: 'none',
                  borderRadius: '6px',
                  padding: isMobile ? '8px 14px' : '6px 16px',
                  fontSize: '12px',
                  fontWeight: selectedPair === item.symbol ? 700 : 400,
                  cursor: 'pointer',
                }}
              >
                {item.short}
              </button>
            ))}
          </div>

          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)', gap: '12px', marginBottom: '16px' }}>
            <Card style={{ gridColumn: '1 / -1', background: C.bear + '08', borderLeft: `3px solid ${C.bear}` }}>
              <div style={{ fontSize: '12px', color: C.bearText, fontWeight: 700, marginBottom: '6px' }}>⚠ 리스크 주의 사항</div>
              <div style={{ fontSize: '12px', color: C.sub, lineHeight: '1.6' }}>
                음수 펀딩이 극단적이나 추세가 강하면 지속될 수 있음. BTC 1D RSI 29.4 = 기술적 반등 가능하나 추세 반전 확인 전 과다 레버리지 금지.
                HOT 이벤트 ±2시간 내 신규 진입 자제. 포지션 사이즈 최대 50% 이하 유지.
              </div>
            </Card>

            <Card style={{ borderTop: `4px solid ${primary.action.includes('Long') ? C.bull : primary.action.includes('Short') ? C.bear : C.neutral}` }}>
              <div style={{ fontSize: '13px', fontWeight: 700, color: C.text, marginBottom: '12px' }}>
                Primary ({ranked[0]?.key?.toUpperCase()}) — {ranked[0]?.prob}%
              </div>
              <div style={{ display: 'grid', gap: '8px', fontSize: '12px' }}>
                <div style={{ display: 'flex', justifyContent: 'space-between' }}>
                  <span style={{ color: C.sub }}>Action</span>
                  <span style={{ color: C.text, fontWeight: 700 }}>{primary.action}</span>
                </div>
                <div style={{ display: 'flex', justifyContent: 'space-between' }}>
                  <span style={{ color: C.sub }}>Entry</span>
                  <span style={{ color: C.text, fontWeight: 600 }}>{formatStrategyPrice(primary.entry)}</span>
                </div>
                <div style={{ display: 'flex', justifyContent: 'space-between' }}>
                  <span style={{ color: C.sub }}>Take Profit</span>
                  <span style={{ color: C.bull, fontWeight: 600 }}>{formatStrategyPrice(primary.tp)}</span>
                </div>
                <div style={{ display: 'flex', justifyContent: 'space-between' }}>
                  <span style={{ color: C.sub }}>Stop Loss</span>
                  <span style={{ color: C.bear, fontWeight: 600 }}>{formatStrategyPrice(primary.sl)}</span>
                </div>
                {primary.entry && primary.tp && primary.sl && (
                  <div style={{ display: 'flex', justifyContent: 'space-between' }}>
                    <span style={{ color: C.sub }}>R:R</span>
                    <span style={{ color: C.text, fontWeight: 700 }}>
                      {(Math.abs(primary.tp - primary.entry) / Math.abs(primary.entry - primary.sl)).toFixed(2)}:1
                    </span>
                  </div>
                )}
              </div>
              {primary.rationale && (
                <div style={{ marginTop: '12px', padding: '10px', background: C.bg, borderRadius: '6px', fontSize: '11px', color: C.sub, lineHeight: '1.5' }}>
                  {primary.rationale}
                </div>
              )}
            </Card>

            <Card style={{ borderTop: `4px solid ${C.sub}` }}>
              <div style={{ fontSize: '13px', fontWeight: 700, color: C.sub, marginBottom: '12px' }}>
                Alternate ({ranked[1]?.key?.toUpperCase()}) — {ranked[1]?.prob}%
              </div>
              <div style={{ display: 'grid', gap: '8px', fontSize: '12px' }}>
                <div style={{ display: 'flex', justifyContent: 'space-between' }}>
                  <span style={{ color: C.dim }}>Action</span>
                  <span style={{ color: C.sub, fontWeight: 700 }}>{alternate.action}</span>
                </div>
                <div style={{ display: 'flex', justifyContent: 'space-between' }}>
                  <span style={{ color: C.dim }}>Entry</span>
                  <span style={{ color: C.sub, fontWeight: 600 }}>{formatStrategyPrice(alternate.entry)}</span>
                </div>
                <div style={{ display: 'flex', justifyContent: 'space-between' }}>
                  <span style={{ color: C.dim }}>TP</span>
                  <span style={{ color: C.sub, fontWeight: 600 }}>{formatStrategyPrice(alternate.tp)}</span>
                </div>
                <div style={{ display: 'flex', justifyContent: 'space-between' }}>
                  <span style={{ color: C.dim }}>SL</span>
                  <span style={{ color: C.sub, fontWeight: 600 }}>{formatStrategyPrice(alternate.sl)}</span>
                </div>
              </div>
              {alternate.rationale && (
                <div style={{ marginTop: '12px', padding: '10px', background: C.bg, borderRadius: '6px', fontSize: '11px', color: C.dim, lineHeight: '1.5' }}>
                  {alternate.rationale}
                </div>
              )}
            </Card>
          </div>
        </div>
      );
    }

    // ─── DASHBOARD ────────────────────────────────────────────────────────────────
    function Dashboard() {
      const isMobile = useIsMobile();
      const [activeTab, setActiveTab] = React.useState('overview');
      const [selectedPair, setSelectedPair] = React.useState('BTCUSDT');
      const tabBarRef = React.useRef(null);

      React.useEffect(() => {
        if (!isMobile || !tabBarRef.current) return;
        const activeBtn = tabBarRef.current.querySelector('[data-active="true"]');
        if (activeBtn) activeBtn.scrollIntoView({ inline: 'center', behavior: 'smooth' });
      }, [activeTab, isMobile]);

      const tabs = [
        { id: 'overview', label: 'Overview' },
        { id: 'macro', label: 'Macro' },
        { id: 'analysis', label: 'Analysis' },
        { id: 'orderflow', label: 'Orderflow' },
        { id: 'scenarios', label: 'Scenarios' },
        { id: 'risk', label: 'Risk' },
      ];

      let tabContent;
      switch (activeTab) {
        case 'overview':
          tabContent = <OverviewTab pairs={pairs} selectedPair={selectedPair} onSelectPair={setSelectedPair} isMobile={isMobile} />;
          break;
        case 'macro':
          tabContent = <MacroTab isMobile={isMobile} />;
          break;
        case 'analysis':
          tabContent = <AnalysisTab pairs={pairs} selectedPair={selectedPair} onSelectPair={setSelectedPair} isMobile={isMobile} />;
          break;
        case 'orderflow':
          tabContent = <OrderflowTab isMobile={isMobile} />;
          break;
        case 'scenarios':
          tabContent = <ScenariosTab pairs={pairs} selectedPair={selectedPair} onSelectPair={setSelectedPair} isMobile={isMobile} />;
          break;
        case 'risk':
          tabContent = <RiskTab pairs={pairs} selectedPair={selectedPair} onSelectPair={setSelectedPair} isMobile={isMobile} />;
          break;
        default:
          tabContent = null;
      }

      const badgeForPair = p => (
        <Badge key={p.symbol} color={biasColor(p.bias)}>
          {p.short} {p.change24h}
        </Badge>
      );

      return (
        <div style={{ display: 'flex', flexDirection: 'column', height: '100vh', background: C.bg }}>
          {/* Header */}
          <div style={{ background: C.surface, borderBottom: `1px solid ${C.border}`, padding: isMobile ? '12px' : '14px 24px', flexShrink: 0 }}>
            {isMobile ? (
              <div style={{ display: 'flex', flexDirection: 'column', gap: '10px' }}>
                <div>
                  <div style={{ fontSize: '16px', fontWeight: 700, color: C.text, marginBottom: '2px' }}>Crypto Futures Analysis</div>
                  <div style={{ fontSize: '11px', color: C.sub }}>2026-04-19 · EW + ICT/SMC + Orderflow</div>
                </div>
                <div style={{ display: 'flex', gap: '6px', flexWrap: 'wrap' }}>
                  {pairs.map(badgeForPair)}
                </div>
              </div>
            ) : (
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                <div>
                  <div style={{ fontSize: '18px', fontWeight: 700, color: C.text, marginBottom: '2px' }}>Crypto Futures Analysis</div>
                  <div style={{ fontSize: '12px', color: C.sub }}>2026-04-19 · Elliott Wave + ICT/SMC + Orderflow Integration</div>
                </div>
                <div style={{ display: 'flex', gap: '8px' }}>
                  {pairs.map(badgeForPair)}
                </div>
              </div>
            )}
          </div>

          {/* Tab Bar */}
          <div ref={tabBarRef} style={{ display: 'flex', overflowX: 'auto', borderBottom: `1px solid ${C.border}`, background: C.surface, WebkitOverflowScrolling: 'touch', flexShrink: 0 }}>
            {tabs.map(tab => (
              <button
                key={tab.id}
                data-active={activeTab === tab.id ? 'true' : 'false'}
                onClick={() => setActiveTab(tab.id)}
                style={{
                  flex: 'none',
                  padding: isMobile ? '14px 14px' : '12px 16px',
                  fontSize: '13px',
                  fontWeight: activeTab === tab.id ? 700 : 500,
                  color: activeTab === tab.id ? C.primary : C.sub,
                  background: 'transparent',
                  border: 'none',
                  borderBottom: activeTab === tab.id ? `2px solid ${C.primary}` : '2px solid transparent',
                  cursor: 'pointer',
                  whiteSpace: 'nowrap',
                }}
              >
                {tab.label}
              </button>
            ))}
          </div>

          {/* Content */}
          <div style={{ flex: 1, overflowY: 'auto', padding: isMobile ? '14px 12px' : '20px 24px' }}>
            {tabContent}
          </div>

          {/* Footer */}
          <div style={{
            background: C.surface,
            borderTop: `1px solid ${C.border}`,
            padding: isMobile ? '12px' : '12px 24px',
            display: 'flex',
            flexDirection: isMobile ? 'column' : 'row',
            justifyContent: 'space-between',
            gap: isMobile ? '4px' : '0',
            alignItems: isMobile ? 'flex-start' : 'center',
            fontSize: '11px',
            color: '#6b7280',
            flexShrink: 0,
          }}>
            <span>Data: Binance · Coinalyze · Coinglass (2026-04-19 00:04 UTC)</span>
            <span>Educational &amp; Research Purpose Only — Not Financial Advice</span>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<Dashboard />);
  </script>
</body>
</html>
